function buildExcelData(){
  const skus  = STATE.skus || [];
  const stats = STATE.curr || buildStats(skus);
  const intel = buildIntel(stats.companyStats);
  const r1 = n => n==null?'':+(+n).toFixed(1);
  const r3 = n => n==null?'':+(+n).toFixed(3);
  const topCat = cc => Object.entries(cc||{}).sort((a,b)=>b[1]-a[1]).map(([k])=>k)[0] || '';
  const top3Brands = gs => { const m={}; gs.forEach(s=>m[s.brand]=(m[s.brand]||0)+1); return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([b])=>b).join(', '); };
  const cleanUrl = u => { if(!u) return ''; const m=String(u).match(/\/(?:dp|gp\/product|gp\/aw\/d)\/([A-Z0-9]{10})/i); return m ? 'https://www.amazon.in/dp/'+m[1] : String(u).split('?')[0].split('/ref=')[0]; };
  const archForShare = m => { const k = Object.keys(intel).find(co=>{ const rx={'Britannia':/^Britannia/,'Parle':/^Parle/,'ITC Sunfeast':/ITC|Sunfeast/i,'Mondelez':/Mondelez/i,'Unibic':/Unibic/i,'Emerging / D2C':/Whole Truth|D2C/i}[co]; return rx&&rx.test(m.company); }); return k?intel[k].archetype.label:''; };
  const sheets = [];

  sheets.push({ name:'Company Summary', note:'share % is an industry-report estimate for all',
    header:['Company','Archetype','Sentiment','Median ₹/g','Avg ₹/g','Min ₹/g','Max ₹/g','Avg Discount %','Market Share % (est.)','Revenue ₹Cr','Revenue basis','SKUs','Avg Rating'],
    rows: stats.companyStats.map(c=>{ const I=intel[c.company], sh=shareForCompany(c.company); return [
      c.company, I.archetype.label, I.sentiment.word, r3(c.ppg.median), r3(c.ppg.avg), r3(c.ppg.min), r3(c.ppg.max), r1(c.disc.avg),
      sh?sh.marketSharePct:'', sh?(sh.biscuitRevenueCr??''):'', sh?(sh.isEstimated?'ESTIMATED':'AUDITED'):'', c.skus.length, c.ratingAvg!=null?c.ratingAvg:'' ]; }) });

  sheets.push({ name:'Brand Summary',
    header:['Brand','Company','Median ₹/g','Avg Discount %','Avg Rating','Total Reviews','Dominant Category','SKUs'],
    rows: stats.brandStats.map(b=>[ b.brand, b.company, r3(b.ppg.median), r1(b.disc.avg), b.ratingAvg!=null?b.ratingAvg:'', b.reviewSum, topCat(b.categoryCounts), b.skus.length ]) });

  sheets.push({ name:'All SKUs', note:'shelf-life is a category-level ESTIMATE, not per-SKU',
    header:['Name','Brand','Company','Category','Pack','Weight (g)','MRP','Selling','Discount %','₹/g','Rating','Reviews','Shelf-life mo (est.)','Platform','URL'],
    rows: skus.map(s=>[ s.name, s.brand, s.company, s.category, s.packLabel||'', s.weightGrams, s.mrp, s.selling, s.discount, s.pricePerGram, s.rating??'', s.reviewCount??0, shelfLifeFor(s.category), s.platform||'', cleanUrl(s.url) ]) });

  sheets.push({ name:'Categories',
    header:['Category','Median ₹/g','Avg Discount %','SKUs','Top Brands'],
    rows: stats.categoryStats.map(cs=>[ cs.category, r3(cs.ppg.median), r1(cs.disc.avg), cs.skus.length, top3Brands(cs.skus) ]) });

  sheets.push({ name:'Pack Sizes', note:'reviews = interest proxy, not sales',
    header:['Band','Range','SKUs','Median ₹/g','Total Reviews','Avg Rating','Top Brand','Top Category'],
    rows: packBandStats(skus).map(b=>[ b.band, b.range, b.count, b.count?r3(b.ppg.median):'', b.reviews, b.ratingAvg!=null?b.ratingAvg:'', b.topBrand||'', b.domCat||'' ]) });

  const T = STATE.trends;
  if (T){
    const rows=[];
    Object.entries(T.brands||{}).forEach(([n,v])=>rows.push(['Brand', n, v.latest, v.direction, v.stale?'stale':'']));
    Object.entries(T.categories||{}).forEach(([n,v])=>rows.push(['Category', n, v.latest, v.direction, v.stale?'stale':'']));
    Object.entries(T.related||{}).forEach(([seed,r])=>{
      (r.top||[]).forEach(x=>rows.push([`Top search (${seed})`, x.query, x.extracted??'', '', '']));
      (r.rising||[]).forEach(x=>rows.push([`Rising (${seed})`, x.query, '', x.value||'', '']));
    });
    sheets.push({ name:'Google Trends', note:'relative search interest 0–100, not sales',
      header:['Type','Name / Query','Latest Interest','Direction / Growth','Flag'], rows });
  }

  const M = STATE.share;
  if (M && M.companies){
    sheets.push({ name:'Market Share', note:'share % estimated for all; revenue audited only where flagged',
      header:['Company','Revenue ₹Cr','Market Share % (est.)','YoY Growth %','Archetype','Revenue basis','Period','Source'],
      rows: M.companies.map(m=>[ m.company, m.biscuitRevenueCr??'', m.marketSharePct??'', m.yoyGrowthPct??'', archForShare(m), m.isEstimated?'ESTIMATED':'AUDITED', m.revenuePeriod||m.period||'', m.source||'' ]) });
  }

  const H = STATE.history||[];
  if (H.length){
    sheets.push({ name:'Trend History',
      header:['Run (UTC)','SKUs','Brands OK','Median ₹/g','Avg Discount %','Total Reviews','Avg Rating'],
      rows: H.map(h=>[ h.ts, h.skuCount, h.brandsOk, h.overall?h.overall.medianPpg:'', h.overall?h.overall.avgDiscount:'', h.overall?h.overall.totalReviews:'', h.overall?h.overall.avgRating:'' ]) });
  }
  return sheets;
}

// Per-sheet accent colours (vivid + distinct) for the banner + header band.
const XL_ACCENT = { 'Company Summary':'1F4E5F','Brand Summary':'6E4300','All SKUs':'2C3E50','Categories':'5B2A86','Pack Sizes':'1D4E9C','Google Trends':'0A6E4E','Market Share':'8A3B00','Trend History':'7A0A1C' };

// Apply colour/typography/layout styling to one worksheet (needs xlsx-js-style).
function styleWorksheet(ws, header, rows, accent, title){
  const ncol = header.length, nrow = rows.length;
  const firstR = 0, lastR = 1 + nrow, lastC = ncol - 1;   // row 0 title · row 1 header · rows 2.. data
  const cellAt = (r,c)=>{ const a=XLSX.utils.encode_cell({r,c}); if(!ws[a]) ws[a]={t:'s',v:''}; return ws[a]; };
  // Framed borders: solid near-black around the whole block, light hairlines inside.
  const dark = { style:'medium', color:{ rgb:'1A1A18' } };
  const light = { style:'thin', color:{ rgb:'E0DCD4' } };
  const bord = (r,c)=>({ top: r===firstR?dark:light, bottom: r===lastR?dark:light, left: c===0?dark:light, right: c===lastC?dark:light });
  const fmtFor = h => /₹\/g/.test(h)?'0.000' : /%/.test(h)?'0.0' : /Reviews|Revenue|Interest|MRP|Selling|SKUs|Weight|Brands OK/.test(h)?'#,##0' : null;
  const wrapCol = h => /Name|Source|Top Brand|Query|Range/i.test(h);   // long text wraps
  const urlCol  = h => /^URL$/i.test(h);                                // links: short + clickable, no wrap

  // Row 0 — merged title banner (style every cell so the merge's right edge gets the dark frame too)
  ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:lastC} }];
  for (let c=0;c<ncol;c++){
    const tc = cellAt(0,c); if (c===0){ tc.v = title; tc.t='s'; }
    tc.s = { font:{ bold:true, sz:12, color:{rgb:'FFFFFF'} }, fill:{ patternType:'solid', fgColor:{rgb:accent} },
      alignment:{ horizontal:'left', vertical:'center' }, border:bord(0,c) };
  }
  // Row 1 — header band
  for (let c=0;c<ncol;c++){
    const hc = cellAt(1,c); hc.v = header[c]; hc.t='s';
    hc.s = { font:{ bold:true, sz:11, color:{rgb:'FFFFFF'} }, fill:{ patternType:'solid', fgColor:{rgb:accent} },
      alignment:{ horizontal:'center', vertical:'center', wrapText:true }, border:bord(1,c) };
  }
  // Rows 2+ — data
  for (let r=0;r<nrow;r++){
    const zebra = r%2 ? 'F6F3EE' : 'FFFFFF';
    for (let c=0;c<ncol;c++){
      const cc = cellAt(r+2,c), h = header[c], isNum = typeof cc.v === 'number';
      let fill = zebra, font = { sz:10, color:{rgb:'2B2B28'} };
      if (cc.v==='AUDITED'){ fill='D6F0E0'; font={ bold:true, sz:10, color:{rgb:'0A4A3A'} }; }
      else if (cc.v==='ESTIMATED'){ fill='FCE6D2'; font={ bold:true, sz:10, color:{rgb:'8A3B00'} }; }
      if (urlCol(h) && typeof cc.v==='string' && /^https?:\/\//.test(cc.v)){ cc.l = { Target:cc.v, Tooltip:'Open product page' }; font = { sz:10, underline:true, color:{rgb:'1D4E9C'} }; }
      cc.s = { font, fill:{ patternType:'solid', fgColor:{rgb:fill} },
        alignment:{ horizontal: isNum?'right':(urlCol(h)?'left':'left'), vertical:'center', wrapText: wrapCol(h) }, border:bord(r+2,c) };
      const z = isNum ? fmtFor(h) : null; if (z) cc.z = z;
    }
  }
  ws['!cols'] = header.map((h,i)=>{ let w=String(h).length; rows.forEach(rw=>{ const v=rw[i]==null?'':String(rw[i]); if(v.length>w) w=v.length; });
    if (urlCol(h)) return { wch: 38 };
    return wrapCol(h) ? { wch: Math.min(Math.max(w,18),46) } : { wch: Math.min(Math.max(w+2,9),28) }; });
  ws['!rows'] = [{ hpt:26 }, { hpt:30 }];
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s:{r:1,c:0}, e:{r:lastR, c:lastC} }) };
}

function downloadExcel(){
  if (!window.XLSX){ alert('Excel library is still loading — please try again in a moment.'); return; }
  if (!(STATE.skus && STATE.skus.length)){ alert('No data to export yet — load or scrape first.'); return; }
  const now = new Date();
  const wb = XLSX.utils.book_new();
  buildExcelData().forEach(s=>{
    const accent = XL_ACCENT[s.name] || '1A1A18';
    const title = `Biscuit Market Intelligence    ·    ${s.name}    ·    generated ${now.toLocaleString('en-IN')}${s.note?'    ·    '+s.note:''}`;
    const ws = XLSX.utils.aoa_to_sheet([[title], s.header, ...s.rows]);
    styleWorksheet(ws, s.header, s.rows, accent, title);
    XLSX.utils.book_append_sheet(wb, ws, s.name);
  });
  wb.Workbook = { Views:[{ RTL:false }] };
  XLSX.writeFile(wb, `biscuit-intelligence-${now.toISOString().slice(0,10)}.xlsx`);
}



/* ===========================================================
   BISCUIT INSIGHTS — one-click "Get Insight" editorial PDF.
   Composes the ENTIRE dashboard into a colourful, fixed-size
   (A4 794×1123) newspaper, one section per page, then renders
   each page to a full-bleed PDF page (html2canvas + jsPDF).
   Page count scales to the data; nothing material is dropped.
   npData()/npPages() are PURE (testable in Node).
   =========================================================== */
const NP_ARCH_COL = { value:'#0A6B4F', scale:'#1D4E9C', premium:'#7B2D8E', challenger:'#B6772E', insurgent:'#C8102E', discount:'#9A6019' };
function npPg(v){ return v==null ? '—' : '₹'+(+v).toFixed(2); }
function npInt(n){ return n==null ? '—' : Number(Math.round(n)).toLocaleString('en-IN'); }
function npCr(n){ return n==null ? '—' : '₹'+Number(n).toLocaleString('en-IN')+' Cr'; }
function npPct(n,dp){ return (n>=0?'+':'')+(+n).toFixed(dp==null?1:dp)+'%'; }
function npDir(d){ return d==='rising' ? '<span class="np-pos">▲ rising</span>' : d==='falling' ? '<span class="np-neg">▼ falling</span>' : '<span class="np-flat">● flat</span>'; }
function npDirArrow(d){ return d==='rising' ? '<span class="np-pos">▲</span>' : d==='falling' ? '<span class="np-neg">▼</span>' : '<span class="np-flat">●</span>'; }

/* ---- chart primitives (return print-safe HTML / inline SVG) ---- */
function npBars(rows, opts){
  opts = opts || {};
  const max = opts.max || Math.max(...rows.map(r=>r.value||0), 0.0001);
  const fmt = opts.fmt || (v=>v);
  return `<div class="np-bars"${opts.style?` style="${opts.style}"`:''}>` + rows.map(r=>
    `<div class="np-bar"><div class="np-bar-l">${esc(r.label)}</div>`+
    `<div class="np-bar-track"><div class="np-bar-fill" style="width:${Math.max(2,Math.round((r.value||0)/max*100))}%;background:${r.color||'#16161D'}"></div></div>`+
    `<div class="np-bar-v">${r.vlabel!=null?r.vlabel:fmt(r.value)}</div></div>`).join('') + `</div>`;
}
function npSpark(series, opts){
  opts = opts || {}; const w = opts.w||230, h = opts.h||46, pad = 4;
  const data = (series||[]).filter(v=>v!=null);
  if (data.length < 2) return '';
  const mn = Math.min(...data), mx = Math.max(...data), rng = (mx-mn)||1;
  const X = i => pad + i*(w-2*pad)/(data.length-1);
  const Y = v => h-pad - (v-mn)/rng*(h-2*pad);
  const pts = data.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
  const col = opts.color||'#16161D';
  const area = `M${X(0).toFixed(1)},${(h-pad).toFixed(1)} L`+pts.join(' L')+` L${X(data.length-1).toFixed(1)},${(h-pad).toFixed(1)} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`+
    (opts.fill!==false?`<path d="${area}" fill="${col}" opacity="0.12"/>`:'')+
    `<path d="M${pts.join(' L')}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${X(data.length-1).toFixed(1)}" cy="${Y(data[data.length-1]).toFixed(1)}" r="3.2" fill="${col}"/></svg>`;
}
function npStack(items, opts){
  opts = opts || {}; const w = opts.w||616, h = opts.h||40; let x = 0;
  const total = items.reduce((a,b)=>a+(b.pct||0),0) || 100;
  const segs = items.map(it=>{
    const ww = (it.pct||0)/total*w; const mid = x+ww/2;
    const r = `<rect x="${x.toFixed(1)}" y="0" width="${Math.max(0,ww-1).toFixed(1)}" height="${h}" fill="${it.color}"/>`+
      (ww>30?`<text x="${mid.toFixed(1)}" y="${(h/2+4).toFixed(1)}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11.5" font-weight="700" fill="#FAF6EE">${it.pct}%</text>`:'');
    x += ww; return r;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${segs}<rect x="0.5" y="0.5" width="${w-1}" height="${h-1}" fill="none" stroke="#16161D" stroke-width="1"/></svg>`;
}
function npScatter(points, opts){
  opts = opts || {}; const w = opts.w||336, h = opts.h||224, pl = 30, pb = 24, pt = 12, pr = 14;
  const xmax = opts.xmax || (Math.max(...points.map(p=>p.x), 8)*1.15);
  const X = v => pl + v/xmax*(w-pl-pr);
  const Y = v => h-pb - v/100*(h-pb-pt);
  const yhi = Y(30);
  const dots = points.map(p=>{
    const cx=X(p.x).toFixed(1), cy=Y(p.y).toFixed(1), r=p.r||6;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${p.color}" fill-opacity="0.8" stroke="#16161D" stroke-width="1.1"/>`+
      `<text x="${cx}" y="${(Y(p.y)-r-3).toFixed(1)}" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" font-weight="700" fill="#16161D">${esc(p.label)}</text>`;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`+
    `<line x1="${pl}" y1="${pt}" x2="${pl}" y2="${h-pb}" stroke="#16161D" stroke-width="1"/>`+
    `<line x1="${pl}" y1="${h-pb}" x2="${w-pr}" y2="${h-pb}" stroke="#16161D" stroke-width="1"/>`+
    `<line x1="${pl}" y1="${yhi.toFixed(1)}" x2="${w-pr}" y2="${yhi.toFixed(1)}" stroke="#B6772E" stroke-width="1" stroke-dasharray="3 3"/>`+
    `<text x="${(w-pr).toFixed(1)}" y="${(yhi-4).toFixed(1)}" text-anchor="end" font-family="Inter, sans-serif" font-size="8" fill="#B6772E">demand 30 →</text>`+
    dots+
    `<text x="${pl}" y="${h-6}" font-family="Inter, sans-serif" font-size="8.5" fill="#6E6A60">low supply ·············· high supply →</text>`+
    `<text x="2" y="${pt+6}" font-family="Inter, sans-serif" font-size="8.5" fill="#6E6A60">demand↑</text></svg>`;
}

/* ---- DATA: one pass over live STATE → every newspaper story ---- */
function npData(){
  const med = arr => { arr = arr.filter(x=>x>0).sort((a,b)=>a-b); const n=arr.length; return n?(n%2?arr[(n-1)/2]:+(((arr[n/2-1]+arr[n/2])/2)).toFixed(4)):null; };
  const mean = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const all = (STATE.skus||[]).filter(s=>s.inStock!==false);
  const priced = all.filter(s=>s.pricePerGram>0);
  const channels = {}; all.forEach(s=>channels[s.channel]=(channels[s.channel]||0)+1);
  const brands = [...new Set(all.map(s=>s.brand))], companies = [...new Set(all.map(s=>s.company))], cats = [...new Set(all.map(s=>s.category))];
  const ppgArr = priced.map(s=>s.pricePerGram).sort((a,b)=>a-b);
  const kpi = { skus:all.length, brands:brands.length, companies:companies.length, cats:cats.length,
    medPpg:med(ppgArr), minPpg:ppgArr[0], maxPpg:ppgArr[ppgArr.length-1],
    avgDisc:mean(all.map(s=>s.discount||0)), reviews:all.reduce((a,s)=>a+(s.reviewCount||0),0),
    avgRating:mean(all.map(s=>s.rating).filter(v=>v!=null)), channels };
  kpi.spread = (kpi.minPpg>0) ? kpi.maxPpg/kpi.minPpg : null;
  const cheapestSku = priced.slice().sort((a,b)=>a.pricePerGram-b.pricePerGram)[0] || null;
  const priciestSku = priced.slice().sort((a,b)=>b.pricePerGram-a.pricePerGram)[0] || null;
  // brand league (exclude the catch-all "Other" bucket from named-brand tables)
  const byBrand = {}; priced.forEach(s=>{ if (s.brand && s.brand!=='Other') (byBrand[s.brand]=byBrand[s.brand]||[]).push(s); });
  const brandRows = Object.entries(byBrand).map(([b,gs])=>({ brand:b, company:gs[0].company, n:gs.length, med:med(gs.map(s=>s.pricePerGram)), disc:mean(gs.map(s=>s.discount||0)) })).filter(r=>r.n>=3 && r.med!=null);
  const cheapBrands = brandRows.slice().sort((a,b)=>a.med-b.med).slice(0,8);
  const dearBrands  = brandRows.slice().sort((a,b)=>b.med-a.med).slice(0,8);
  // category roundup
  const byCat = {}; priced.forEach(s=>(byCat[s.category]=byCat[s.category]||[]).push(s));
  const catRows = Object.entries(byCat).map(([c,gs])=>{
    const ch = gs.slice().sort((a,b)=>a.pricePerGram-b.pricePerGram)[0];
    const t = (STATE.trends&&STATE.trends.categories&&STATE.trends.categories[c])||{};
    return { cat:c, n:gs.length, med:med(gs.map(s=>s.pricePerGram)), cheapBrand:ch.brand, cheapPpg:ch.pricePerGram, demand:(t.latest!=null?t.latest:null), dir:t.direction||'flat' };
  }).sort((a,b)=>b.n-a.n);
  // pack economics
  const packOrder = ['≤50 g','51–120 g','121–250 g','251–500 g','500 g +'];
  const packOf = g => g<60?'≤50 g':g<120?'51–120 g':g<250?'121–250 g':g<500?'251–500 g':'500 g +';
  const byPack = {}; priced.forEach(s=>{ if(s.weightGrams>0){ const k=packOf(s.weightGrams); (byPack[k]=byPack[k]||[]).push(s); } });
  const packRows = packOrder.filter(k=>byPack[k]).map(k=>({ pack:k, n:byPack[k].length, med:med(byPack[k].map(s=>s.pricePerGram)) }));
  const packSorted = packRows.slice().sort((a,b)=>a.med-b.med);
  const packRatio = (packSorted.length>=2 && packSorted[0].med>0) ? packSorted[packSorted.length-1].med/packSorted[0].med : null;
  // channels
  const chMed = {}; ['amazon','blinkit','zepto'].forEach(c=>{ const v=priced.filter(s=>s.channel===c).map(s=>s.pricePerGram); chMed[c]={ n:v.length, med:med(v) }; });
  const cmp = (typeof compareRows==='function' ? compareRows('brand') : []).filter(r=>r.present.length>=2).sort((a,b)=>(a.ppg.amazon==null?9:a.ppg.amazon)-(b.ppg.amazon==null?9:b.ppg.amazon));
  const eMed = med(all.filter(s=>s.channelType==='ecomm').map(s=>s.pricePerGram));
  const qMed = med(all.filter(s=>s.channelType==='qcomm').map(s=>s.pricePerGram));
  const gapPct = (eMed&&qMed)?Math.round((eMed-qMed)/eMed*100):null;
  // market share / competition
  const shareCos = (STATE.share&&STATE.share.companies)||[];
  const shareRanked = shareCos.filter(c=>c.biscuitRevenueCr!=null).map(c=>({ ...c, cl:classifyShare(c.marketSharePct,c.yoyGrowthPct) })).sort((a,b)=>b.marketSharePct-a.marketSharePct);
  const shareAll = shareCos.slice().sort((a,b)=>b.marketSharePct-a.marketSharePct);
  // archetypes / intel
  const stats = buildStats(priced);
  const intel = (typeof buildIntel==='function') ? buildIntel(stats.companyStats) : {};
  const archs = stats.companyStats.map(c=>({ company:c.company, med:c.ppg.median, it:intel[c.company] })).filter(a=>a.it&&a.it.archetype).sort((a,b)=>a.med-b.med);
  // health / clean-label
  const health = (typeof healthData==='function') ? healthData() : [];
  const cleanCo = (typeof cleanLabelLeaders==='function') ? cleanLabelLeaders('company',5) : [];
  const cleanBr = (typeof cleanLabelLeaders==='function') ? cleanLabelLeaders('brand',4).filter(r=>r.name!=='Other') : [];
  // demand / trends
  const T = STATE.trends||{};
  const brandTrends = Object.entries(T.brands||{}).map(([n,v])=>({ name:n, latest:v.latest, dir:v.direction, series:v.interest||[] })).sort((a,b)=>b.latest-a.latest);
  const catTrends = Object.entries(T.categories||{}).map(([n,v])=>({ name:n, latest:v.latest, dir:v.direction })).sort((a,b)=>b.latest-a.latest);
  const breakouts = []; Object.entries(T.related||{}).forEach(([seed,r])=>(r.rising||[]).forEach(x=>breakouts.push({ seed, query:x.query, value:x.value, ext:x.extracted||0 })));
  breakouts.sort((a,b)=>b.ext-a.ext);
  // history movers
  const hist = (STATE.history||[]).filter(h=>h.overall);
  // discounts / ratings
  const deepDisc = all.filter(s=>s.discount>0).sort((a,b)=>b.discount-a.discount).slice(0,6);
  const topRated = all.filter(s=>s.rating>=4 && s.reviewCount>=500).sort((a,b)=>b.reviewCount-a.reviewCount).slice(0,6);
  const asOf = (STATE.scrapedAt||T.fetchedAt||'').slice(0,10) || new Date().toISOString().slice(0,10);
  return { all, priced, kpi, cheapestSku, priciestSku, cheapBrands, dearBrands, catRows, packRows, packSorted, packRatio,
    chMed, cmp, eMed, qMed, gapPct, shareRanked, shareAll, archs, health, cleanCo, cleanBr,
    brandTrends, catTrends, breakouts, hist, deepDisc, topRated, asOf,
    context:(STATE.share&&STATE.share.marketContext)||'', disclaimer:(STATE.share&&STATE.share.disclaimer)||'' };
}

   <div class="np-byline">By the Biscuit Insights Data Desk · Sourced from live retail &amp; Google Trends</div>
   <div class="np-rule"></div>
   <div class="np-rowfill" style="gap:16px">

         <p>The cheapest rupee-per-gram on the board belongs to <b>${esc(val?val.company:'—')}</b> (${npPg(val?val.med:null)}/g median) — the volume engine that anchors the category. The most premium belongs to the <b>${esc(prem?prem.company:'—')}</b> camp at ${npPg(prem?prem.med:null)}/g: protein cookies and imported indulgence that treat a biscuit like a snack-bar.</p>
         <p>Scale, though, still belongs to the giants: Britannia and Parle together hold close to 60% of a ₹50,000-crore market, and Parle-G remains the world’s largest-selling biscuit by volume — here the value floor is also the volume ceiling.</p>

/* ---- PAGE 2 — PRICING ---- */
function npPricing(D){
  const leagueTbl = (rows,head) => `<table class="np-tbl"><thead><tr><th>#</th><th>${head}</th><th class="r">₹/g</th><th class="r">SKUs</th></tr></thead><tbody>`+

  const packBars = D.packRows.map(p=>({ label:p.pack, value:p.med, color:'#B6772E', vlabel:npPg(p.med) }));
  const cheapPack = D.packSorted[0], dearPack = D.packSorted[D.packSorted.length-1];
  const disc = D.deepDisc.map(s=>`<div class="np-li"><span class="np-li-n">${Math.round(s.discount)}%</span><span><b>${esc(s.brand)}</b> · ${esc((s.name||'').slice(0,40))} <span class="np-mono" style="color:#6E6A60">${npPg(s.pricePerGram)}/g</span></span></div>`).join('');
  return { section:'Pricing Desk', html:
  npBand('Pricing Desk', '#B6772E', `Hero metric · ₹ per gram · ${npInt(D.kpi.skus)} SKUs`)+
  `<div class="np-headline np-h-l">The Cheapest &amp; Dearest Grams in the Aisle</div>
   <div class="np-deck">Ranked by median price-per-gram across every in-stock pack (brands with 3+ SKUs).</div>
   <div class="np-rule"></div>
   <div class="np-flex" style="gap:16px;margin-bottom:12px">
     <div class="np-grow"><div class="np-box-t" style="color:#0A6B4F;border-color:#0A6B4F">Value · cheapest by ₹/g</div>${leagueTbl(D.cheapBrands,'Brand')}</div>
     <div class="np-grow"><div class="np-box-t" style="color:#7B2D8E;border-color:#7B2D8E">Premium · priciest by ₹/g</div>${leagueTbl(D.dearBrands,'Brand')}</div>
   </div>
   <div class="np-rowfill" style="gap:16px;align-items:stretch">
     <div class="np-grow np-box" style="display:flex;flex-direction:column">
       <div class="np-box-t">Pack-size economics · ₹/g by weight band</div>
       ${npBars(packBars,{style:'gap:11px;width:100%;flex:1;justify-content:space-between;padding:8px 0'})}
       <div class="np-cap">${cheapPack&&dearPack?`Buy bigger: <b>${cheapPack.pack}</b> packs cost <b>${npPg(cheapPack.med)}/g</b> — about <b>${D.packRatio?D.packRatio.toFixed(1)+'×':'—'}</b> less per gram than <b>${dearPack.pack}</b> snack packs (${npPg(dearPack.med)}/g).`:''}</div>
     </div>
     <div style="width:300px;flex-shrink:0;display:flex;flex-direction:column" class="np-box">
       <div class="np-box-t" style="color:#C8102E;border-color:#C8102E">Red-tag rack · deepest discounts</div>
       <div class="np-list">${disc}</div>
       <div class="np-cap">% off vs MRP on Amazon India listings. Big cuts cluster in indulgent wafer &amp; chocolate SKUs.</div>
     </div>
   </div>` };
}

function npCategory(D){

   <div class="np-rowfill" style="gap:16px;align-items:stretch">
     <div class="np-box" style="width:320px;flex-shrink:0;display:flex;flex-direction:column">
       <div class="np-box-t">Median ₹/g by category</div>
       ${npBars(catBars,{style:'gap:9px;width:100%;flex:1;justify-content:space-between;padding:8px 0'})}
     </div>
     <div class="np-grow" style="display:flex;align-items:center"><div class="np-cols np-cols-2" style="width:100%">
       <div class="np-col"><div class="np-body">
         <p><span class="np-kapital">Cookies, the colossus.</span> At <b>${big?npInt(big.n):'—'} SKUs</b> and a ${big?npPg(big.med):'—'}/g median, cookies are the deepest, busiest aisle — and the rare category with <b>rising</b> search. Premium sub-ranges (choco-filled, protein, imported) pull its average up.</p>
         <p><span class="np-kapital">Wafers, the priciest gram.</span> ${dear?esc(dear.cat):'—'} top the ladder at <b>${dear?npPg(dear.med):'—'}/g</b> — air, cream and chocolate coatings make them a per-gram indulgence rather than a staple.</p>

         <p>Category search terms read low for cream, digestive and crackers — Indians search <em>brands</em> (Oreo, Bourbon), not aisles. Treat the demand column as a relative signal, not a sales figure.</p>
       </div></div>
     </div></div>
   </div>
   <div class="np-pull">“Cookies are the only category with rising search interest — and the deepest, most premium shelf in the store.”<span class="np-cite">Biscuit Insights · Category Desk</span></div>` };
}

/* ---- PAGE 4 — COMPETITION ---- */
function npCompetition(D){
  const stackItems = D.shareAll.map(c=>({ label:c.company, pct:c.marketSharePct, color:COL[c.company]|| (/Others/.test(c.company)?'#B8B2A6':'#9b9a96') }));
  const tagEst = e => e ? '<span class="np-tag" style="background:#F4E2C3;color:#6E4300">Est.</span>' : '<span class="np-tag" style="background:#CDEBDF;color:#0A4A3A">Audited</span>';
  const tbl = `<table class="np-tbl"><thead><tr><th>#</th><th>Company</th><th class="r">Share</th><th class="r">Biscuit rev.</th><th class="r">YoY</th><th>Class</th><th class="c">Basis</th></tr></thead><tbody>`+
    D.shareRanked.map((c,i)=>`<tr><td><span class="np-rk">${i+1}</span></td><td class="np-ent">${npDotCo(c.company)}${esc(c.company)}</td><td class="r" style="font-weight:700">~${c.marketSharePct}%</td><td class="r">${npCr(c.biscuitRevenueCr)}</td><td class="r ${c.yoyGrowthPct>=0?'np-pos':'np-neg'}">${npPct(c.yoyGrowthPct)}</td><td><span class="np-tag" style="background:${c.cl.color||'#16161D'};color:#FAF6EE">${esc(c.cl.label)}</span></td><td class="c">${tagEst(c.isEstimated)}</td></tr>`).join('')+`</tbody></table>`;
  const cards = D.archs.slice().reverse().map(a=>{
    const k = a.it.archetype;
    return `<div class="np-card"><div class="np-card-co">${npDotCo(a.company)}${esc(a.company)}</div><div class="np-card-a" style="color:${NP_ARCH_COL[k.key]||'#16161D'}">${esc(k.label)}</div><div class="np-card-n">${npPg(a.med)}<span class="np-kick-font" style="font-size:9px;color:#6E6A60;font-weight:600">/g median</span></div><div class="np-card-x">${esc(k.descriptor)}.</div></div>`;
  }).join('');
  return { section:'The Boardroom', html:
  npBand('The Boardroom · Competition', '#1D4E9C', 'Market share · revenue · growth')+
  `<div class="np-headline np-h-l">A ₹50,000-Crore Contest, Top-Heavy and Stirring</div>
   <div class="np-deck">${esc((D.context||'').replace(/\s*\(industry estimates.*\)\.?$/,'').slice(0,150))}…</div>
   <div class="np-rule"></div>
   <div class="np-box" style="margin-bottom:12px"><div class="np-box-t">Estimated market share · adds to ~100%</div><div style="text-align:center">${npStack(stackItems)}</div>
     <div class="np-cap">${D.shareAll.map(c=>`<span style="margin-right:11px"><span class="np-dot" style="background:${COL[c.company]||'#B8B2A6'}"></span>${esc(c.company)} ~${c.marketSharePct}%</span>`).join('')}</div>
   </div>
   <div style="margin-bottom:12px">${tbl}</div>
   <div class="np-fill">
     <div class="np-box-t" style="border:0;color:#1D4E9C">Archetypes · how each group plays ₹/g</div>
     <div class="np-cards" style="margin-bottom:10px">${cards}</div>
     <div class="np-box np-shade" style="margin-top:auto"><div class="np-box-t">A note on the numbers</div><div class="np-body" style="font-size:10px">${esc((D.disclaimer||'').slice(0,420))}…</div></div>
   </div>` };
}

/* ---- PAGE 5 — CHANNELS ---- */
function npChannels(D){
  const chans = ['amazon','blinkit','zepto'].filter(c=>D.chMed[c] && D.chMed[c].n>0);
  const chanBars = chans.map(c=>({ label:CH_LABEL[c], value:D.chMed[c].med, color:CH_COL[c], vlabel:npPg(D.chMed[c].med)+' · '+D.chMed[c].n }));
  const typeBars = [
    { label:'E-commerce', value:D.eMed, color:'#E8730C', vlabel:npPg(D.eMed) },
    { label:'Quick-commerce', value:D.qMed, color:'#C99700', vlabel:npPg(D.qMed) },
  ].filter(b=>b.value!=null);
  const rows = D.cmp.slice(0,12);
  const tbl = `<table class="np-tbl np-tbl-roomy"><thead><tr><th>Brand</th><th class="r">Amazon ₹/g</th><th class="r">Blinkit ₹/g</th><th class="c">Cheaper on</th></tr></thead><tbody>`+
    rows.map(r=>`<tr><td class="np-ent">${npDotCo(r.company)}${esc(r.name)}</td><td class="r">${r.ppg.amazon!=null?npPg(r.ppg.amazon):'—'}</td><td class="r">${r.ppg.blinkit!=null?npPg(r.ppg.blinkit):'—'}</td><td class="c"><span class="np-tag" style="background:${CH_COL[r.cheapest]||'#16161D'};color:#FAF6EE">${esc(CH_LABEL[r.cheapest]||'—')}</span></td></tr>`).join('')+`</tbody></table>`;
  const gaps = D.cmp.filter(r=>r.ppg.amazon!=null && r.ppg.blinkit!=null).map(r=>({ name:r.name, company:r.company, g:Math.round((r.ppg.amazon-r.ppg.blinkit)/r.ppg.amazon*100) })).sort((a,b)=>Math.abs(b.g)-Math.abs(a.g)).slice(0,7);
  const gapList = gaps.map(x=>`<div class="np-li"><span class="np-li-n" style="color:${x.g>=0?'#0A6B4F':'#B11226'}">${x.g>=0?'−':'+'}${Math.abs(x.g)}%</span><span>${npDotCo(x.company)}<b>${esc(x.name)}</b> ${x.g>=0?'cheaper on Blinkit':'dearer on Blinkit'}</span></div>`).join('');
  const zNote = (D.chMed.zepto && D.chMed.zepto.n===0) ? ' Zepto returned no in-stock matches this edition, so the wire runs Amazon vs Blinkit.' : '';
  const gapHead = D.gapPct!=null ? `Quick-commerce is <b>${Math.abs(D.gapPct)}% ${D.gapPct>=0?'cheaper':'dearer'}</b> per gram than e-commerce` : 'Channel gap';
  return { section:'The Channel Wire', html:
  npBand('The Channel Wire · Compare', '#E8730C', 'Amazon · Blinkit · Zepto')+
  `<div class="np-headline np-h-l">${gapHead}</div>
   <div class="np-deck">Like-for-like, most everyday brands ring up cheaper on quick-commerce — but the mix differs, so read it as a city-level guide.</div>
   <div class="np-rule"></div>
   <div class="np-flex" style="gap:16px;margin-bottom:12px">
     <div class="np-grow np-box"><div class="np-box-t">Median ₹/g by channel <span class="np-kick-font" style="font-weight:600;color:#6E6A60">₹/g · n</span></div>${npBars(chanBars,{style:'gap:12px'})}</div>
     <div class="np-grow np-box"><div class="np-box-t">Median ₹/g by channel type</div>${typeBars.length?npBars(typeBars,{style:'gap:16px'}):'<div class="np-cap">No paired type data this edition.</div>'}
       <div class="np-cap">E-commerce skews imported, combo &amp; indulgent packs; quick-commerce skews everyday metro staples.</div>
     </div>
   </div>
   <div class="np-rowfill" style="gap:16px;align-items:stretch">
     <div class="np-grow np-box" style="display:flex;flex-direction:column"><div class="np-box-t">Same brand, two apps · median ₹/g (cheapest flagged)</div><div class="np-vcenter">${tbl}</div></div>
     <div style="width:250px;flex-shrink:0;display:flex;flex-direction:column" class="np-box np-shade"><div class="np-box-t" style="color:#E8730C;border-color:#E8730C">Biggest per-brand gaps</div><div class="np-list">${gapList}</div>
       <div class="np-cap">Typical (median) ₹/g per app — <b>not the same pack matched across apps</b>. Quick-commerce reads from a typical metro location.${zNote}</div>
     </div>
   </div>` };
}

/* ---- PAGE 6 — HEALTH ---- */
function npHealth(D){
  const order = ['isProtein','noMaida','sugarFree','nonRefinedSugar','noPalmOil'];
  const byKey = Object.fromEntries(D.health.map(h=>[h.key,h]));
  const hl = order.map(k=>byKey[k]).filter(Boolean);
  const colOf = h => { const a=(HEALTH_ATTRS||[]).find(x=>x.key===h.key); return a?a.color:'#138A6E'; };
  const pts = hl.map(h=>({ x:h.supplyPct, y:h.demand, r:Math.max(5,Math.min(13,4+Math.sqrt(h.n))), color:colOf(h), label:h.label }));
  const readTag = r => { const m={Whitespace:'#0A6B4F',Contested:'#B6772E','Over-supplied':'#9b9a96','Values claim':'#7B2D8E',Niche:'#6E6A60'}; return `<span class="np-tag" style="background:${m[r]||'#16161D'};color:#FAF6EE">${esc(r)}</span>`; };
  const tbl = `<table class="np-tbl"><thead><tr><th>Claim</th><th class="r">Shelf</th><th class="c">Demand</th><th>Verdict</th><th class="r">₹/g prem.</th></tr></thead><tbody>`+
    hl.map(h=>`<tr><td class="np-ent">${esc(h.label)}</td><td class="r">${h.n} <span style="color:#6E6A60">(${h.supplyPct}%)</span></td><td class="c">${h.demand} ${npDirArrow(h.dir)}</td><td>${readTag(h.read)}</td><td class="r ${h.premium>0?'np-neg':''}">${h.premium!=null?npPct(h.premium,0):'—'}</td></tr>`).join('')+`</tbody></table>`;
  const premBars = hl.filter(h=>h.premium!=null).map(h=>({ label:h.label, value:h.premium, color:colOf(h), vlabel:npPct(h.premium,0) }));
  const white = hl.find(h=>h.read==='Whitespace');
  const coList = D.cleanCo.slice(0,6).map(r=>`<div class="np-li"><span class="np-li-n">${r.pct}%</span><span>${npDotCo(r.name)}<b>${esc(r.name)}</b> · ${r.clean}/${r.total} SKUs clean</span></div>`).join('');
  const brList = D.cleanBr.slice(0,5).map(r=>`<div class="np-li"><span class="np-li-n">${r.pct}%</span><span><b>${esc(r.name)}</b> <span style="color:#6E6A60">${esc(r.company)}</span> · ${r.clean}/${r.total}</span></div>`).join('');
  const over = hl.filter(h=>h.read==='Over-supplied').map(h=>h.label);
  return { section:'The Health Beat', html:
  npBand('The Health Beat · Clean-Label', '#138A6E', 'Demand × supply · claimed attributes')+
  `<div class="np-headline np-h-l">Protein: Loud Demand, a Near-Empty Shelf</div>
   <div class="np-deck">Five clean-label claims, mapped by what shoppers search versus what the aisle actually stocks — and the premium each commands.</div>
   <div class="np-rule"></div>
   <div class="np-flex" style="gap:16px;margin-bottom:11px">
     <div style="width:344px;flex-shrink:0" class="np-box"><div class="np-box-t">Whitespace map · demand vs shelf share</div><div style="text-align:center">${npScatter(pts)}</div></div>
     <div class="np-grow">
       ${tbl}
       <div class="np-box np-shade" style="margin-top:10px"><div class="np-box-t" style="color:#0A6B4F;border-color:#0A6B4F">★ The whitespace</div><div class="np-body" style="font-size:10.5px">${white?`<b>${esc(white.label)}</b> draws <b>${white.demand}/100</b> in search yet fills only <b>${white.supplyPct}%</b> of the shelf (${white.n} SKUs) — the clearest unmet demand, and it carries a <b>${npPct(white.premium,0)}</b> ₹/g premium.`:'No single whitespace this edition.'}</div></div>
     </div>
   </div>
   <div class="np-rowfill" style="gap:16px;align-items:stretch">
     <div class="np-grow np-box" style="display:flex;flex-direction:column"><div class="np-box-t">The clean-label surcharge · ₹/g premium vs plain</div>${npBars(premBars,{style:'gap:10px;width:100%;flex:1;justify-content:space-between;padding:8px 0'})}<div class="np-cap">${over.length?'Over-supplied (high shelf, low search): '+over.join(' &amp; ')+'.':''}</div></div>
     <div style="width:300px;flex-shrink:0;display:flex;flex-direction:column"><div class="np-box-t" style="color:#138A6E;border-color:#138A6E">Clean-label leaders · by group</div><div class="np-list">${coList}</div><div class="np-box-t" style="color:#138A6E;border-color:#138A6E;margin-top:9px">Top brands</div><div class="np-list">${brList}</div></div>
   </div>` };
}

/* ---- PAGE 7 — TRENDS ---- */
function npTrends(D){
  const oreo = D.brandTrends.find(b=>b.name==='Oreo');
  const top = D.brandTrends.filter(b=>b.latest>0).slice(0,12);
  const maxI = Math.max(...top.map(b=>b.latest),1);
  const barList = top.map(b=>{ const co=(BRANDS.find(x=>x.brand===b.name)||{}).company; const c=b.dir==='rising'?'#0A6B4F':b.dir==='falling'?'#C8102E':'#B6772E'; return `<div class="np-bar"><div class="np-bar-l">${npDotCo(co)}${esc(b.name)}</div><div class="np-bar-track" style="height:14px"><div class="np-bar-fill" style="width:${Math.round(b.latest/maxI*100)}%;background:${c}"></div></div><div class="np-bar-v">${b.latest} ${npDirArrow(b.dir)}</div></div>`; }).join('');
  const cats = D.catTrends.filter(c=>c.latest>0).slice(0,5).map(c=>`<div class="np-li"><span class="np-li-n">${c.latest}</span><span><span class="np-dot" style="background:${CAT_COL[c.name]||'#9b9a96'}"></span><b>${esc(c.name)}</b> ${npDir(c.dir)}</span></div>`).join('');
  const brk = D.breakouts.slice(0,8).map(b=>`<div class="np-li"><span class="np-li-n">${esc(b.value)}</span><span><b>${esc(b.query)}</b> <span style="color:#6E6A60">· ${esc(b.seed)}</span></span></div>`).join('');
  const falling = D.brandTrends.filter(b=>b.dir==='falling' && b.latest>0).map(b=>b.name);
  return { section:'The Trend Page', html:
  npBand('The Trend Page · Demand', '#C8102E', 'Google Trends · India · 12 months')+
  `<div class="np-headline np-h-l">Oreo Hits 100 as the Old Guard Fades</div>
   <div class="np-deck">Relative search interest (0–100) — a demand signal, not sales. One icon is peaking while the classics drift down.</div>
   <div class="np-rule"></div>
   <div class="np-flex" style="gap:16px;margin-bottom:11px">
     <div class="np-grow np-box np-shade"><div class="np-box-t" style="color:#C8102E;border-color:#C8102E">Cover star · ${esc(oreo?oreo.name:'Oreo')} ${oreo?oreo.latest:''}/100 ${oreo?npDir(oreo.dir):''}</div>
       <div style="display:flex;align-items:center;gap:14px"><div style="flex:1">${npSpark(oreo?oreo.series:[],{w:300,h:54,color:'#C8102E'})}</div></div>
       <div class="np-cap">Mondelez’s Oreo has climbed to a category-leading peak — “bts oreo biscuit” is a breakout query.</div>
     </div>
     <div style="width:250px;flex-shrink:0;display:flex;flex-direction:column" class="np-box"><div class="np-box-t">By category</div><div class="np-list">${cats}</div></div>
   </div>
   <div class="np-rowfill" style="gap:16px;align-items:stretch">
     <div class="np-grow np-box" style="display:flex;flex-direction:column"><div class="np-box-t">Brand search interest · ranked (0–100)</div><div class="np-bars" style="flex:1;justify-content:space-between;padding:8px 0">${barList}</div></div>
     <div style="width:286px;flex-shrink:0;display:flex;flex-direction:column" class="np-box"><div class="np-box-t" style="color:#C8102E;border-color:#C8102E">Breakouts · rising queries</div><div class="np-list">${brk}</div>
       <div class="np-cap">Consumer curiosity is running to mascarpone “creme”, 50-50 &amp; a BTS×Oreo tie-in. Fading: ${esc(falling.slice(0,4).join(', '))}.</div>
     </div>
   </div>` };
}

/* ---- PAGE 8 — LAST WORD ---- */
function npLastWord(D){
  const val = D.archs[0], prem = D.archs[D.archs.length-1];
  const fast = D.shareRanked.slice().sort((a,b)=>b.yoyGrowthPct-a.yoyGrowthPct)[0];
  const white = D.health.find(h=>h.read==='Whitespace');
  const histMed = D.hist.map(h=>h.overall.medianPpg).filter(v=>v!=null);
  const first = D.hist[0], last = D.hist[D.hist.length-1];
  const watch = [
    white?`<b>${esc(white.label)} whitespace.</b> ${white.demand}/100 demand on a ${white.supplyPct}% shelf — first mover wins a ${npPct(white.premium,0)} premium.`:'',
    falling(D),
    `<b>Discount-led volume.</b> The widest cuts (up to ${D.deepDisc[0]?Math.round(D.deepDisc[0].discount):'—'}% off) cluster in indulgent SKUs — watch margin, not just price.`,
    overSupplied(D),
    `<b>Quick-commerce pricing.</b> ${D.gapPct!=null?`q-commerce ran ${Math.abs(D.gapPct)}% ${D.gapPct>=0?'cheaper':'dearer'} per gram`:'channel gaps are opening'} — a structural shift in everyday biscuit economics.`,
  ].filter(Boolean);
  function falling(D){ const f=D.brandTrends.filter(b=>b.dir==='falling'&&b.latest>0).map(b=>b.name).slice(0,4); return f.length?`<b>Legacy demand erosion.</b> ${esc(f.join(', '))} are all softening in search — heritage equity is not the same as momentum.`:''; }
  function overSupplied(D){ const o=D.health.filter(h=>h.read==='Over-supplied').map(h=>h.label); return o.length?`<b>Over-supplied claims.</b> ${esc(o.join(' & '))} crowd the shelf with little matching search — priced high, demanded little.`:''; }
  return { section:'The Last Word', html:
  npBand('The Last Word · Outlook & Method', '#16161D', `Edition of ${esc(D.asOf)}`)+
  `<div class="np-headline np-h-l">The Market Read: A Barbell Aisle</div>
   <div class="np-deck">Cheap glucose volume at one end, premium &amp; clean-label indulgence at the other — and a thinning middle.</div>
   <div class="np-rule"></div>
   <div class="np-flex" style="gap:16px;margin-bottom:11px">
     <div class="np-grow np-cols np-cols-2">
       <div class="np-col"><div class="np-body">
         <p><span class="np-dropcap">T</span>he Indian biscuit aisle is splitting into a barbell. At one end, <b>${esc(val?val.company:'value')}</b> defends the floor at ${npPg(val?val.med:null)}/g, where volume and the magic ₹5 price-point still rule. At the other, <b>${esc(prem?prem.company:'premium')}</b> and the D2C newcomers push ${npPg(prem?prem.med:null)}/g on protein, no-maida and imported indulgence.</p>
         <p>The growth signal sits with the insurgents: <b>${esc(fast?fast.company:'—')}</b> posted the fastest revenue jump (${fast?npPct(fast.yoyGrowthPct):'—'}), and Oreo’s search is at a category peak.</p>
       </div></div>
       <div class="np-col"><div class="np-body">
         <p>For incumbents the playbook is twofold: defend the value core on price-per-gram, and answer the clean-label surcharge before the challengers compound. Parle and Mondelez carry <b>no</b> clean-label SKUs in our scan — a visible gap.</p>
         <p>For challengers, the opening is the whitespace: high-search, thin-shelf claims that already command double-digit ₹/g premiums. The aisle is rewarding the brands that move first.</p>
       </div></div>
     </div>
     <div style="width:230px;flex-shrink:0;display:flex;flex-direction:column" class="np-box np-shade"><div class="np-box-t">Movers · median ₹/g</div>
       <div class="np-list">
         <div style="text-align:center">${npSpark(histMed,{w:200,h:46,color:'#16161D'})}</div>
         <div class="np-stat"><span class="np-stat-l">${first?esc(first.ts.slice(0,10)):''}</span><span class="np-stat-v">${first?npPg(first.overall.medianPpg):'—'}</span></div>
         <div class="np-stat"><span class="np-stat-l">${last?esc(last.ts.slice(0,10)):''}</span><span class="np-stat-v">${last?npPg(last.overall.medianPpg):'—'}</span></div>
       </div>
       <div class="np-cap">Across ${D.hist.length} tracked snapshots. Shifts partly reflect changing SKU coverage.</div>
     </div>
   </div>
   <div class="np-box" style="margin-bottom:11px"><div class="np-box-t" style="color:#C8102E;border-color:#C8102E">Watch list</div>
     ${watch.map(w=>`<div class="np-li"><span class="np-li-n">▸</span><span>${w}</span></div>`).join('')}
   </div>
   <div class="np-fill np-box" style="background:#16161D;color:#FAF6EE;display:flex;flex-direction:column;justify-content:space-between;padding:15px 18px">
     <div>
       <div class="np-box-t" style="color:#FAF6EE;border-color:rgba(250,246,238,.4)">Colophon &amp; Method <span class="np-kick-font" style="font-weight:600;color:#C9C3B5;letter-spacing:.04em">Edition of ${esc(D.asOf)}</span></div>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:6px">
         <div class="np-body" style="color:#E9E4D8;font-size:10.5px;text-align:left">
           <p style="margin-bottom:4px"><b style="color:#fff" class="np-kapital">Where the data comes from</b></p>
           <p>• <b style="color:#fff">Amazon India</b> listings (live-scraped) — price, MRP, discount, net weight, ratings &amp; reviews.</p>
           <p>• <b style="color:#fff">Blinkit &amp; Zepto</b> — representative-metro quick-commerce pricing for the channel wire.</p>
           <p>• <b style="color:#fff">Google Trends</b> (via SerpApi) — relative search interest &amp; breakout queries.</p>
           <p>• <b style="color:#fff">Company filings &amp; industry reports</b> — biscuit revenue, growth &amp; market share.</p>
         </div>
         <div class="np-body" style="color:#E9E4D8;font-size:10.5px;text-align:left">
           <p style="margin-bottom:4px"><b style="color:#fff" class="np-kapital">How to read it</b></p>
           <p>• Hero metric is <b style="color:#fff">price-per-gram (₹/g)</b> — price ÷ net weight, shown as the median across in-stock packs.</p>
           <p>• Britannia &amp; ITC revenue is <b style="color:#fff">AUDITED</b>; Parle, Mondelez, Unibic &amp; The Whole Truth are <b style="color:#fff">ESTIMATED</b>, as are all share %s.</p>
           <p>• Clean-label flags are <b style="color:#fff">CLAIMED</b> from pack titles, not lab-verified; search interest is relative (0–100), not sales.</p>
           <p><b style="color:#fff">Nothing is fabricated</b> — every estimate &amp; claim is labelled.</p>
         </div>
       </div>
     </div>
     <div>
       <div style="border-top:1px solid rgba(250,246,238,.3);padding-top:10px;display:flex;justify-content:space-between;align-items:flex-end">
         <div><div class="np-title" style="font-size:27px;color:#FAF6EE;line-height:.9">BISCUIT INSIGHTS</div><div class="np-kick-font" style="font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#C9C3B5;margin-top:3px">The Price-per-Gram Chronicle · Published by Munshot</div></div>
         <div style="text-align:right">
           <div class="np-mono" style="font-size:13px;font-weight:700;color:#fff">${npInt(D.kpi.skus)} SKUs · ${D.kpi.brands} brands · ${D.kpi.companies} groups</div>
           <div class="np-kick-font" style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#C9C3B5;margin-top:3px">Generated by Biscuit Market Intelligence · ${esc(D.asOf)}</div>
         </div>
       </div>
     </div>
   </div>` };
}

/* ---- assemble pages (dynamic count — only sections with data) ---- */
function npPages(D){
  const defs = [ npFront(D) ];
  if (D.cheapBrands.length && D.packRows.length) defs.push(npPricing(D));
  if (D.catRows.length) defs.push(npCategory(D));
  if (D.shareRanked.length) defs.push(npCompetition(D));
  if (D.cmp.length || (D.eMed&&D.qMed)) defs.push(npChannels(D));
  if (D.health.length) defs.push(npHealth(D));
  if (D.brandTrends.length) defs.push(npTrends(D));
  defs.push(npLastWord(D));
  const total = defs.length;
  return defs.map((d,i)=>({ section:d.section, html:`<div class="np-page">${d.html}${npFolio(D.asOf,i+1,total,d.section)}</div>` }));
}

/* ---- lazy CDN + font loading (only when the user clicks) ---- */
let _npDeps = null;
function npLoadCss(href){ return new Promise(res=>{ if ([...document.querySelectorAll('link[rel=stylesheet]')].some(l=>l.href===href)) return res(); const l=document.createElement('link'); l.rel='stylesheet'; l.href=href; l.onload=()=>res(); l.onerror=()=>res(); document.head.appendChild(l); }); }
function npLoadScript(src, glob){ return new Promise((res,rej)=>{ if (glob && window[glob]) return res(); const s=document.createElement('script'); s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error('Failed to load '+src)); document.head.appendChild(s); }); }
function loadNewspaperDeps(){
  if (_npDeps) return _npDeps;
  _npDeps = Promise.all([
    npLoadCss('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=Fraunces:opsz,wght@9..144,600;700;900&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@500;600;700&display=swap'),
    npLoadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js', 'html2canvas'),
    npLoadScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js', 'jspdf'),
  ]);
  return _npDeps;
}
async function npFontsReady(){
  try{
    if (document.fonts && document.fonts.load){
      await Promise.all([
        document.fonts.load('900 64px "Playfair Display"'), document.fonts.load('900 32px "Fraunces"'),
        document.fonts.load('700 16px "Fraunces"'), document.fonts.load('400 12px "Newsreader"'),
        document.fonts.load('italic 400 14px "Newsreader"'), document.fonts.load('700 12px "IBM Plex Mono"'),
        document.fonts.load('600 11px "IBM Plex Mono"'), document.fonts.load('800 11px "Inter"'),
      ]);
      await document.fonts.ready;
    }
  }catch(e){ /* fall back to whatever fonts are available */ }
}
function buildNewspaperStage(D){
  const stage = document.createElement('div');
  stage.className = 'np-stage';
  stage.innerHTML = npPages(D).map(p=>p.html).join('');
  return stage;
}
async function npExport(stage, asOf){
  const jsPDFctor = window.jspdf && window.jspdf.jsPDF;
  if (!jsPDFctor || !window.html2canvas) throw new Error('PDF libraries unavailable');
  const pdf = new jsPDFctor({ unit:'px', format:[794,1123], orientation:'portrait', compress:true });
  const pages = stage.querySelectorAll('.np-page');
  for (let i=0;i<pages.length;i++){
    const canvas = await window.html2canvas(pages[i], { scale:2, backgroundColor:'#FAF6EE', useCORS:true, logging:false, width:794, height:1123, windowWidth:794, windowHeight:1123 });
    const img = canvas.toDataURL('image/jpeg', 0.94);
    if (i>0) pdf.addPage([794,1123],'portrait');
    pdf.addImage(img, 'JPEG', 0, 0, 794, 1123, undefined, 'FAST');
  }
  pdf.save(`Biscuit-Insights-${asOf||new Date().toISOString().slice(0,10)}.pdf`);
}
let _npBusy = false;
async function getInsight(){
  if (_npBusy) return;
  if (!(STATE.skus && STATE.skus.length)){ alert('No data to report yet — once the dashboard has loaded its data, try again.'); return; }
  const btn = document.getElementById('npBtn'); const label = btn ? btn.innerHTML : '';
  _npBusy = true; if (btn){ btn.disabled = true; btn.innerHTML = '📰 Composing your edition…'; }
  let stage = null;
  try{
    await loadNewspaperDeps();
    const D = npData();
    stage = buildNewspaperStage(D);
    document.body.appendChild(stage);
    await npFontsReady();
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));   // let layout settle
    await npExport(stage, D.asOf);
  }catch(e){
    console.error('Newspaper export failed', e);
    alert('Sorry — the newspaper could not be generated. ' + (e && e.message ? e.message : ''));
  }finally{
    if (stage && stage.parentNode) stage.parentNode.removeChild(stage);
    if (btn){ btn.disabled = false; btn.innerHTML = label; }
    _npBusy = false;
  }
}

/* ------------------------------------------------------------
   8. BOOT
   ------------------------------------------------------------ */
document.addEventListener('keydown', e=>{
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'A' || e.key === 'a')){
    e.preventDefault();
    navigate({type:'admin'});
  }
});

// Boot: paint immediately (loading state), then fetch the latest static data and re-render.
// No client refresh button — a page visit IS the refresh; the weekly scrape keeps data current.
STATE.loading = true;
render();
loadData().then(() => { STATE.loading = false; render(); });
</script>
