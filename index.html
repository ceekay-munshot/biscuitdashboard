<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biscuit Market Intelligence — India Pricing Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Charting engine (async) — wired into the data views from a later build step. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" async></script>
<!-- Excel export (defer) — used by the export feature in a later build step. -->

<style>
/* ============================================================
   DESIGN SYSTEM — base (shared with the reference dashboard)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0ede8;color:#1a1a18;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:1020px;margin:0 auto;padding:28px 20px}
button{font-family:'Inter',sans-serif;background:#fff;color:#1a1a18;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;cursor:pointer;transition:background .12s,transform .1s;font-size:13px;padding:7px 14px}
button:hover:not(:disabled){background:#f7f6f3}
button:active:not(:disabled){transform:scale(0.98)}
button:disabled{opacity:.6;cursor:not-allowed}
.card{background:#fff;border:0.5px solid rgba(26,26,24,0.12);border-radius:14px;overflow:hidden}
.card-pad{padding:16px 18px}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:7px 10px;font-weight:600;color:#9b9a96;font-size:11px;letter-spacing:.04em;border-bottom:0.5px solid rgba(26,26,24,0.1);text-transform:uppercase}
td{padding:8px 10px;border-bottom:0.5px solid rgba(26,26,24,0.07)}
.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;display:inline-block}
.stat-box{background:#f7f6f3;border-radius:10px;padding:12px 14px}
.stat-box .sl{font-size:11px;color:#9b9a96;margin-bottom:4px;font-weight:500}
.stat-box .sv{font-size:22px;font-weight:700}
.bar-wrap{flex:1;height:7px;background:#f0ede8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.delta-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .3s ease both}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.1s ease-in-out infinite;vertical-align:middle;margin-right:5px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:16px}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px}
.step-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
input[type=text]{font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;width:100%;outline:none;background:#fafaf8}
input:focus{border-color:#B6772E;box-shadow:0 0 0 3px rgba(182,119,46,.12)}
@media(max-width:640px){
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .ov-head{flex-direction:column;align-items:flex-start;gap:10px}
  .ov-actions{width:100%;flex-wrap:wrap}
  .ov-actions button{flex:1 1 auto;font-size:12px}
  .ov-title,.hero-title{font-size:20px}
  .exec-h{font-size:15px}
  .chart-box{height:240px!important}
  .card-pad{padding:14px}
  table{font-size:12px}
  .chips{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .back-bar{flex-wrap:wrap}
}

/* ============================================================
   DESIGN SYSTEM — dashboard-specific extensions
   ============================================================ */
.back-bar{border-bottom:0.5px solid rgba(26,26,24,.1)}

/* Hero / empty state */
.hero{max-width:640px;margin:64px auto 0;text-align:center}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#B6772E;margin-bottom:14px}

.ov-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.ov-title{font-size:23px;font-weight:700;letter-spacing:-.02em}

/* Company × category heatmap */
.hm{border-collapse:separate;border-spacing:3px}

.hm-corner{width:118px}

.hm-row{font-size:12px;font-weight:500;white-space:nowrap;width:118px}

.hm-cap{font-size:11px;color:#9b9a96;margin-top:10px}

.hm-card{cursor:pointer;transition:border-color .12s}
.hm-card:hover{border-color:rgba(182,119,46,.45)}

/* Category view */
.cat-name{font-size:14px;font-weight:700;margin-bottom:8px}
.cat-top{font-size:10.5px;font-weight:600;color:#9b9a96;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 9px}
.catbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11.5px}

.catbar-val{width:46px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;flex-shrink:0}

/* Detail views (company / brand) */
.detail-title{font-size:18px;font-weight:700}
.co-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;display:inline-block}
.kstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:12px;margin-bottom:16px}
.kstrip .sv{font-size:18px}

td a{color:#1a1a18;text-decoration:none}

.clickable{cursor:pointer}

/* History view */

.board-row:last-child{border-bottom:0}
.seg{font-size:12px;padding:5px 11px}
.seg.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.sig-card .sig-brand{font-size:13px;font-weight:700;margin-bottom:8px}

.sig-sub{font-size:11px;color:#9b9a96;margin-top:6px}

/* Market Share & Sales view */

<div id="app"></div>

<script>
/* ============================================================
   BISCUIT MARKET INTELLIGENCE DASHBOARD
   Build Step 14 / 14 (FINALE) — Excel export, ₹/g distribution + box plots, provenance, polish
   Single-file, zero-build. Vanilla ES6.

   Scraping runs in GitHub Actions (scripts/scrape.mjs) and commits
   data/latest.json + data/history.json. This client only READS that
   JSON — no Firecrawl key, no parser, no runtime scraping here.
   ============================================================ */

/* ------------------------------------------------------------
   1. ENTITY MODEL  (configurable starting roster)
   ------------------------------------------------------------ */
const COL = {"Britannia":"#C8102E","Parle":"#C77800","ITC Sunfeast":"#7B2D8E","Mondelez":"#1D4E9C","Unibic":"#138A6E","Emerging / D2C":"#E05A2B"};
const BG  = {"Britannia":"#FBE7EA","Parle":"#FAF0DC","ITC Sunfeast":"#F2E7F5","Mondelez":"#E6EDF8","Unibic":"#DFF1EB","Emerging / D2C":"#FCEAE1"};
const TXT = {"Britannia":"#7A0A1C","Parle":"#6E4300","ITC Sunfeast":"#45184F","Mondelez":"#102C58","Unibic":"#0A4A3A","Emerging / D2C":"#7A2D10"};

const BRANDS = [
  {brand:"Good Day",             company:"Britannia"},
  {brand:"Bourbon",              company:"Britannia"},
  {brand:"Marie Gold",           company:"Britannia"},
  {brand:"NutriChoice",          company:"Britannia"},
  {brand:"Parle-G",              company:"Parle"},
  {brand:"Monaco",               company:"Parle"},
  {brand:"Hide & Seek",          company:"Parle"},
  {brand:"KrackJack",            company:"Parle"},
  {brand:"Dark Fantasy",         company:"ITC Sunfeast"},
  {brand:"Mom's Magic",          company:"ITC Sunfeast"},
  {brand:"Sunfeast Marie Light", company:"ITC Sunfeast"},
  {brand:"Oreo",                 company:"Mondelez"},
  {brand:"Unibic",               company:"Unibic"},
  {brand:"The Whole Truth",      company:"Emerging / D2C"},
];

const CATEGORIES = ["Cookies","Digestive","Cream","Crackers","Rusk","Wafer","Other"];
const CHIP_ORDER = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer","Other"]; // chip display order
const HEATMAP_CATS = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer"];       // 6 client categories (heatmap columns)
const CAT_COL = {Cookies:"#C77800",Cream:"#7B2D8E",Digestive:"#138A6E",Crackers:"#1D4E9C",Rusk:"#9B6B2E",Wafer:"#C8102E",Other:"#9b9a96"};

// Pack-size bands (thresholds configurable). packBand(weightGrams) → band name.
const PACK_ORDER = ["Mini","Small","Medium","Large","Family","Jumbo"];
const PACK_RANGE = {Mini:"<50g",Small:"50–99g",Medium:"100–199g",Large:"200–399g",Family:"400–799g",Jumbo:"≥800g"};
function packBand(g){
  g = +g;
  if (g < 50)  return "Mini";
  if (g < 100) return "Small";
  if (g < 200) return "Medium";
  if (g < 400) return "Large";
  if (g < 800) return "Family";
  return "Jumbo";
}

// Seeded TYPICAL shelf life (months) by category — listing pages don't carry it,
// so this is a category estimate (editable), never a per-SKU scrape.
const SHELF_LIFE = {Cream:6,Cookies:9,Digestive:9,Crackers:9,Wafer:6,Rusk:6,Other:9};
const shelfLifeFor = cat => SHELF_LIFE[cat] != null ? SHELF_LIFE[cat] : 9;

/* ------------------------------------------------------------
   2. GLOBAL STATE
   ------------------------------------------------------------ */
const TODAY = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

let STATE = {
  skus:[],              // raw SKUs from data/latest.json
  scrapedAt:null,       // ISO timestamp of the scrape
  curr:null,            // buildStats() result over the FULL dataset (chips, heatmap)
  categoryFilter:'All', // active category chip
  trends:null,          // data/trends.json (seeded Google Trends snapshot)
  trendsMode:'brands',  // Trends view main-chart toggle: 'brands' | 'categories'
  trendsSeed:null,      // Trends view related-queries seed toggle (null → first seed)
  share:null,           // data/marketshare.json (market share / sales — audited + labelled estimates)
  history:[],           // data/history.json
  loading:false,        // true while (re)loading the static JSON
  view:null,            // active route (null/'dashboard' default; objects carry .type)
  insight:'',           // AI insight text (later step)
  insightLoading:false  // AI insight loading flag (later step)
};

   3. CHART HELPERS  (defined now, used from a later step)
   ------------------------------------------------------------ */

  const t = setInterval(()=>{ if (window.Chart){ clearInterval(t); cb(); } }, 60);
}
function destroyCharts(){

  charts = {};
}
function mkChart(id, cfg){

/* ------------------------------------------------------------
   4. STATS ENGINE  (price-per-gram aggregations — hero metric)
   ------------------------------------------------------------ */
// Summary stats for a numeric array, each rounded to `dp` decimals.
function calcStats(nums, dp){
  const r = v => +(+v).toFixed(dp);
  if (!nums || !nums.length) return { avg:0, median:0, min:0, max:0, p25:0, p75:0, count:0 };
  const a = nums.slice().sort((x,y)=>x-y), n = a.length;
  const q = p => { const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };
  return {
    avg: r(a.reduce((s,x)=>s+x,0)/n),
    median: r(q(0.5)),
    min: r(a[0]), max: r(a[n-1]),
    p25: r(q(0.25)), p75: r(q(0.75)),
    count: n
  };
}

// Positioning tier from median ₹/g (starting thresholds, easy to tweak).
function positioning(medianPpg){
  if (medianPpg < 0.25) return 'Value';
  if (medianPpg <= 0.50) return 'Mainstream';
  return 'Premium';
}

// Group SKUs by company / brand / category and compute ₹/g (hero) + discount
// (secondary) stats, ratings and review sums for each group.
function buildStats(skus, scrapedAt = STATE.scrapedAt){
  const groupBy = key => {
    const m = new Map();
    for (const s of skus){ const k = s[key]; if (!m.has(k)) m.set(k, []); m.get(k).push(s); }
    return m;
  };
  const statFor = (gs, label, extra) => {
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    const categoryCounts = {};
    for (const s of gs) categoryCounts[s.category] = (categoryCounts[s.category]||0)+1;
    return Object.assign({
      name: label,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),   // hero metric
      disc: calcStats(gs.map(s=>s.discount), 1),       // secondary metric
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      reviewSum: gs.reduce((a,s)=>a+(s.reviewCount||0),0),
      categoryCounts,
      skus: gs
    }, extra);
  };

  const companyStats  = [...groupBy('company')].map(([company,gs])  => statFor(gs, company,  { company }));
  const brandStats    = [...groupBy('brand')].map(([brand,gs])      => statFor(gs, brand,    { brand, company: gs[0].company }));
  const categoryStats = [...groupBy('category')].map(([category,gs])=> statFor(gs, category, { category }));   // rendered in Step 4

  const byMedianDesc = (a,b) => b.ppg.median - a.ppg.median;       // premium-per-gram first
  companyStats.sort(byMedianDesc);
  brandStats.sort(byMedianDesc);

  return { companyStats, brandStats, categoryStats, scrapedAt, skuCount: skus.length };
}

/* ===========================================================
   INTELLIGENCE ENGINE (Step 13) — synthesises ₹/g pricing +
   market share + Google Trends demand into per-company intel.
   companyIntel(stat, share, demand, ctx) is PURE & deterministic
   from real data — nothing fabricated, shelf-life NOT a driver,
   estimated shares never stated as hard fact.
   =========================================================== */
const PPG_LOW=0.25, PPG_HIGH=0.55, SHARE_HIGH=25, SHARE_MID=8, DISC_HEAVY=25, YOY_EMERGING=20;  // editable thresholds

const ARCH = {
  value:     { key:'value',     label:'Value Leader',      descriptor:'owns mass-market value' },
  premium:   { key:'premium',   label:'Premium Hold',      descriptor:'pricing power per gram' },
  scale:     { key:'scale',     label:'Scale Premiumizer', descriptor:'scale + premiumization' },
  challenger:{ key:'challenger',label:'Growth Challenger',  descriptor:'buying share' },
  insurgent: { key:'insurgent', label:'Insurgent (D2C)',   descriptor:'disruptor to watch' },
  discount:  { key:'discount',  label:'Discount-Led',      descriptor:'promo-driven volume' },
};
const ARCH_PHRASE = { value:'the mass-market value engine', scale:'the scale player', premium:'a premium holder',
  challenger:'a growth challenger', insurgent:'an insurgent disruptor', discount:'a promo-led player' };
const ARCH_TAKE = {
  value:'the volume engine; defend ₹/g and guard against premium leakage',
  scale:'a dominant premiumizer holding the centre of the market',
  premium:'pricing power intact — protect the premium',
  challenger:'spending demand and promo to take share; momentum to track',
  insurgent:'tiny but fast — the disruptor to watch',
  discount:'leaning on promotions for volume, with margin risk' };
const SENT = {
  strong:    { key:'strong',    icon:'🟢', word:'Strong',    cls:'sent-strong' },
  steady:    { key:'steady',    icon:'🟡', word:'Steady',    cls:'sent-steady' },
  pressured: { key:'pressured', icon:'🟠', word:'Pressured', cls:'sent-pressured' },
  watch:     { key:'watch',     icon:'🔴', word:'Watch',     cls:'sent-watch' },
};

function pickSku(skus, score){ let best=null, bs=-Infinity; for (const s of skus){ const v=score(s); if (v>bs){ bs=v; best=s; } } return best; }

// Roll the company's tracked brands up into one search-interest reading + direction.
function demandForCompany(company){
  const t = STATE.trends; if (!t || !t.brands) return null;
  const present = BRANDS.filter(b=>b.company===company).map(b=>t.brands[b.brand]).filter(Boolean);
  if (!present.length) return null;
  const interest = Math.round(present.reduce((a,x)=>a+(x.latest||0),0)/present.length);
  const dirs = present.map(x=>x.direction);
  const direction = dirs.includes('rising') && !dirs.includes('falling') ? 'rising'
                  : dirs.length && dirs.every(d=>d==='falling') ? 'falling' : 'flat';
  return { interest, direction, brandCount: present.length };
}
// Find this company group's market-share record (names differ slightly between files).
function shareForCompany(company){
  const s = STATE.share; if (!s || !Array.isArray(s.companies)) return null;
  const rx = { 'Britannia':/^Britannia/, 'Parle':/^Parle/, 'ITC Sunfeast':/ITC|Sunfeast/i,
    'Mondelez':/Mondelez/i, 'Unibic':/Unibic/i, 'Emerging / D2C':/Whole Truth|D2C/i }[company];
  return rx ? s.companies.find(c=>rx.test(c.company)) : null;
}
// A real, current breakout/rising query from Google Trends related (for the sector read).
function marketBreakoutQuery(){
  const rel = STATE.trends && STATE.trends.related; if (!rel) return null;
  for (const seed of Object.keys(rel)){
    const rising = rel[seed].rising || [];
    const brk = rising.find(x=>/breakout/i.test(x.value||'')) || rising[0];
    if (brk && brk.query) return brk.query;
  }
  return null;
}
// Mark the cheapest/priciest company by median ₹/g (for narrative framing).
function marketPpgContext(companyStats){
  const withPpg = companyStats.filter(c=>c.ppg && c.ppg.count);
  const map = {};
  if (!withPpg.length) return map;
  const sorted = withPpg.slice().sort((a,b)=>a.ppg.median-b.ppg.median);
  const lo = sorted[0].company, hi = sorted[sorted.length-1].company;
  companyStats.forEach(c=>map[c.company] = { cheapest:c.company===lo, priciest:c.company===hi });
  return map;
}

function archetypeOf(sig){
  const ppg=sig.medianPpg, sh=sig.share==null?0:sig.share, disc=sig.avgDisc, g=sig.yoy==null?0:sig.yoy;
  const dir=sig.direction, emerging=/Emerging|D2C/i.test(sig.company||'');
  if (disc >= DISC_HEAVY)                                      return ARCH.discount;
  if (ppg < PPG_LOW  && sh >= SHARE_HIGH)                      return ARCH.value;
  if (ppg < PPG_HIGH && sh >= SHARE_HIGH)                      return ARCH.scale;
  if (ppg >= PPG_HIGH && sh >= SHARE_MID)                      return ARCH.premium;
  if (sh < SHARE_MID && (g >= YOY_EMERGING || emerging) && ppg >= 0.45) return ARCH.insurgent;
  if (dir==='rising' || (sh>=SHARE_MID && sh<SHARE_HIGH) || (g>0 && sh<SHARE_HIGH)) return ARCH.challenger;
  return ARCH.challenger;
}
function sentimentOf(sig){
  const dir=sig.direction, g=sig.yoy==null?0:sig.yoy, disc=sig.avgDisc, i=sig.interest||0;
  if (dir==='falling' && (g<=3 || disc>=DISC_HEAVY))                            return SENT.watch;
  if ((dir==='rising' && g>5) || (g>=8 && dir!=='falling' && i>=20 && disc<22)) return SENT.strong;
  if (disc>=DISC_HEAVY || dir==='falling' || g<=0)                              return SENT.pressured;
  return SENT.steady;
}
function narrativeOf(sig, arch, ctx){
  const ppg = (sig.medianPpg!=null ? sig.medianPpg : 0).toFixed(2);
  const place = ctx && ctx.cheapest ? ' — the lowest ₹/g on the board'
              : ctx && ctx.priciest ? ' — the most premium ₹/g on the board' : '';
  const s1 = `${sig.company} is ${ARCH_PHRASE[arch.key]||arch.label} at ₹${ppg}/g (median) across ${sig.skuCount} SKUs${place}.`;
  let s2 = '';
  if (sig.share!=null) s2 += `It holds an estimated ~${sig.share}% market share`;
  if (sig.revenue!=null){
    const basis = sig.shareEstimated ? 'estimated' : 'audited';
    s2 += `${sig.share!=null?' on ':'On '}${basis} ${fmtCr(sig.revenue)}${sig.yoy!=null?` (${sig.yoy>=0?'+':''}${sig.yoy}% YoY)`:''}`;
  }
  const dirWord = sig.direction==='rising'?'rising':sig.direction==='falling'?'softening':'flat';
  s2 += `${s2?', with ':'With '}${dirWord} search interest${sig.interest!=null?` (${sig.interest}/100)`:''}.`;
  const s3 = `Its range skews ${sig.topCategory} and discounts ~${Math.round(sig.avgDisc)}% on average — ${ARCH_TAKE[arch.key]||''}.`;
  return `${s1} ${s2} ${s3}`;
}

// PURE: the three real datasets → one company's intelligence.
function companyIntel(stat, share, demand, ctx){
  const skus = stat.skus || [];
  const priced = skus.filter(s=>s.pricePerGram>0);
  const sig = {
    company: stat.company || stat.name,
    medianPpg: stat.ppg.median, avgDisc: stat.disc.avg, skuCount: skus.length, reviews: stat.reviewSum||0,
    topCategory: Object.entries(stat.categoryCounts||{}).sort((a,b)=>b[1]-a[1]).map(([k])=>k)[0] || '—',
    share: share ? share.marketSharePct : null,
    shareEstimated: share ? !!share.isEstimated : true,
    revenue: share ? share.biscuitRevenueCr : null,
    yoy: share ? share.yoyGrowthPct : null,
    interest: demand ? demand.interest : null,
    direction: demand ? demand.direction : 'flat',
    cheapest: pickSku(priced, s=>-s.pricePerGram),
    priciest: pickSku(priced, s=>s.pricePerGram),
    mostDiscounted: pickSku(skus, s=>s.discount||0),
    mostReviewed: pickSku(skus, s=>s.reviewCount||0),
  };
  const archetype = archetypeOf(sig);
  const sentiment = sentimentOf(sig);
  const signal = `${archetype.descriptor} · ${sentiment.word}`;
  return { archetype, sentiment, narrative: narrativeOf(sig, archetype, ctx), signal, signals: sig };
}

// Compute intel for every present company once (reused by KPI cards, exec cards, market read).
function buildIntel(companyStats){
  const ctxMap = marketPpgContext(companyStats);
  const map = {};
  companyStats.forEach(c=>{ map[c.company] = companyIntel(c, shareForCompany(c.company), demandForCompany(c.company), ctxMap[c.company]); });
  return map;
}
const demandArrow = d => d==='rising' ? '<span style="color:#0A4A3A">▲</span>' : d==='falling' ? '<span style="color:#7A0A1C">▼</span>' : '<span class="muted">→</span>';

// PART C — three screenshot-worthy executive-summary slides.
function execSummaryHTML(companyStats, intel){
  const cos = companyStats.filter(c=>intel[c.company]);
  if (cos.length < 2) return '';
  const byShare = cos.slice().sort((a,b)=>(intel[b.company].signals.share||0)-(intel[a.company].signals.share||0));

  const dot = co => `<span class="dot" style="background:${COL[co]||'#999'}"></span>`;

  const c1 = byShare.map(c=>{ const S=intel[c.company].signals, a=intel[c.company].archetype; return `<tr>
    <td>${dot(c.company)}${esc(c.company)}</td>
    <td><span class="arch-badge arch-${a.key}">${a.label}</span></td>
    <td class="num">${rs2(S.medianPpg)}</td>
    <td class="num">${Math.round(S.avgDisc)}%</td>

  const skuCell = (s, metric) => s ? `<a href="${esc(s.url||'#')}" target="_blank" rel="noopener" title="${esc(s.name||'')}">${esc((s.name||'').slice(0,32))}</a><div class="exec-sub2">${metric}</div>` : '<span class="muted">—</span>';
  const c2 = byPpg.map(c=>{ const S=intel[c.company].signals; return `<tr>
    <td>${dot(c.company)}${esc(c.company)}</td>
    <td>${skuCell(S.cheapest, S.cheapest?rs2(S.cheapest.pricePerGram)+'/g · best value':'')}</td>
    <td>${skuCell(S.priciest, S.priciest?rs2(S.priciest.pricePerGram)+'/g · premium':'')}</td>
    <td>${skuCell(S.mostDiscounted, S.mostDiscounted?Math.round(S.mostDiscounted.discount||0)+'% off':'')}</td>
    <td>${skuCell(S.mostReviewed, S.mostReviewed?kCompact(S.mostReviewed.reviewCount||0)+' reviews':'')}</td></tr>`; }).join('');

  const c3 = byShare.map(c=>{ const S=intel[c.company].signals, se=intel[c.company].sentiment; return `<tr>
    <td>${dot(c.company)}${esc(c.company)}</td>
    <td>${se.icon} ${se.word}</td>
    <td class="num">${demandArrow(S.direction)} ${S.interest!=null?S.interest:'—'}</td>
    <td class="num">${rs2(S.medianPpg)}</td>
    <td class="num">${S.share!=null?'~'+S.share+'%':'—'}</td>
    <td class="num">${Math.round(S.avgDisc)}%</td></tr>`; }).join('');

  const slide = (g, n, title, sub, head, body) => `
    <div class="exec-card fadein">
      <div class="exec-head ${g}"><div class="exec-slide">Exec Summary · Slide ${n} of 3</div><div class="exec-h">${title} <span class="exec-h-sub">${sub}</span></div></div>
      <div class="exec-body"><table class="exec-tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>${body===c3?`<div class="exec-take">${sectorTakeaway(cos, intel)}</div>`:''}</div>
    </div>`;

  return `<div class="sec-title" style="margin-top:4px">Executive summary</div>`
    + slide('exec-g1', 1, 'Who’s playing what game?', 'market archetypes',
        '<th>Company</th><th>Archetype</th><th>Median ₹/g</th><th>Avg disc</th><th>Share</th><th>Demand</th>', c1)
    + slide('exec-g2', 2, 'Cheapest vs premium per gram', 'the value spectrum',
        '<th>Company</th><th>Best value (₹/g)</th><th>Most premium</th><th>Deepest discount</th><th>Demand hero</th>', c2)
    + slide('exec-g3', 3, 'Demand &amp; momentum scorecard', 'sentiment × search × ₹/g',
        '<th>Company</th><th>Sentiment</th><th>Search</th><th>Median ₹/g</th><th>Share</th><th>Avg disc</th>', c3);
}

// Card-3 synthesis paragraph — who leads value/premium, who's rising, a real breakout query, the ₹/g spread.
function sectorTakeaway(cos, intel){
  const sigs = cos.map(c=>intel[c.company].signals);
  const byPpg = sigs.slice().sort((a,b)=>a.medianPpg-b.medianPpg);
  const valueLeader = byPpg[0], premiumLeader = byPpg[byPpg.length-1];
  const spread = premiumLeader.medianPpg / (valueLeader.medianPpg || 1);
  const rising = sigs.filter(s=>s.direction==='rising').sort((a,b)=>(b.interest||0)-(a.interest||0))[0]
              || sigs.slice().sort((a,b)=>(b.yoy||0)-(a.yoy||0))[0];
  const brk = marketBreakoutQuery();
  return `<strong>Sector read.</strong> ${esc(valueLeader.company)} anchors the value end at ₹${valueLeader.medianPpg.toFixed(2)}/g, while ${esc(premiumLeader.company)} sits at the premium end (₹${premiumLeader.medianPpg.toFixed(2)}/g) — a <strong>${spread.toFixed(1)}× ₹/g spread</strong> across the market. `
    + (rising ? `${esc(rising.company)} carries the momentum (${rising.direction==='rising'?'rising search interest':'+'+rising.yoy+'% revenue growth'}). ` : '')
    + (brk ? `A genuine breakout query right now: <em>“${esc(brk)}”</em> — emerging demand worth tracking. ` : '')
    + `Median ₹/g stays the hero metric; discount intensity and search interest are the secondary tells.`;
}

  </div></div>`;
}

/* ------------------------------------------------------------
   5. DATA LOADING  (reads the CI-committed static JSON)
   ------------------------------------------------------------ */
async function loadData(){
  const bust = '?_=' + Date.now();   // cache-bust so ↻ Reload sees fresh data

  STATE.skus = []; STATE.scrapedAt = null; STATE.curr = null;
  try {
    const r = await fetch('/data/latest.json' + bust, { cache:'no-store' });
    if (r.ok){
      const d = await r.json();
      if (d && Array.isArray(d.skus)){
        STATE.skus = d.skus;
        STATE.scrapedAt = d.scrapedAt || null;
        if (d.skus.length) STATE.curr = buildStats(d.skus);
      }
    }
  } catch(e){ /* fail soft → empty state */ }

  try {
    const r = await fetch('/data/history.json' + bust, { cache:'no-store' });
    if (r.ok){
      const h = await r.json();
      STATE.history = Array.isArray(h) ? h : [];
    }
  } catch(e){ STATE.history = []; }

  try {
    const r = await fetch('/data/trends.json' + bust, { cache:'no-store' });
    STATE.trends = r.ok ? await r.json() : null;     // seeded Google Trends snapshot
  } catch(e){ STATE.trends = null; }

  try {
    const r = await fetch('/data/marketshare.json' + bust, { cache:'no-store' });
    STATE.share = r.ok ? await r.json() : null;      // market share / sales (audited + labelled estimates)
  } catch(e){ STATE.share = null; }
}

async function reload(){
  STATE.loading = true; render();
  await loadData();
  STATE.loading = false; render();
}

/* ------------------------------------------------------------
   6. ROUTER
   ------------------------------------------------------------ */
function navigate(view){
  STATE.view = view;
  window.scrollTo(0,0);
  render();
}

function render(){
  destroyCharts();
  const v = STATE.view;
  const type = (v == null) ? 'dashboard' : (typeof v === 'string' ? v : v.type);

  switch (type){
    case 'admin':
      renderAdmin();
      break;

    case 'category':
      renderCategory();
      break;

    case 'packsize':
      renderPackSize();
      break;

    case 'company':
      renderCompany(v && v.company);
      break;

    case 'brand':
      renderBrand(v && v.brand);
      break;

    case 'history':
      renderHistory();
      break;

    case 'trends':
      renderTrends();
      break;

    case 'radar':
      renderRadar();
      break;

    case 'share':
      renderShare();
      break;

    case 'dashboard':
    default:
      renderDashboard();
      break;
  }
}

/* ------------------------------------------------------------
   7. RENDERERS
   ------------------------------------------------------------ */
const $app = () => document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rs2 = v => '₹' + (+v).toFixed(2);                 // ₹/g formatter
const revNum = n => n!=null ? Number(n).toLocaleString('en-IN') : '—';   // full review count
const kCompact = n => n>=1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'')+'M' : n>=1e3 ? Math.round(n/1e3)+'k' : String(n);
const linkName = s => s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>` : esc(s.name);
// Safe inline onclick="navigate({type,[key]:val})" — escapes ' for JS and & for HTML.
const navAttr = (type, key, val) => esc(`navigate({type:'${type}',${key}:'${String(val).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'})`);
// KPI strip of labelled stat boxes.
const kpiStrip = items => `<div class="kstrip">${items.map(it=>`<div class="stat-box"><div class="sl">${it.label}</div><div class="sv">${it.value}</div></div>`).join('')}</div>`;
// History helpers
const slug = s => String(s).replace(/[^a-z0-9]/gi,'_');
const fmtRun = ts => { const d=new Date(ts); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); };
// Delta badge: coloured ▲/▼ vs a prior value (gray ±0 below epsilon; n/a when missing).
function deltaBadge(cur, prv, fmtMag){
  if (cur==null || prv==null) return '<span class="muted" style="font-size:11px">vs n/a</span>';
  const d = +cur - +prv;
  if (Math.abs(d) < 1e-9) return '<span class="delta-badge" style="background:#f0ede8;color:#9b9a96">±0</span>';
  const up = d>0;
  return `<span class="delta-badge" style="background:${up?'#FBE7EA':'#DFF1EB'};color:${up?'#7A0A1C':'#0A4A3A'}">${up?'▲':'▼'} ${fmtMag(Math.abs(d))}</span>`;
}

// Mini ₹/g box plot (min · p25 · median · p75 · max), scaled to a shared market range so cards compare.
function boxStripHTML(ppg, gMin, gMax, col){
  if (!ppg || !ppg.count) return '';
  const span = (gMax - gMin) || 1;
  const pc = v => +(Math.max(0, Math.min(100, ((v - gMin) / span) * 100))).toFixed(1);
  const lo=pc(ppg.min), q1=pc(ppg.p25), me=pc(ppg.median), q3=pc(ppg.p75), hi=pc(ppg.max);
  return `<div class="box-strip" title="₹/g spread — min ${rs2(ppg.min)} · p25 ${rs2(ppg.p25)} · median ${rs2(ppg.median)} · p75 ${rs2(ppg.p75)} · max ${rs2(ppg.max)}">
    <span class="box-w" style="left:${lo}%;right:${100-hi}%"></span>
    <span class="box-iqr" style="left:${q1}%;right:${100-q3}%;background:${col}"></span>
    <span class="box-med" style="left:${me}%"></span>
  </div>`;
}

function setCategoryFilter(cat){ STATE.categoryFilter = cat; render(); }
function currentFilterSkus(){
  const f = STATE.categoryFilter || 'All';

}
function brandCompany(brand){ const b = BRANDS.find(x=>x.brand===brand); return b ? b.company : null; }
function hexToRgba(hex, a){
  const h = String(hex).replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(x=>x+x).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${(+a).toFixed(3)})`;
}
// Top-N brands in a SKU set by SKU count (tiebreak: higher ₹/g), with each brand's median ₹/g.
function topBrands(skus, n){
  const m = new Map();
  for (const s of skus){ if (!m.has(s.brand)) m.set(s.brand, []); m.get(s.brand).push(s); }
  return [...m].map(([brand,gs])=>({ brand, n:gs.length, ppgMedian: calcStats(gs.map(s=>s.pricePerGram),3).median }))
    .sort((a,b)=> b.n - a.n || b.ppgMedian - a.ppgMedian).slice(0,n);
}

function drawOverviewCharts(view){
  const bs = view ? view.brandStats : [];

  const colors = bs.map(b=>COL[b.company] || '#999');
  const opts = unit => ({
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    onClick:(e,els)=>{ if (els && els.length) navigate({type:'brand', brand: bs[els[0].index].brand}); },
    onHover:(e,els)=>{ e.native && (e.native.target.style.cursor = els.length ? 'pointer' : 'default'); },
    plugins:{ legend:{display:false},
      tooltip:{ callbacks:{ label:c => unit==='ppg' ? '₹'+(+c.raw).toFixed(2)+'/g' : (+c.raw).toFixed(1)+'% off' } } },
    scales:{
      x:{ beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'},
          ticks:{ font:{size:10}, callback:v => unit==='ppg' ? '₹'+v : v+'%' } },
      y:{ grid:{display:false}, ticks:{ font:{size:10.5} } }
    }
  });
  waitForChart(()=>{
    mkChart('chartPpg', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.ppg.median), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('ppg') });
    mkChart('chartDisc', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.disc.avg), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('disc') });

    // ₹/g distribution — SKU counts per bucket, one line per company.
    const cs = view.companyStats || [];
    const hiPpg = Math.max(0.6, ...cs.flatMap(c=>c.skus.map(s=>s.pricePerGram||0)));
    const BIN = 0.1, nb = Math.min(16, Math.max(6, Math.ceil(hiPpg/BIN)));
    const distLabels = Array.from({length:nb}, (_,i)=>'₹'+(i*BIN).toFixed(1));
    const distSets = cs.map(c=>{
      const counts = new Array(nb).fill(0);
      c.skus.forEach(s=>{ const v=s.pricePerGram||0; if (v>0) counts[Math.min(nb-1, Math.floor(v/BIN))]++; });
      const col = COL[c.company] || '#999';
      return { label:c.company, data:counts, borderColor:col, backgroundColor:col, borderWidth:2, tension:.35, pointRadius:0 };
    });
    mkChart('chartDist', { type:'line', data:{ labels:distLabels, datasets:distSets },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}, padding:8}},

                 y:{ beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}, precision:0}, title:{display:true, text:'SKUs', font:{size:10}} } } }
    });
  });
}

function heatmapHTML(){

/* ---- Pack-size intelligence ---- */
// Per-band stats. Interest = total review volume (a PROXY — no public sales data).
function packBandStats(skus){
  const byBand = new Map(PACK_ORDER.map(b=>[b,[]]));
  for (const s of skus) byBand.get(packBand(s.weightGrams)).push(s);
  return PACK_ORDER.map(band=>{
    const gs = byBand.get(band);
    const catCount = {}; gs.forEach(s=>catCount[s.category]=(catCount[s.category]||0)+1);
    const domCat = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0] || null;
    const top = topBrands(gs, 1)[0];
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    return {
      band, range: PACK_RANGE[band], skus: gs, count: gs.length,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),
      disc: calcStats(gs.map(s=>s.discount), 1),
      reviews: gs.reduce((a,s)=>a+(s.reviewCount||0), 0),
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      domCat, topBrand: top ? top.brand : null
    };
  });
}

// Top-N distinct pack labels by SKU count, with total reviews each.
function commonPackSizes(skus, n){
  const m = new Map();
  for (const s of skus){
    const k = s.packLabel || (s.weightGrams + ' g');
    if (!m.has(k)) m.set(k, { label:k, count:0, reviews:0 });
    const e = m.get(k); e.count++; e.reviews += (s.reviewCount||0);
  }
  return [...m.values()].sort((a,b)=> b.count - a.count || b.reviews - a.reviews).slice(0, n);
}

const kReviews = n => n>=1000 ? (n/1000).toFixed(n>=100000?0:1).replace(/\.0$/,'')+'k' : String(n);

function renderHistory(){
  const runs = (STATE.history || []).slice();            // chronological (oldest first)
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Trend History</strong></div>`;
  if (!runs.length){
    $app().innerHTML = backBar + `<div class="notice info">No history yet — run the Scrape workflow.</div>`;
    return;
  }
  const rich = runs.filter(r => r && r.overall);          // runs with enriched metrics
  const latest = rich[rich.length-1] || null;
  const prev   = rich[rich.length-2] || null;
  const companies = Object.keys(COL).filter(co => rich.some(r => r.byCompany && r.byCompany[co]!=null));

  const o = latest ? latest.overall : {};
  const po = prev ? prev.overall : {};
  const sumCard = (label, value, delta) => `
    <div class="card"><div class="card-pad">
      <div class="sl" style="font-size:11px;color:#9b9a96;font-weight:500;margin-bottom:6px">${label}</div>
      <div style="font-size:21px;font-weight:700;line-height:1">${value}</div>
      <div style="margin-top:8px">${delta}</div>
    </div></div>`;
  const summary = latest ? `<div class="hist-sum">
    ${sumCard('Overall median ₹/g', rs2(o.medianPpg), deltaBadge(o.medianPpg, po.medianPpg, v=>'₹'+v.toFixed(3)))}
    ${sumCard('Avg discount', (o.avgDiscount??0).toFixed(1)+'%', deltaBadge(o.avgDiscount, po.avgDiscount, v=>v.toFixed(1)+'%'))}
    ${sumCard('Total reviews', kCompact(o.totalReviews||0), deltaBadge(o.totalReviews, po.totalReviews, v=>kCompact(Math.round(v))))}
    ${sumCard('SKUs', latest.skuCount??'—', deltaBadge(latest.skuCount, prev?prev.skuCount:null, v=>Math.round(v)))}
  </div>` : '';

  const note = rich.length < 2
    ? `<div class="notice info" style="margin-bottom:18px">${rich.length===1?'Only one enriched run so far — run the scrape again to see movement.':'No enriched snapshots yet — run the scrape to record trend metrics.'}</div>`
    : '';

  // run-log (newest first); ₹/g delta vs the previous enriched run
  const ppgDelta = {};
  for (let i=1;i<rich.length;i++){ const a=rich[i-1].overall.medianPpg, b=rich[i].overall.medianPpg; if(a!=null&&b!=null) ppgDelta[rich[i].ts]=b-a; }
  const logRows = runs.slice().reverse().map(r=>{
    const ov = r.overall || {};
    const d = ppgDelta[r.ts];
    const dB = d!=null ? ' '+deltaBadge(ov.medianPpg, ov.medianPpg-d, v=>'₹'+v.toFixed(3)) : '';
    return `<tr>
      <td>${fmtRun(r.ts)}</td>
      <td class="num">${ov.medianPpg!=null?'₹'+ov.medianPpg.toFixed(3):'—'}${dB}</td>
      <td class="num">${ov.avgDiscount!=null?ov.avgDiscount.toFixed(1)+'%':'—'}</td>
      <td class="num">${ov.totalReviews!=null?kCompact(ov.totalReviews):'—'}</td>
      <td class="num">${r.skuCount!=null?r.skuCount:'—'}</td>
    </tr>`;
  }).join('');

  const sparks = companies.map(co=>`
    <div class="spark-cell">
      <div class="spark-lbl"><span class="dot" style="background:${COL[co]}"></span>${esc(co)}</div>
      <div class="spark"><canvas id="sl_${slug(co)}"></canvas></div>
    </div>`).join('');

  $app().innerHTML = `
  ${backBar}
  <div class="ov-sub" style="margin:-10px 0 16px"><strong>${runs.length}</strong> scrape run${runs.length===1?'':'s'} recorded · each point = one live scrape</div>
  ${note}
  ${summary}

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Company median ₹/g across runs</div>
    <div class="chart-box" style="height:320px"><canvas id="histCompany"></canvas></div>
  </div></div>

  <div class="grid2">
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Overall median ₹/g</div>
      <div class="chart-box" style="height:230px"><canvas id="histPpg"></canvas></div>
    </div></div>
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Overall avg discount</div>
      <div class="chart-box" style="height:230px"><canvas id="histDisc"></canvas></div>
    </div></div>
  </div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Per-company ₹/g trend</div>
    <div class="spark-grid">${sparks || '<span class="muted">no per-company history yet</span>'}</div>
  </div></div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">SKUs per run</div>
    <div class="chart-box" style="height:220px"><canvas id="histSku"></canvas></div>
  </div></div>

  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">Run log <span class="muted" style="text-transform:none;letter-spacing:0">· newest first</span></div>
    <div class="tbl-scroll"><table style="min-width:520px">
      <thead><tr><th>Time</th><th>Overall ₹/g</th><th>Avg Disc%</th><th>Reviews</th><th>SKUs</th></tr></thead>
      <tbody>${logRows}</tbody>
    </table></div>

  drawHistoryCharts(rich, runs, companies);
}

/* ---- Demand Intelligence — Google Trends (seeded) ---- */
function setTrendsMode(m){ STATE.trendsMode = m; render(); }

// Marry seeded search interest with our live ₹/g into a positioning signal.
function trendSignal(latest, dir, ppgMedian){
  const high = latest >= 55;
  const premium = ppgMedian != null && ppgMedian > 0.5;
  if (high && premium) return { label:'Premium Demand', sub:'pricing power + pull', cls:'sig-premium' };
  if (high)            return { label:'Mass Favourite',  sub:'volume pull',        cls:'sig-mass' };
  if (dir === 'rising') return { label:'Momentum — watch', sub:'rising interest',  cls:'sig-rise' };
  if (dir === 'falling' || latest < 30) return { label:'Fading / niche', sub: dir==='falling'?'losing interest':'low interest', cls:'sig-fade' };
  return { label:'Steady', sub:'flat, mid interest', cls:'sig-steady' };
}

function renderTrends(){
  const t = STATE.trends;
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Demand Intelligence — Google Trends</strong></div>`;
  if (!t || !t.brands){
    $app().innerHTML = backBar + `<div class="notice info">No trends data — <code>data/trends.json</code> not found.</div>`;
    return;
  }
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const ppgByBrand = {}; if (STATE.curr) STATE.curr.brandStats.forEach(b=>ppgByBrand[b.brand]=b.ppg.median);
  const arrow = d => d==='rising' ? '<span style="color:#0A4A3A">▲</span>' : d==='falling' ? '<span style="color:#7A0A1C">▼</span>' : '<span class="muted">→</span>';

  // Banner: real (live) vs seeded; flag any stale (couldn't-refresh) keys honestly.
  const isLive = /live/i.test(t.source||'') || !!t.fetchedAt;
  const staleN = [...Object.values(t.brands||{}), ...Object.values(t.categories||{})].filter(x=>x&&x.stale).length;
  const fetchedDate = t.fetchedAt ? new Date(t.fetchedAt).toLocaleString('en-IN') : (t.updated||'—');
  const banner = isLive
    ? `📈 <strong>Live Google Trends</strong> · relative search interest (0–100), <strong>not sales</strong> · geo ${esc(t.geo||'IN')}, last 12 months · fetched ${esc(fetchedDate)}${staleN?` · <strong>${staleN} value(s) stale</strong> (refresh blocked — last-good kept)`:''}`
    : `📈 <strong>Seeded snapshot</strong> · relative search interest (0–100), <strong>not sales</strong> · update from trends.google.com (geo ${esc(t.geo||'IN')}) · updated ${esc(t.updated||'—')}`;

  const brandEntries = Object.entries(t.brands).map(([name,v])=>({name, ...v}));
  const ranked = brandEntries.slice().sort((a,b)=>b.latest-a.latest);
  const maxLatest = Math.max(...ranked.map(b=>b.latest), 1);
  const rankRows = ranked.map(b=>{
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="catbar-row">
      <span class="catbar-label"><span class="dot" style="background:${col}"></span>${esc(b.name)}</span>
      <span class="bar-wrap"><span class="bar-fill" style="width:${Math.round(b.latest/maxLatest*100)}%;background:${col}"></span></span>
      <span class="catbar-val">${b.latest} ${arrow(b.direction)}</span>
    </div>`;
  }).join('');

  const all = [...brandEntries, ...Object.entries(t.categories||{}).map(([n,v])=>({name:n, ...v, isCat:true}))];
  const board = arr => arr.length
    ? arr.sort((a,b)=>b.latest-a.latest).map(x=>`<div class="board-row"><span>${esc(x.name)}${x.isCat?' <span class="muted" style="font-size:10px">cat</span>':''}</span><strong>${x.latest}</strong></div>`).join('')
    : '<div class="muted" style="font-size:12px">—</div>';

  const sigCards = ranked.map(b=>{
    const ppg = ppgByBrand[b.name];
    const sig = trendSignal(b.latest, b.direction, ppg);
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="card sig-card fadein"><div class="card-pad">
      <div class="sig-brand"><span class="dot" style="background:${col}"></span>${esc(b.name)}</div>
      <div class="sig-metrics"><span>interest <strong>${b.latest}</strong> ${arrow(b.direction)}</span><span>${ppg!=null?'₹'+ppg.toFixed(2)+'/g':'<span class="muted">no ₹/g</span>'}</span></div>
      <span class="badge ${sig.cls}">${sig.label}</span>
      <div class="sig-sub">${sig.sub}</div>
    </div></div>`;
  }).join('');

  // Related & rising/breakout queries — the real Google Trends "Explore" panels (via SerpApi).
  const rel = t.related || {};
  const relSeeds = Object.keys(rel);
  let relatedCard = '';
  if (relSeeds.length){
    const seed = (STATE.trendsSeed && rel[STATE.trendsSeed]) ? STATE.trendsSeed : relSeeds[0];
    const r = rel[seed] || {};
    const top = r.top || [], rising = r.rising || [];
    const isBreak = x => /breakout/i.test(x.value||'') || (x.extracted!=null && x.extracted>=5000);
    const topMax = Math.max(...top.map(x=>x.extracted||0), 1);
    const topRows = top.length ? top.map(x=>`
      <div class="catbar-row">
        <span class="catbar-label" style="width:auto;flex:1;min-width:0">${esc(x.query)}</span>
        <span class="bar-wrap" style="max-width:110px"><span class="bar-fill" style="width:${Math.round((x.extracted||0)/topMax*100)}%;background:#B6772E"></span></span>
        <span class="catbar-val">${x.extracted!=null?x.extracted:esc(x.value)}</span>
      </div>`).join('') : '<div class="muted" style="font-size:12px">—</div>';
    const risingChips = rising.length ? rising.map(x=>{
      const brk = isBreak(x);
      const lbl = brk ? 'Breakout' : (x.value && /%/.test(x.value) ? x.value : (x.extracted!=null?'+'+x.extracted+'%':''));
      return `<span class="rq-chip${brk?' rq-break':''}">${esc(x.query)}${lbl?`<span class="rq-val">${esc(lbl)}</span>`:''}</span>`;
    }).join('') : '<div class="muted" style="font-size:12px">—</div>';
    const seedTabs = relSeeds.map(s=>`<button class="seg${s===seed?' active':''}" onclick="setTrendsSeed('${esc(s)}')">${esc(s)}</button>`).join('');
    const rstale = r.stale ? ' <span class="muted" style="font-size:11px;text-transform:none;letter-spacing:0">(last-good)</span>' : '';
    relatedCard = `
    <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
      <div class="ov-head" style="margin-bottom:12px">
        <div class="sec-title" style="margin:0">What India actually searches <span class="muted" style="text-transform:none;letter-spacing:0">· related to "${esc(seed)}"${rstale}</span></div>
        ${relSeeds.length>1?`<div class="ov-actions">${seedTabs}</div>`:''}
      </div>
      <div class="grid2" style="margin:0;gap:20px">
        <div><div class="board-h">🔝 Top searches</div>${topRows}</div>
        <div><div class="board-h" style="color:#0A4A3A">🚀 Rising &amp; breakout</div><div class="rq-wrap">${risingChips}</div></div>
      </div>
      <div class="hm-cap">Real Google Trends <em>related queries</em> for "${esc(seed)}", geo ${esc(t.geo||'IN')}. <strong>Top</strong> = most-searched related terms (indexed 0–100); <strong>Rising</strong> = fastest-growing, where <strong>Breakout</strong> means &gt;5000% growth — a genuinely emerging search.</div>
    </div></div>`;
  }

  $app().innerHTML = `
  ${backBar}
  <div class="notice trends-banner">${banner}</div>

  <div class="grid2">
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Search-interest ranking <span class="muted" style="text-transform:none;letter-spacing:0">· latest 0–100</span></div>
      ${rankRows}
    </div></div>
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Rising vs falling</div>
      <div class="grid2" style="margin:0;gap:14px">
        <div><div class="board-h" style="color:#0A4A3A">▲ Rising</div>${board(all.filter(x=>x.direction==='rising'))}</div>
        <div><div class="board-h" style="color:#7A0A1C">▼ Falling</div>${board(all.filter(x=>x.direction==='falling'))}</div>
      </div>
    </div></div>
  </div>
  ${relatedCard}
  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="ov-head" style="margin-bottom:12px">
      <div class="sec-title" style="margin:0">Interest over 12 months</div>
      <div class="ov-actions">
        <button class="seg${mode==='brands'?' active':''}" onclick="setTrendsMode('brands')">Top brands</button>
        <button class="seg${mode==='categories'?' active':''}" onclick="setTrendsMode('categories')">Categories</button>
      </div>
    </div>
    <div class="chart-box" style="height:320px"><canvas id="trendsLine"></canvas></div>
  </div></div>

  <div class="sec-title">The signal · Google Trends × live ₹/g</div>
  <div class="grid3">${sigCards}</div>

  <div class="card fadein" style="margin-top:16px"><div class="card-pad">
    <div class="sec-title">Methodology</div>
    <p class="admin-p">Google Trends reports <strong>relative search interest</strong> (0–100 within the set &amp; timeframe), <strong>not sales</strong>. Values are <strong>fetched live from Google Trends via SerpApi in CI</strong> (the weekly <em>Trends</em> workflow, geo India, last 12 months) — Queries are <strong>disambiguated to the biscuit context</strong> (e.g. "Monaco biscuit", "Bourbon biscuit") so they don't measure the F1 race or the whiskey, batched in groups of ≤5 with a shared "biscuit" anchor, and normalized for comparability. It's best-effort: any value that can't refresh keeps its <strong>last-good</strong> and is flagged <em>stale</em> — never fabricated. The <strong>related &amp; rising/breakout</strong> queries are the real Google Trends "Explore" panels for the seed terms (one call each) — <em>Breakout</em> flags &gt;5000% growth, i.e. genuinely emerging demand. Off-topic <strong>homonyms are filtered</strong> (a "biscuit" in Indian search is often a <em>gold bar</em>; "cookies" often means <em>browser cookies</em>) so only food-biscuit queries are shown — every query shown is still a real Google query, none fabricated. The signal marries this demand proxy with our live median ₹/g from <code>data/latest.json</code> (high interest + premium ₹/g = pricing power; high + value = volume pull; rising = momentum; low/falling = fading).</p>
  </div></div>`;

  drawTrendsChart();
}

function drawTrendsChart(){
  const t = STATE.trends; if (!t) return;
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const src = mode === 'categories' ? (t.categories||{}) : (t.brands||{});
  let entries = Object.entries(src).map(([name,v])=>({name, ...v}));
  if (mode === 'brands') entries = entries.sort((a,b)=>b.latest-a.latest).slice(0,8);   // cap to avoid clutter
  const months = (()=>{ const o=[]; const d=new Date(); for(let i=11;i>=0;i--) o.push(new Date(d.getFullYear(),d.getMonth()-i,1).toLocaleDateString('en-IN',{month:'short'})); return o; })();
  const colorFor = name => mode==='categories' ? (CAT_COL[name]||'#B6772E') : (COL[brandCompany(name)]||'#999');
  waitForChart(()=>{
    mkChart('trendsLine', { type:'line',
      data:{ labels: months, datasets: entries.map(e=>({ label:e.name, data:e.interest, borderColor:colorFor(e.name), backgroundColor:colorFor(e.name), borderWidth:2, tension:.3, pointRadius:0 })) },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10}, padding:8 } }, tooltip:{ callbacks:{ label:c=>c.dataset.label+': '+c.raw } } },
        scales:{ y:{ beginAtZero:true, max:100, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}} },
                 x:{ grid:{display:false}, ticks:{font:{size:9}} } } }
    });
  });
}

/* ---- Emerging-brands radar (brands outside the tracked roster) ---- */
function renderRadar(){
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Emerging Brands Radar</strong></div>`;
  const emg = STATE.skus.filter(s=>s.company==='Emerging / D2C');
  if (!emg.length){
    $app().innerHTML = backBar + `<div class="notice info">No emerging brands in the current data — run the Scrape workflow.</div>`;
    return;
  }
  const m = new Map();
  for (const s of emg){ const b = s.brand || 'Unknown'; if (!m.has(b)) m.set(b, []); m.get(b).push(s); }
  const rows = [...m].map(([brand,gs])=>{
    const reviews = gs.reduce((a,s)=>a+(s.reviewCount||0), 0);
    const catCount = {}; gs.forEach(s=>catCount[s.category]=(catCount[s.category]||0)+1);
    const cat = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0];
    const sample = gs.slice().sort((a,b)=>(b.reviewCount||0)-(a.reviewCount||0)).find(s=>s.url) || gs[0];
    const real = gs.length>=2 && reviews>=50 && brand!=='Unknown';
    return { brand, count:gs.length, ppg:calcStats(gs.map(s=>s.pricePerGram),3).median, reviews, traction:gs.length*reviews, cat, sample, real };
  }).sort((a,b)=> b.traction - a.traction || b.reviews - a.reviews);

  const realCount = rows.filter(r=>r.real).length;
  const tableRows = rows.map(r=>`<tr>
    <td><strong>${esc(r.brand)}</strong></td>
    <td class="num">${r.count}</td>
    <td class="num">${rs2(r.ppg)}</td>
    <td class="num">${kCompact(r.reviews)}</td>
    <td class="num">${kCompact(r.traction)}</td>
    <td>${esc(r.cat)}</td>
    <td><span class="badge ${r.real?'sig-mass':'sig-fade'}">${r.real?'real brand':'low-signal'}</span></td>
    <td>${r.sample&&r.sample.url?`<a href="${esc(r.sample.url)}" target="_blank" rel="noopener" title="${esc(r.sample.name)}">↗</a>`:''}</td>
  </tr>`).join('');

  const roster = Object.keys(COL).filter(c=>c!=='Emerging / D2C').map(co=>
    `<span class="grp-chip" style="background:${BG[co]};color:${TXT[co]}">${esc(co)}: ${BRANDS.filter(b=>b.company===co).map(b=>esc(b.brand)).join(', ')}</span>`).join(' ');

  // Unrecognized "Other" products — show sample titles so new brands can be spotted & allow-listed.
  const otherSkus = emg.filter(s=>s.brand==='Other').sort((a,b)=>(b.reviewCount||0)-(a.reviewCount||0));
  const otherSamples = otherSkus.slice(0,12).map(s=>
    `<div class="catbar-row"><span class="catbar-label" style="width:auto;flex:1">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name.slice(0,62))}</a>`:esc(s.name.slice(0,62))}</span><span class="muted" style="font-size:11px;white-space:nowrap">${esc(s.category)} · ${kCompact(s.reviewCount||0)} rev</span></div>`).join('');

  $app().innerHTML = `${backBar}
  <div class="notice info" style="margin-bottom:18px">Brands appearing in the category <strong>beyond the tracked roster</strong> — new / D2C / regional players. Traction = SKU count × review volume (<strong>no sales data exists</strong>).</div>
  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="results-meta"><strong>${rows.length}</strong> emerging brands · <strong>${realCount}</strong> look like real brands · ${emg.length} SKUs</div>
    <div class="tbl-scroll"><table style="min-width:700px">
      <thead><tr><th>Brand</th><th>SKUs</th><th>Median ₹/g</th><th>Reviews</th><th>Traction</th><th>Top Category</th><th>Confidence</th><th></th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>
    <div class="hm-cap">Traction = SKUs × total reviews (interest proxy, not sales). "Real brand" = ≥2 SKUs and ≥50 reviews.</div>
  </div></div>
  ${otherSkus.length?`<div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Unrecognized products · "Other" <span class="muted" style="text-transform:none;letter-spacing:0">· ${otherSkus.length} SKUs · scan to spot new brands to allow-list</span></div>
    ${otherSamples}
  </div></div>`:''}
  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">Tracked roster (reference)</div>
    <div class="roster-ref">${roster}</div>
  </div></div>`;
}

/* ---- Market Share & Sales (data/marketshare.json — audited + labelled estimates) ---- */
// PURE: position a company from market share % + YoY growth. Leader / Challenger /
// Insurgent / Declining, with a colour and a one-line read.
function classifyShare(sharePct, yoyPct){
  const s = +sharePct || 0;
  const g = (yoyPct == null) ? null : +yoyPct;
  if (s >= 25)              return { label:'Leader',     cls:'cls-leader',     color:'#0A4A3A', read:'Dominant scale' + (g!=null && g<=0 ? ' — but growth has stalled' : '') };
  if (g != null && g <= 0)  return { label:'Declining',  cls:'cls-declining',  color:'#7A0A1C', read:'Losing ground — flat/negative growth' };
  if (s >= 8)               return { label:'Challenger',  cls:'cls-challenger', color:'#102C58', read:'Meaningful #2/#3 scale, still growing' };
  if (g != null && g >= 20) return { label:'Insurgent',   cls:'cls-insurgent',  color:'#8A3B00', read:'Tiny base, breakout growth' };
  return                           { label:'Insurgent',   cls:'cls-insurgent',  color:'#8A3B00', read:'Small but growing — one to watch' };
}

// Colour a company group consistently with the rest of the dashboard.
function shareColor(name){
  if (/Britannia/i.test(name))     return COL['Britannia'];
  if (/ITC|Sunfeast/i.test(name))  return COL['ITC Sunfeast'];
  if (/Parle/i.test(name))         return COL['Parle'];
  if (/Mondelez|Oreo/i.test(name)) return COL['Mondelez'];
  if (/Unibic/i.test(name))        return COL['Unibic'];
  if (/Whole Truth|D2C/i.test(name)) return COL['Emerging / D2C'];
  return '#B9B6AE';   // Others / Regional
}
const fmtCr = n => n==null ? '—' : '₹' + Number(n).toLocaleString('en-IN') + ' Cr';
const yoyHtml = g => g==null ? '<span class="muted">n/a</span>'
  : `<span style="color:${g>0?'#0A4A3A':g<0?'#7A0A1C':'#9b9a96'};font-weight:600">${g>0?'▲ +':g<0?'▼ ':''}${g}%</span>`;

function renderShare(){
  const s = STATE.share;
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Market Share &amp; Sales</strong></div>`;
  if (!s || !Array.isArray(s.companies) || !s.companies.length){
    $app().innerHTML = backBar + `<div class="notice info">No market-share data — <code>data/marketshare.json</code> not found.</div>`;
    return;
  }
  const cos = s.companies;
  const shareCos = cos.filter(c => c.marketSharePct != null).sort((a,b)=>b.marketSharePct-a.marketSharePct);          // for the pie (incl. Others)
  const ranked = cos.filter(c => c.biscuitRevenueCr != null).sort((a,b)=>b.biscuitRevenueCr-a.biscuitRevenueCr);     // for ranking + cards (exclude Others)
  const auditedN = ranked.filter(c=>!c.isEstimated).length;
  const estN     = cos.filter(c=>c.isEstimated).length;

  // Provenance banner (prominent — which numbers are audited vs estimated).
  const banner = `🧾 <strong>Provenance — read before trusting a number.</strong> ${esc(s.disclaimer||'')} `

  const maxRev = Math.max(...ranked.map(c=>c.biscuitRevenueCr), 1);

    <div class="catbar-row">
      <span class="catbar-label"><span class="dot" style="background:${shareColor(c.company)}"></span>${esc(c.company)}

      <span class="catbar-val">${fmtCr(c.biscuitRevenueCr)} &nbsp; ${yoyHtml(c.yoyGrowthPct)}</span>

  // Classification cards (share × growth) with AUDITED/ESTIMATED badge, numbers, source, read.
  const cards = ranked.map(c=>{

      <div class="sig-brand"><span class="dot" style="background:${col}"></span>${esc(c.company)}
        <span class="badge ${c.isEstimated?'prov-est':'prov-audited'}" style="float:right">${c.isEstimated?'ESTIMATED':'AUDITED'}</span></div>
      <div class="sig-metrics"><span>share <strong>${c.marketSharePct}%</strong> <span class="muted">est.</span></span><span><strong>${fmtCr(c.biscuitRevenueCr)}</strong></span></div>
      <div class="sig-metrics"><span>YoY ${yoyHtml(c.yoyGrowthPct)}</span><span class="muted">${esc(c.revenuePeriod||c.period||'')}</span></div>
      <span class="badge ${cl.cls}">${cl.label}</span>
      <div class="sig-sub">${esc(cl.read)}</div>
      <div class="share-src">${c.sourceUrl?`<a href="${esc(c.sourceUrl)}" target="_blank" rel="noopener">source ↗</a>`:''}<span class="muted"> · ${esc(c.shareSource||'')}</span></div>
    </div></div>`;
  }).join('');

  $app().innerHTML = `
  ${backBar}
  <div class="notice prov-banner">${banner}</div>

  <div class="grid2">
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Market share <span class="muted" style="text-transform:none;letter-spacing:0">· % of India biscuit market · ESTIMATE (industry reports)</span></div>
      <div class="chart-box" style="height:300px"><canvas id="shareChart"></canvas></div>
      <div class="hm-cap">${esc(s.shareNote||'')}</div>
    </div></div>
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Biscuit revenue ranking <span class="muted" style="text-transform:none;letter-spacing:0">· ₹ Cr · AUD = audited, EST = estimated</span></div>
      ${revRows}
      <div class="hm-cap">${esc(s.marketContext||'')}</div>
    </div></div>
  </div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Share × growth matrix <span class="muted" style="text-transform:none;letter-spacing:0">· x = share % · y = YoY growth % · bubble = biscuit revenue</span></div>
    <div class="chart-box" style="height:340px"><canvas id="shareScatter"></canvas></div>
    <div class="hm-cap">Top-right = big &amp; growing (Leaders/Challengers); bottom = shrinking (Declining); far-left &amp; high = small, fast-rising (Insurgents).</div>
  </div></div>

  <div class="sec-title">Competitive position · ${ranked.length} groups</div>
  <div class="grid3">${cards}</div>

  <div class="card fadein" style="margin-top:16px"><div class="card-pad">
    <div class="sec-title">Methodology &amp; caveats</div>
    <p class="admin-p"><strong>Real vs estimated.</strong> Listed companies (<strong>Britannia, ITC</strong>) show <strong>AUDITED</strong> figures from their annual reports/results, with source links. <strong>ITC's biscuit (Sunfeast) split is an ESTIMATE</strong> — its audited number is the combined Branded Packaged Foods segment, not biscuits alone. Private &amp; D2C groups (<strong>Parle, Mondelez India, Unibic, The Whole Truth</strong>) use public RoC filings / press where available, but their <strong>biscuit-only revenue is ESTIMATED</strong> (these file blended or partial numbers). Nothing estimated is presented as audited — every card carries an AUDITED/ESTIMATED badge.</p>
    <p class="admin-p"><strong>Market share %</strong> is <strong>industry-report-sourced</strong> (Statista/Nielsen/Euromonitor) and is treated as an <strong>ESTIMATE for every company, including the listed ones</strong> — exact share is not audited. Britannia leads by <em>value</em>; Parle leads by <em>volume</em> (Parle-G is the world's largest-selling biscuit).</p>
    <p class="admin-p"><strong>Period-alignment & scope caveat.</strong> Figures are each company's <em>latest available</em> full year — Britannia &amp; ITC <strong>FY26</strong> (audited, to Mar 2026); Parle, Unibic &amp; The Whole Truth <strong>FY25</strong> (private filings lag a year). Bases also differ: Britannia is a near-whole bakery segment and Parle's total includes confectionery (both mostly biscuits), while ITC/Mondelez/D2C show biscuit-only estimates — so cross-company comparisons are indicative, not exact. <strong>Update this file when new results publish.</strong> This is competitive-finance context — it is <em>not</em> the live ₹/g pricing data, which comes from the daily scrape.</p>
  </div></div>`;

  drawShareCharts();
}

function drawShareCharts(){
  const s = STATE.share; if (!s || !Array.isArray(s.companies)) return;
  const shareCos = s.companies.filter(c=>c.marketSharePct!=null).sort((a,b)=>b.marketSharePct-a.marketSharePct);
  const ranked   = s.companies.filter(c=>c.biscuitRevenueCr!=null);
  waitForChart(()=>{
    mkChart('shareChart', { type:'doughnut',
      data:{ labels: shareCos.map(c=>c.company), datasets:[{ data: shareCos.map(c=>c.marketSharePct), backgroundColor: shareCos.map(c=>shareColor(c.company)), borderColor:'#fff', borderWidth:1.5 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'55%',
        plugins:{ legend:{position:'right', labels:{boxWidth:10, font:{size:10}, padding:6}},
          tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}% (est.)`}} } }
    });
    mkChart('shareScatter', { type:'bubble',
      data:{ datasets: ranked.map(c=>{
        const cl = classifyShare(c.marketSharePct, c.yoyGrowthPct);
        return { label:c.company,
          data:[{ x:c.marketSharePct, y:(c.yoyGrowthPct==null?0:c.yoyGrowthPct), r:Math.max(6, Math.sqrt(c.biscuitRevenueCr)/6) }],
          backgroundColor: hexToRgba(cl.color, .45), borderColor: cl.color, borderWidth:1.5 };
      }) },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}, padding:6}},
          tooltip:{callbacks:{label:c=>{ const d=c.raw; return `${c.dataset.label}: ${d.x}% share, ${d.y>=0?'+':''}${d.y}% YoY`; }}} },
        scales:{ x:{ title:{display:true, text:'Market share % (est.)', font:{size:10}}, beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}} },
                 y:{ title:{display:true, text:'YoY growth %', font:{size:10}}, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}} } } }
    });
  });
}

function renderAdmin(){
  const roster = Object.keys(COL).map(g=>{
    const brands = BRANDS.filter(b=>b.company===g).map(b=>b.brand).join(', ');
    return `
    <div class="roster-row">
      <span class="grp-chip" style="background:${BG[g]};color:${TXT[g]}">${g}</span>
      <span class="roster-brands">${brands}</span>
    </div>`;
  }).join('');

  const hist = (STATE.history||[]).slice(-1)[0];
  const histLine = hist
    ? `Last run: ${new Date(hist.ts).toLocaleString('en-IN')} — ${hist.skuCount} SKUs, ${hist.brandsOk}/${BRANDS.length} brands OK.`
    : 'No runs recorded yet.';

  $app().innerHTML = `
  <div class="back-bar">
    <button onclick="navigate('dashboard')">← Back</button>
    <strong>Admin · System Info</strong>
  </div>

  <div class="card fadein">
    <div class="card-pad">
      <h2 class="admin-h">How it works</h2>
      <p class="admin-p">
        This dashboard tracks <strong>${BRANDS.length} biscuit brands</strong> across
        <strong>${Object.keys(COL).length} company groups</strong> and
        <strong>${CATEGORIES.length} categories</strong>
        (${CATEGORIES.join(', ')}). <strong>Price-per-gram (₹/g)</strong> is the hero metric,
        reported alongside discount vs MRP, pack sizes and reviews.
      </p>

      <h3 class="admin-h sub">Data pipeline (CI-scraped → static)</h3>
      <ul class="admin-list">
        <li><strong>Scrape</strong> — a GitHub Action (<code>scripts/scrape.mjs</code>) runs Firecrawl
          using a key held only as a GitHub Actions secret, parses weight, ₹/g, discount, category
          and reviews, and commits <code>data/latest.json</code> + <code>data/history.json</code>.</li>
        <li><strong>Serve</strong> — Cloudflare's git build deploys the committed JSON as static assets.</li>
        <li><strong>Read</strong> — this page fetches <code>/data/latest.json</code>. No key in the
          browser, no runtime scraping, no Cloudflare secret.</li>
        <li><strong>Coverage searches</strong> — extra Amazon queries (rusk, wafer, D2C cookies) classify discovered products to a brand/company so thin categories &amp; emerging brands populate.</li>
        <li><strong>Quick-commerce (BigBasket)</strong> — attempted live on every run, but its search needs a pincode/session and blocks datacenter scrapers, so it yields <strong>0</strong> (logged honestly, never faked). Amazon is the live source.</li>
        <li><strong>Google Trends</strong> — real relative search interest + related/breakout queries fetched live via <strong>SerpApi</strong> in CI (weekly, free tier, last-good fallback).</li>
        <li><strong>Market share</strong> — <strong>audited</strong> financials for listed cos (Britannia, ITC) + clearly-labelled <strong>estimates</strong> for private/D2C; share % is industry-sourced.</li>
        <li><strong>Export</strong> — <em>Export Excel</em> downloads an 8-sheet workbook whose numbers reconcile with every tab.</li>
      </ul>

      <h3 class="admin-h sub">Status</h3>

      </p>
      <p class="admin-p"><strong>Legend:</strong> <span class="badge prov-audited">AUDITED</span> from audited financials · <span class="badge prov-est">ESTIMATED</span> derived / industry-sourced (shelf-life, private-co revenue, all market-share %). Hero metric <strong>₹/g = selling ÷ pack-weight</strong>.</p>

      <h3 class="admin-h sub">Tracked roster</h3>
      ${roster}
    </div>
  </div>`;
}

/* ===========================================================
   EXCEL EXPORT (Step 14) — multi-sheet .xlsx from the live data.
   buildExcelData() is the (testable) data layer; downloadExcel()
   feeds it to SheetJS and triggers a dated blob download. Every
   sheet reconciles with the on-screen tabs.
   =========================================================== */
function buildExcelData(){
  const skus  = STATE.skus || [];
  const stats = STATE.curr || buildStats(skus);
  const intel = buildIntel(stats.companyStats);
  const r1 = n => n==null?'':+(+n).toFixed(1);
  const r3 = n => n==null?'':+(+n).toFixed(3);
  const topCat = cc => Object.entries(cc||{}).sort((a,b)=>b[1]-a[1]).map(([k])=>k)[0] || '';
  const top3Brands = gs => { const m={}; gs.forEach(s=>m[s.brand]=(m[s.brand]||0)+1); return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([b])=>b).join(', '); };
  const archForShare = m => { const k = Object.keys(intel).find(co=>{ const rx={'Britannia':/^Britannia/,'Parle':/^Parle/,'ITC Sunfeast':/ITC|Sunfeast/i,'Mondelez':/Mondelez/i,'Unibic':/Unibic/i,'Emerging / D2C':/Whole Truth|D2C/i}[co]; return rx&&rx.test(m.company); }); return k?intel[k].archetype.label:''; };
  const sheets = [];

  sheets.push({ name:'Company Summary', note:'share % is an industry-report estimate for all',
    header:['Company','Archetype','Sentiment','Median ₹/g','Avg ₹/g','Min ₹/g','Max ₹/g','Avg Discount %','Market Share % (est.)','Revenue ₹Cr','Revenue basis','SKUs','Avg Rating'],
    rows: stats.companyStats.map(c=>{ const I=intel[c.company], sh=shareForCompany(c.company); return [
      c.company, I.archetype.label, I.sentiment.word, r3(c.ppg.median), r3(c.ppg.avg), r3(c.ppg.min), r3(c.ppg.max), r1(c.disc.avg),
      sh?sh.marketSharePct:'', sh?(sh.biscuitRevenueCr??''):'', sh?(sh.isEstimated?'ESTIMATED':'AUDITED'):'', c.skus.length, c.ratingAvg!=null?c.ratingAvg:'' ]; }) });

  sheets.push({ name:'Brand Summary',
    header:['Brand','Company','Median ₹/g','Avg Discount %','Avg Rating','Total Reviews','Dominant Category','SKUs'],
    rows: stats.brandStats.map(b=>[ b.brand, b.company, r3(b.ppg.median), r1(b.disc.avg), b.ratingAvg!=null?b.ratingAvg:'', b.reviewSum, topCat(b.categoryCounts), b.skus.length ]) });

  sheets.push({ name:'All SKUs', note:'shelf-life is a category-level ESTIMATE, not per-SKU',
    header:['Name','Brand','Company','Category','Pack','Weight (g)','MRP','Selling','Discount %','₹/g','Rating','Reviews','Shelf-life mo (est.)','Platform','URL'],
    rows: skus.map(s=>[ s.name, s.brand, s.company, s.category, s.packLabel||'', s.weightGrams, s.mrp, s.selling, s.discount, s.pricePerGram, s.rating??'', s.reviewCount??0, shelfLifeFor(s.category), s.platform||'', s.url||'' ]) });

  sheets.push({ name:'Categories',
    header:['Category','Median ₹/g','Avg Discount %','SKUs','Top Brands'],
    rows: stats.categoryStats.map(cs=>[ cs.category, r3(cs.ppg.median), r1(cs.disc.avg), cs.skus.length, top3Brands(cs.skus) ]) });

  sheets.push({ name:'Pack Sizes', note:'reviews = interest proxy, not sales',
    header:['Band','Range','SKUs','Median ₹/g','Total Reviews','Avg Rating','Top Brand','Top Category'],
    rows: packBandStats(skus).map(b=>[ b.band, b.range, b.count, b.count?r3(b.ppg.median):'', b.reviews, b.ratingAvg!=null?b.ratingAvg:'', b.topBrand||'', b.domCat||'' ]) });

  const T = STATE.trends;
  if (T){
    const rows=[];
    Object.entries(T.brands||{}).forEach(([n,v])=>rows.push(['Brand', n, v.latest, v.direction, v.stale?'stale':'']));
    Object.entries(T.categories||{}).forEach(([n,v])=>rows.push(['Category', n, v.latest, v.direction, v.stale?'stale':'']));
    Object.entries(T.related||{}).forEach(([seed,r])=>{
      (r.top||[]).forEach(x=>rows.push([`Top search (${seed})`, x.query, x.extracted??'', '', '']));
      (r.rising||[]).forEach(x=>rows.push([`Rising (${seed})`, x.query, '', x.value||'', '']));
    });
    sheets.push({ name:'Google Trends', note:'relative search interest 0–100, not sales',
      header:['Type','Name / Query','Latest Interest','Direction / Growth','Flag'], rows });
  }

  const M = STATE.share;
  if (M && M.companies){
    sheets.push({ name:'Market Share', note:'share % estimated for all; revenue audited only where flagged',
      header:['Company','Revenue ₹Cr','Market Share % (est.)','YoY Growth %','Archetype','Revenue basis','Period','Source'],
      rows: M.companies.map(m=>[ m.company, m.biscuitRevenueCr??'', m.marketSharePct??'', m.yoyGrowthPct??'', archForShare(m), m.isEstimated?'ESTIMATED':'AUDITED', m.revenuePeriod||m.period||'', m.source||'' ]) });
  }

  const H = STATE.history||[];
  if (H.length){
    sheets.push({ name:'Trend History',
      header:['Run (UTC)','SKUs','Brands OK','Median ₹/g','Avg Discount %','Total Reviews','Avg Rating'],
      rows: H.map(h=>[ h.ts, h.skuCount, h.brandsOk, h.overall?h.overall.medianPpg:'', h.overall?h.overall.avgDiscount:'', h.overall?h.overall.totalReviews:'', h.overall?h.overall.avgRating:'' ]) });
  }
  return sheets;
}

function downloadExcel(){
  if (!window.XLSX){ alert('Excel library is still loading — please try again in a moment.'); return; }
  if (!(STATE.skus && STATE.skus.length)){ alert('No data to export yet — load or scrape first.'); return; }
  const now = new Date();
  const wb = XLSX.utils.book_new();
  buildExcelData().forEach(s=>{
    const title = `Biscuit Market Intelligence · ${s.name} · generated ${now.toLocaleString('en-IN')}${s.note?' · '+s.note:''}`;
    const ws = XLSX.utils.aoa_to_sheet([[title], [], s.header, ...s.rows]);
    ws['!cols'] = s.header.map((h,i)=>{ let w=String(h).length; s.rows.forEach(rw=>{ const v=rw[i]==null?'':String(rw[i]); if (v.length>w) w=v.length; }); return { wch: Math.min(Math.max(w+2,9),60) }; });
    XLSX.utils.book_append_sheet(wb, ws, s.name);
  });
  XLSX.writeFile(wb, `biscuit-intelligence-${now.toISOString().slice(0,10)}.xlsx`);
}
