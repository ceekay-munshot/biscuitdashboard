<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biscuit Market Intelligence — India Pricing Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Charting engine (async) — wired into the data views from a later build step. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" async></script>
<!-- Excel export (defer) — used by the export feature in a later build step. -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" defer></script>

<style>
/* ============================================================
   DESIGN SYSTEM — base (shared with the reference dashboard)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0ede8;color:#1a1a18;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:1020px;margin:0 auto;padding:28px 20px}
button{font-family:'Inter',sans-serif;background:#fff;color:#1a1a18;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;cursor:pointer;transition:background .12s,transform .1s;font-size:13px;padding:7px 14px}
button:hover:not(:disabled){background:#f7f6f3}
button:active:not(:disabled){transform:scale(0.98)}
button:disabled{opacity:.6;cursor:not-allowed}
.card{background:#fff;border:0.5px solid rgba(26,26,24,0.12);border-radius:14px;overflow:hidden}
.card-pad{padding:16px 18px}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:7px 10px;font-weight:600;color:#9b9a96;font-size:11px;letter-spacing:.04em;border-bottom:0.5px solid rgba(26,26,24,0.1);text-transform:uppercase}
td{padding:8px 10px;border-bottom:0.5px solid rgba(26,26,24,0.07)}
.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;display:inline-block}
.stat-box{background:#f7f6f3;border-radius:10px;padding:12px 14px}
.stat-box .sl{font-size:11px;color:#9b9a96;margin-bottom:4px;font-weight:500}
.stat-box .sv{font-size:22px;font-weight:700}
.bar-wrap{flex:1;height:7px;background:#f0ede8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.delta-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .3s ease both}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.1s ease-in-out infinite;vertical-align:middle;margin-right:5px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:16px}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px}
.subnav{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}
.step-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
input[type=text]{font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;width:100%;outline:none;background:#fafaf8}
input:focus{border-color:#B6772E;box-shadow:0 0 0 3px rgba(182,119,46,.12)}
@media(max-width:640px){
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .ov-head{flex-direction:column;align-items:flex-start;gap:10px}
  .ov-actions{width:100%;flex-wrap:wrap}
  .ov-actions button{flex:1 1 auto;font-size:12px}
  .ov-title,.hero-title{font-size:20px}
  .exec-h{font-size:15px}
  .chart-box{height:240px!important}
  .card-pad{padding:14px}
  table{font-size:12px}
  .chips{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .back-bar{flex-wrap:wrap}
}

/* ============================================================
   DESIGN SYSTEM — dashboard-specific extensions
   ============================================================ */
.back-bar{border-bottom:0.5px solid rgba(26,26,24,.1)}
.muted{color:#9b9a96}

/* Hero / empty state */
.hero{max-width:640px;margin:64px auto 0;text-align:center}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#B6772E;margin-bottom:14px}
.hero-title{font-size:34px;font-weight:700;line-height:1.15;letter-spacing:-.02em;margin-bottom:16px}
.hero-sub{font-size:15px;line-height:1.62;color:#5c5b57;margin:0 auto 24px;max-width:560px}
.btn-accent{background:#B6772E;color:#fff;border:0;border-radius:10px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;transition:background .12s,transform .1s}
.btn-accent:hover:not(:disabled){background:#9a6019;color:#fff}
.btn-accent:active{transform:scale(.98)}
.notice{display:inline-block;font-size:13px;font-weight:500;border-radius:8px;padding:11px 16px;max-width:560px;line-height:1.55;margin-bottom:22px}
.notice.info{color:#5c5b57;background:#fff;border:0.5px solid rgba(26,26,24,.12)}
.hero-hint{margin-top:34px;font-size:11px;color:#b6b4af}
.hero-hint kbd{font-family:inherit;font-size:10px;background:#fff;border:0.5px solid rgba(26,26,24,.18);border-radius:4px;padding:1px 5px}

/* Tables (shared) */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
th.num,td.num{text-align:center;font-variant-numeric:tabular-nums}

/* Overview — header, KPI cards, charts */
.ov-head{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:12px 16px;margin-bottom:6px}
.ov-head>div:first-child{flex:1 1 260px;min-width:240px}
.ov-title{font-size:23px;font-weight:700;letter-spacing:-.02em}
.ov-sub{font-size:12.5px;color:#5c5b57;margin-top:4px}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#138A6E;margin-right:6px;vertical-align:middle;box-shadow:0 0 0 3px rgba(19,138,110,.16)}
.ov-metricline{font-size:12px;color:#9b9a96;margin-bottom:18px}
.sec-title{font-size:11px;font-weight:600;color:#9b9a96;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.chart-box{position:relative;height:380px}
.kpi .kpi-co{font-size:12px;font-weight:600;margin-bottom:8px}
.kpi-big{font-size:29px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi-unit{font-size:15px;font-weight:600;color:#9b9a96;margin-left:1px}
.kpi .badge{margin-top:10px}
.kpi-sec{font-size:11.5px;color:#5c5b57;margin-top:11px;line-height:1.7}
.kpi.empty{opacity:.5}
.tier-value{background:#DFF1EB;color:#0A4A3A}
.tier-mainstream{background:#FAF0DC;color:#6E4300}
.tier-premium{background:#F2E7F5;color:#45184F}
.ov-actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px;flex-shrink:0}

/* Category filter chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:12px;padding:5px 11px;border-radius:20px;border:0.5px solid rgba(26,26,24,.18);background:#fff;display:inline-flex;align-items:center;gap:6px}
.chip:hover:not(:disabled){background:#f7f6f3}
.chip.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.chip-n{font-size:10px;font-weight:600;opacity:.55}
.chip.active .chip-n{opacity:.8}
.filter-note{margin-left:8px;font-size:12px;color:#B6772E;font-weight:500}

/* Company × category heatmap */
.hm{border-collapse:separate;border-spacing:3px}
.hm th{padding:4px 6px;text-transform:none;font-size:10.5px;color:#9b9a96;border:0;letter-spacing:0}
.hm-col{text-align:center}
.hm-corner{width:118px}
.hm td{border:0;padding:0}
.hm-row{font-size:12px;font-weight:500;white-space:nowrap;width:118px}
.hm-cell{text-align:center;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;border-radius:6px;padding:9px 4px!important;min-width:60px}
.hm-empty{color:#c9c7c2;background:#f7f6f3;font-weight:400}
.hm-cap{font-size:11px;color:#9b9a96;margin-top:10px}
.hm-go{float:right;color:#B6772E;font-weight:600;text-transform:none;letter-spacing:0}
.hm-card{cursor:pointer;transition:border-color .12s}
.hm-card:hover{border-color:rgba(182,119,46,.45)}

/* Category view */
.cat-name{font-size:14px;font-weight:700;margin-bottom:8px}
.cat-top{font-size:10.5px;font-weight:600;color:#9b9a96;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 9px}
.catbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11.5px}
.catbar-label{width:118px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.catbar-val{width:46px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;flex-shrink:0}

/* Detail views (company / brand) */
.detail-title{font-size:18px;font-weight:700}
.co-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;display:inline-block}
.kstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:12px;margin-bottom:16px}
.kstrip .sv{font-size:18px}
.cell-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
.top-sku{background:#fcfbf6}
td a{color:#1a1a18;text-decoration:none}
td a:hover{color:#B6772E;text-decoration:underline}
.clickable{cursor:pointer}
.kpi.clickable:hover{background:#faf9f6}
.row-click{cursor:pointer}
.row-click:hover{background:#faf9f6}

/* History view */
.hist-sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:16px}
.spark-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.spark-cell{border:0.5px solid rgba(26,26,24,.1);border-radius:10px;padding:10px 12px}
.spark-lbl{font-size:11.5px;font-weight:600;margin-bottom:6px}
.spark{position:relative;height:46px}

/* Google Trends / demand view */
.trends-banner{display:block;max-width:none;background:#FFF7E8;border:0.5px solid rgba(182,119,46,.3);color:#6E4300}
.board-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.board-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:0.5px solid rgba(26,26,24,.06)}
.board-row:last-child{border-bottom:0}
.seg{font-size:12px;padding:5px 11px}
.seg.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.sig-card .sig-brand{font-size:13px;font-weight:700;margin-bottom:8px}
.sig-metrics{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:#5c5b57;margin-bottom:10px}
.sig-sub{font-size:11px;color:#9b9a96;margin-top:6px}
.sig-premium{background:#F2E7F5;color:#45184F}
.sig-mass{background:#DFF1EB;color:#0A4A3A}
.sig-rise{background:#FFF7E8;color:#6E4300}
.sig-fade{background:#f0ede8;color:#9b9a96}
.sig-steady{background:#E6EDF8;color:#102C58}
/* Related / rising-query chips (Google Trends "Explore" panels) */
.rq-wrap{display:flex;flex-wrap:wrap;gap:7px}
.rq-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 9px;border-radius:14px;background:#DFF1EB;color:#0A4A3A;border:0.5px solid rgba(10,74,58,.18)}
.rq-chip .rq-val{font-size:10px;font-weight:700;background:rgba(10,74,58,.12);padding:1px 6px;border-radius:8px}
.rq-chip.rq-break{background:#FCE9D6;color:#8A3B00;border-color:rgba(138,59,0,.25)}
.rq-chip.rq-break .rq-val{background:#E8590C;color:#fff}
/* Market Share & Sales view */
.prov-banner{display:block;max-width:none;background:#FBF3E3;border:0.5px solid rgba(182,119,46,.35);color:#5A4300;line-height:1.55}
.prov-audited{background:#DFF1EB;color:#0A4A3A}
.prov-est{background:#FCE9D6;color:#8A3B00}
.cls-leader{background:#DFF1EB;color:#0A4A3A}
.cls-challenger{background:#E6EDF8;color:#102C58}
.cls-insurgent{background:#FCE9D6;color:#8A3B00}
.cls-declining{background:#F7E0E3;color:#7A0A1C}
.share-src{font-size:10px;margin-top:8px;color:#9b9a96}
.share-src a{color:#6E4300}
/* Revenue ranking — aligned grid (name · bar · revenue · YoY), nothing wraps */
.rev-row{display:grid;grid-template-columns:minmax(116px,1.4fr) 1fr 92px 58px;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(26,26,24,.06)}
.rev-row:last-child{border-bottom:0}
.rev-name{display:flex;align-items:center;gap:6px;min-width:0;font-size:12px}
.rev-co{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rev-tag{font-size:9px;padding:1px 5px;flex-shrink:0}
.rev-bar{height:8px;background:#f0ede8;border-radius:4px;overflow:hidden}
.rev-bar>span{display:block;height:100%;border-radius:4px}
.rev-val{text-align:right;font-weight:700;font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums}
.rev-yoy{text-align:right;font-size:11px;white-space:nowrap}
/* Compare "gap" insight — headline + chips, not a paragraph */
.gap-head{font-size:16px;font-weight:600;color:#1a1a18;line-height:1.4}
.gap-sub{font-size:12px;color:#9b9a96;margin-top:3px}
.gap-chips{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:12px}
.gap-lbl{font-size:11px;color:#9b9a96;text-transform:uppercase;letter-spacing:.04em}
.gap-chip{display:inline-flex;gap:6px;align-items:center;font-size:12px;background:#FBF3E3;border:0.5px solid rgba(182,119,46,.25);color:#5A4300;padding:3px 10px;border-radius:14px}
.gap-chip strong{color:#8A3B00}
.mr-grid{gap:14px}
/* Health & Clean-Label */
.hb{font-size:12px;line-height:1}
.hb-wrap{white-space:nowrap;margin-left:2px}
.hw-flag{box-shadow:0 0 0 2px #0A4A3A inset}
.hw-attr{font-size:13px;font-weight:700;margin-bottom:8px}
.hw-metrics{display:flex;justify-content:space-between;gap:8px;font-size:11.5px;color:#5c5b57;margin-top:10px}
.hr-white{background:#DFF1EB;color:#0A4A3A}
.hr-contest{background:#E6EDF8;color:#102C58}
.hr-over{background:#FBE7EA;color:#7A0A1C}
.hr-values{background:#FCE9D6;color:#8A3B00}
.hr-niche{background:#f0ede8;color:#7a7975}
.hbar-row{display:grid;grid-template-columns:minmax(80px,110px) 1fr 92px;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.hbar-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-val{text-align:right;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
/* Executive intelligence (Step 13) */
.kpi-signal{font-size:10.5px;color:#6b6a66;margin:6px 0 2px;line-height:1.35}
.arch-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
.arch-value{background:#DFF1EB;color:#0A4A3A}
.arch-scale{background:#FCE9D6;color:#8A3B00}
.arch-premium{background:#F2E7F5;color:#45184F}
.arch-challenger{background:#E6EDF8;color:#102C58}
.arch-insurgent{background:#FCEAE1;color:#7A2D10}
.arch-discount{background:#FBE7EA;color:#7A0A1C}
.exec-card{border-radius:12px;overflow:hidden;background:#fff;border:0.5px solid rgba(26,26,24,.08);box-shadow:0 1px 4px rgba(26,26,24,.07);margin-bottom:14px}
.exec-head{padding:13px 18px;color:#fff}
.exec-slide{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;opacity:.85}
.exec-h{font-size:17px;font-weight:800;margin-top:3px;line-height:1.2}
.exec-h-sub{font-weight:500;font-size:12px;opacity:.9}
.exec-g1{background:linear-gradient(135deg,#C77800,#7A2D10)}
.exec-g2{background:linear-gradient(135deg,#0A4A3A,#138A6E)}
.exec-g3{background:linear-gradient(135deg,#102C58,#45184F)}
.exec-body{padding:8px 14px 14px;overflow-x:auto}
.exec-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.exec-tbl th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:#9b9a96;font-weight:700;padding:7px 8px;border-bottom:0.5px solid rgba(26,26,24,.1)}
.exec-tbl td{padding:8px;border-bottom:0.5px solid rgba(26,26,24,.06);vertical-align:top}
.exec-tbl tr:last-child td{border-bottom:0}
.exec-tbl th.num,.exec-tbl td.num{text-align:center;font-variant-numeric:tabular-nums;white-space:nowrap}
.exec-tbl .dot{margin-right:6px}
.exec-tbl a{color:#1a1a18;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(26,26,24,.2)}
.exec-sub2{font-size:10px;color:#9b9a96;margin-top:1px}
.exec-take{margin-top:12px;padding:12px 14px;background:#FAF7F1;border:0.5px solid rgba(182,119,46,.18);border-radius:8px;font-size:13px;line-height:1.65;color:#3f3e3b}
.mr-para{border-left:3px solid #ccc;padding:6px 0 8px 13px;margin-bottom:13px;font-size:13px;line-height:1.6;color:#3f3e3b}
.mr-co{font-weight:700;font-size:12px;margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
/* ₹/g box-plot strip (KPI cards) */
.box-strip{position:relative;height:14px;margin-top:10px;border-radius:3px;background:linear-gradient(90deg,#f1eee8,#f8f6f2)}
.box-strip .box-w{position:absolute;top:50%;height:2px;transform:translateY(-50%);background:rgba(26,26,24,.3)}
.box-strip .box-iqr{position:absolute;top:2px;bottom:2px;border-radius:2px;opacity:.55}
.box-strip .box-med{position:absolute;top:0;bottom:0;width:2px;background:#1a1a18}
/* Provenance footer */
.pf-h{font-size:12px;font-weight:700;margin-bottom:7px}
.pf-list{font-size:12px;line-height:1.6;color:#3f3e3b;margin:0 0 4px 16px;padding:0}
.pf-list li{margin-bottom:5px}
.pf-caveat{font-size:12px;line-height:1.6;color:#5A4300;background:#FBF3E3;border:0.5px solid rgba(182,119,46,.3);border-radius:8px;padding:10px 12px;margin:10px 0}
.pf-legend{font-size:11.5px;color:#6b6a66;line-height:1.8}
/* Channel filter row + Compare */
.chips-ch{margin-bottom:8px}
.chips-ch .chip{border-style:dashed}
.ch-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;background:#DFF1EB;color:#0A4A3A;margin-left:5px;vertical-align:middle;letter-spacing:.02em}

/* Emerging-brands radar */
.roster-ref{display:flex;flex-wrap:wrap;gap:8px;line-height:1.6}
.roster-ref .grp-chip{font-size:11px;white-space:normal}

/* Admin / system info */
.admin-h{font-size:18px;font-weight:700;margin-bottom:12px}
.admin-h.sub{font-size:13px;margin:18px 0 8px}
.admin-p{font-size:13px;line-height:1.65;color:#3f3e3b;margin-bottom:12px}
.admin-list{font-size:13px;line-height:1.7;color:#3f3e3b;margin:0 0 12px 18px}
.grp-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;white-space:nowrap;display:inline-block}
.roster-row{display:flex;gap:12px;align-items:baseline;padding:8px 0;border-bottom:0.5px solid rgba(26,26,24,.07)}
.roster-row:last-child{border-bottom:0}
.roster-brands{font-size:12px;color:#5c5b57;line-height:1.5}
.kv-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:#f0ede8;color:#5c5b57}

/* ============================================================
   BISCUIT INSIGHTS — one-click editorial PDF (Get Insight).
   Fixed A4 pages (794×1123 @96dpi) rendered off-screen, each
   captured to a full-bleed PDF page. Colourful newsprint look.
   ============================================================ */
.np-stage{position:absolute;left:-12000px;top:0;width:794px;background:#FAF6EE}
.np-page{position:relative;width:794px;height:1123px;background:#FAF6EE;color:#16161D;border:2px solid #16161D;
  font-family:'Newsreader',Georgia,'Times New Roman',serif;padding:36px 42px 24px;
  display:flex;flex-direction:column;overflow:hidden}
.np-page *{box-sizing:border-box}

<script>
/* ============================================================
   BISCUIT MARKET INTELLIGENCE DASHBOARD
   Build Step 14 / 14 (FINALE) — Excel export, ₹/g distribution + box plots, provenance, polish
   Single-file, zero-build. Vanilla ES6.

   Scraping runs in GitHub Actions (scripts/scrape.mjs) and commits
   data/latest.json + data/history.json. This client only READS that
   JSON — no Firecrawl key, no parser, no runtime scraping here.
   ============================================================ */

/* ------------------------------------------------------------
   1. ENTITY MODEL  (configurable starting roster)
   ------------------------------------------------------------ */
const COL = {"Britannia":"#C8102E","Parle":"#C77800","ITC Sunfeast":"#7B2D8E","Mondelez":"#1D4E9C","Unibic":"#138A6E","Emerging / D2C":"#E05A2B"};
const BG  = {"Britannia":"#FBE7EA","Parle":"#FAF0DC","ITC Sunfeast":"#F2E7F5","Mondelez":"#E6EDF8","Unibic":"#DFF1EB","Emerging / D2C":"#FCEAE1"};
const TXT = {"Britannia":"#7A0A1C","Parle":"#6E4300","ITC Sunfeast":"#45184F","Mondelez":"#102C58","Unibic":"#0A4A3A","Emerging / D2C":"#7A2D10"};

const BRANDS = [
  {brand:"Good Day",             company:"Britannia"},
  {brand:"Bourbon",              company:"Britannia"},
  {brand:"Marie Gold",           company:"Britannia"},
  {brand:"NutriChoice",          company:"Britannia"},
  {brand:"Parle-G",              company:"Parle"},
  {brand:"Monaco",               company:"Parle"},
  {brand:"Hide & Seek",          company:"Parle"},
  {brand:"KrackJack",            company:"Parle"},
  {brand:"Dark Fantasy",         company:"ITC Sunfeast"},
  {brand:"Mom's Magic",          company:"ITC Sunfeast"},
  {brand:"Sunfeast Marie Light", company:"ITC Sunfeast"},
  {brand:"Oreo",                 company:"Mondelez"},
  {brand:"Unibic",               company:"Unibic"},
  {brand:"The Whole Truth",      company:"Emerging / D2C"},
];

const CATEGORIES = ["Cookies","Digestive","Cream","Crackers","Rusk","Wafer","Other"];
const CHIP_ORDER = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer","Other"]; // chip display order
const HEATMAP_CATS = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer"];       // 6 client categories (heatmap columns)
const CAT_COL = {Cookies:"#C77800",Cream:"#7B2D8E",Digestive:"#138A6E",Crackers:"#1D4E9C",Rusk:"#9B6B2E",Wafer:"#C8102E",Other:"#9b9a96"};

// Pack-size bands (thresholds configurable). packBand(weightGrams) → band name.
const PACK_ORDER = ["Mini","Small","Medium","Large","Family","Jumbo"];
const PACK_RANGE = {Mini:"<50g",Small:"50–99g",Medium:"100–199g",Large:"200–399g",Family:"400–799g",Jumbo:"≥800g"};
function packBand(g){
  g = +g;
  if (g < 50)  return "Mini";
  if (g < 100) return "Small";
  if (g < 200) return "Medium";
  if (g < 400) return "Large";
  if (g < 800) return "Family";
  return "Jumbo";
}

// Seeded TYPICAL shelf life (months) by category — listing pages don't carry it,
// so this is a category estimate (editable), never a per-SKU scrape.
const SHELF_LIFE = {Cream:6,Cookies:9,Digestive:9,Crackers:9,Wafer:6,Rusk:6,Other:9};
const shelfLifeFor = cat => SHELF_LIFE[cat] != null ? SHELF_LIFE[cat] : 9;

/* ------------------------------------------------------------
   2. GLOBAL STATE
   ------------------------------------------------------------ */
const TODAY = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

let STATE = {
  skus:[],              // raw SKUs from data/latest.json
  scrapedAt:null,       // ISO timestamp of the scrape
  curr:null,            // buildStats() result over the FULL dataset (chips, heatmap)
  categoryFilter:'All', // active category chip
  channelFilter:'All',  // active channel chip ('All'|'amazon'|'blinkit'|'zepto')
  compareMode:'brand',  // Channel Compare grouping: 'brand' | 'category'
  trends:null,          // data/trends.json (seeded Google Trends snapshot)
  trendsMode:'brands',  // Trends view main-chart toggle: 'brands' | 'categories'
  trendsSeed:null,      // Trends view related-queries seed toggle (null → first seed)
  share:null,           // data/marketshare.json (market share / sales — audited + labelled estimates)
  history:[],           // data/history.json
  loading:false,        // true while (re)loading the static JSON
  view:null,            // active route (null/'dashboard' default; objects carry .type)
  insight:'',           // AI insight text (later step)
  insightLoading:false  // AI insight loading flag (later step)
};

/* ------------------------------------------------------------
   3. CHART HELPERS  (defined now, used from a later step)
   ------------------------------------------------------------ */
let charts = {};
function waitForChart(cb){
  if (window.Chart){ cb(); return; }
  const t = setInterval(()=>{ if (window.Chart){ clearInterval(t); cb(); } }, 60);
}
function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  charts = {};
}
function mkChart(id, cfg){
  const cv = document.getElementById(id);
  if (!cv || !window.Chart) return null;
  if (charts[id]){ try{ charts[id].destroy(); }catch(e){} }
  cfg.options = cfg.options || {};
  // Hover tooltips appear anywhere near the data (vital for thin, point-less lines).
  if (!cfg.options.interaction) cfg.options.interaction = { mode: cfg.type==='line' ? 'index' : 'nearest', intersect:false };
  if (cfg.type === 'line' && (cfg.data.datasets||[]).length > 1) enableLineHover(cfg);   // hover a line → highlight it, dim the rest
  charts[id] = new Chart(cv.getContext('2d'), cfg);
  return charts[id];
}
// Hover-to-highlight for multi-line charts: the nearest line goes solid+thick, others dim.
const withA = (c, a) => (typeof c==='string' && c[0]==='#') ? hexToRgba(c, a) : c;
function enableLineHover(cfg){
  cfg.data.datasets.forEach(ds=>{ if (ds._base==null) ds._base = ds.borderColor; });
  const prev = cfg.options.onHover;
  cfg.options.onHover = (evt, active, chart)=>{
    if (prev) { try { prev(evt, active, chart); } catch(e){} }
    const els = chart.getElementsAtEventForMode(evt, 'nearest', { intersect:false }, true);
    const hi = els.length ? els[0].datasetIndex : -1;
    let changed = false;
    chart.data.datasets.forEach((ds,i)=>{
      const a = (hi<0 || i===hi) ? 1 : 0.12;
      if (ds._a !== a){ ds._a = a; ds.borderColor = withA(ds._base, a); ds.borderWidth = (hi>=0 && i===hi) ? 3 : 2; changed = true; }
    });
    if (changed) chart.update('none');
  };
}
// Index-to-100 toggle for time-series comparison charts (rebase each line to 100 at the start).
const rebase100 = arr => { if (!arr || !arr.length) return arr; const base = arr.find(v=>v>0) || arr[0] || 1; return arr.map(v=> Math.round(v/base*100)); };
function setChartIndex(id){ STATE.chartIndex = STATE.chartIndex || {}; STATE.chartIndex[id] = !STATE.chartIndex[id]; render(); }
function chartIndexed(id){ return !!(STATE.chartIndex && STATE.chartIndex[id]); }
function indexBtn(id){ return `<button class="seg${chartIndexed(id)?' active':''}" onclick="setChartIndex('${id}')" title="Rebase each line to 100 at the start — compare relative growth, not absolute levels">Index 100</button>`; }

/* ------------------------------------------------------------
   4. STATS ENGINE  (price-per-gram aggregations — hero metric)
   ------------------------------------------------------------ */
// Summary stats for a numeric array, each rounded to `dp` decimals.
function calcStats(nums, dp){
  const r = v => +(+v).toFixed(dp);
  if (!nums || !nums.length) return { avg:0, median:0, min:0, max:0, p25:0, p75:0, count:0 };
  const a = nums.slice().sort((x,y)=>x-y), n = a.length;
  const q = p => { const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };
  return {
    avg: r(a.reduce((s,x)=>s+x,0)/n),
    median: r(q(0.5)),
    min: r(a[0]), max: r(a[n-1]),
    p25: r(q(0.25)), p75: r(q(0.75)),
    count: n
  };
}

// Positioning tier from median ₹/g (starting thresholds, easy to tweak).
function positioning(medianPpg){
  if (medianPpg < 0.25) return 'Value';
  if (medianPpg <= 0.50) return 'Mainstream';
  return 'Premium';
}

// Group SKUs by company / brand / category and compute ₹/g (hero) + discount
// (secondary) stats, ratings and review sums for each group.
function buildStats(skus, scrapedAt = STATE.scrapedAt){
  const groupBy = key => {
    const m = new Map();
    for (const s of skus){ const k = s[key]; if (!m.has(k)) m.set(k, []); m.get(k).push(s); }
    return m;
  };
  const statFor = (gs, label, extra) => {
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    const priced = gs.filter(s=>s.inStock!==false);    // exclude out-of-stock from PRICE stats (kept elsewhere)
    const categoryCounts = {};
    for (const s of gs) categoryCounts[s.category] = (categoryCounts[s.category]||0)+1;
    return Object.assign({
      name: label,
      ppg:  calcStats(priced.map(s=>s.pricePerGram), 3),   // hero metric (in-stock only)
      disc: calcStats(priced.map(s=>s.discount), 1),       // secondary metric (in-stock only)
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      reviewSum: gs.reduce((a,s)=>a+(s.reviewCount||0),0),
      categoryCounts,
      skus: gs
    }, extra);
  };

  const companyStats  = [...groupBy('company')].map(([company,gs])  => statFor(gs, company,  { company }));
  const brandStats    = [...groupBy('brand')].map(([brand,gs])      => statFor(gs, brand,    { brand, company: gs[0].company }));
  const categoryStats = [...groupBy('category')].map(([category,gs])=> statFor(gs, category, { category }));   // rendered in Step 4

  const byMedianDesc = (a,b) => b.ppg.median - a.ppg.median;       // premium-per-gram first
  companyStats.sort(byMedianDesc);
  brandStats.sort(byMedianDesc);

  return { companyStats, brandStats, categoryStats, scrapedAt, skuCount: skus.length };
}

/* ===========================================================
   INTELLIGENCE ENGINE (Step 13) — synthesises ₹/g pricing +
   market share + Google Trends demand into per-company intel.
   companyIntel(stat, share, demand, ctx) is PURE & deterministic
   from real data — nothing fabricated, shelf-life NOT a driver,
   estimated shares never stated as hard fact.
   =========================================================== */
const PPG_LOW=0.25, PPG_HIGH=0.55, SHARE_HIGH=25, SHARE_MID=8, DISC_HEAVY=25, YOY_EMERGING=20;  // editable thresholds

const ARCH = {
  value:     { key:'value',     label:'Value Leader',    descriptor:'cheap, sells the most' },
  premium:   { key:'premium',   label:'Premium Player',  descriptor:'priciest per gram' },
  scale:     { key:'scale',     label:'Big & Premium',   descriptor:'huge reach, going upmarket' },
  challenger:{ key:'challenger',label:'Fast Grower',     descriptor:'gaining share quickly' },
  insurgent: { key:'insurgent', label:'Newcomer',        descriptor:'small, new — worth watching' },
  discount:  { key:'discount',  label:'Discount-Driven', descriptor:'wins on big discounts' },
};
const ARCH_PHRASE = { value:'the cheap, high-volume leader', scale:'a big seller moving upmarket', premium:'a high-priced premium player',
  challenger:'a fast-growing challenger', insurgent:'a small, fast-rising newcomer', discount:'a discount-driven player' };
const ARCH_TAKE = {
  value:'the volume engine — keeps prices low and defends its base',
  scale:'big and moving upmarket — defend the core, grow the premium range',
  premium:'charges the most per gram — protect that premium',
  challenger:'spending on demand and discounts to win share — momentum to watch',
  insurgent:'tiny but rising fast — one to watch',
  discount:'leans on heavy discounts to move volume — watch margins' };
const SENT = {
  strong:    { key:'strong',    icon:'🟢', word:'Strong',    cls:'sent-strong' },
  steady:    { key:'steady',    icon:'🟡', word:'Steady',    cls:'sent-steady' },
  pressured: { key:'pressured', icon:'🟠', word:'Pressured', cls:'sent-pressured' },
  watch:     { key:'watch',     icon:'🔴', word:'Watch',     cls:'sent-watch' },
};

function pickSku(skus, score){ let best=null, bs=-Infinity; for (const s of skus){ const v=score(s); if (v>bs){ bs=v; best=s; } } return best; }

// Roll the company's tracked brands up into one search-interest reading + direction.
function demandForCompany(company){
  const t = STATE.trends; if (!t || !t.brands) return null;
  const present = BRANDS.filter(b=>b.company===company).map(b=>t.brands[b.brand]).filter(Boolean);
  if (!present.length) return null;
  const interest = Math.round(present.reduce((a,x)=>a+(x.latest||0),0)/present.length);
  const dirs = present.map(x=>x.direction);
  const direction = dirs.includes('rising') && !dirs.includes('falling') ? 'rising'
                  : dirs.length && dirs.every(d=>d==='falling') ? 'falling' : 'flat';
  return { interest, direction, brandCount: present.length };
}
// Find this company group's market-share record (names differ slightly between files).
function shareForCompany(company){
  const s = STATE.share; if (!s || !Array.isArray(s.companies)) return null;
  const rx = { 'Britannia':/^Britannia/, 'Parle':/^Parle/, 'ITC Sunfeast':/ITC|Sunfeast/i,
    'Mondelez':/Mondelez/i, 'Unibic':/Unibic/i, 'Emerging / D2C':/Whole Truth|D2C/i }[company];
  return rx ? s.companies.find(c=>rx.test(c.company)) : null;
}
// A real, current breakout/rising query from Google Trends related (for the sector read).
function marketBreakoutQuery(){
  const rel = STATE.trends && STATE.trends.related; if (!rel) return null;
  for (const seed of Object.keys(rel)){
    const rising = rel[seed].rising || [];
    const brk = rising.find(x=>/breakout/i.test(x.value||'')) || rising[0];
    if (brk && brk.query) return brk.query;
  }
  return null;
}
// Mark the cheapest/priciest company by median ₹/g (for narrative framing).
function marketPpgContext(companyStats){
  const withPpg = companyStats.filter(c=>c.ppg && c.ppg.count);
  const map = {};
  if (!withPpg.length) return map;
  const sorted = withPpg.slice().sort((a,b)=>a.ppg.median-b.ppg.median);
  const lo = sorted[0].company, hi = sorted[sorted.length-1].company;
  companyStats.forEach(c=>map[c.company] = { cheapest:c.company===lo, priciest:c.company===hi });
  return map;
}

function archetypeOf(sig){
  const ppg=sig.medianPpg, sh=sig.share==null?0:sig.share, disc=sig.avgDisc, g=sig.yoy==null?0:sig.yoy;
  const dir=sig.direction, emerging=/Emerging|D2C/i.test(sig.company||'');
  if (disc >= DISC_HEAVY)                                      return ARCH.discount;
  if (ppg < PPG_LOW  && sh >= SHARE_HIGH)                      return ARCH.value;
  if (ppg < PPG_HIGH && sh >= SHARE_HIGH)                      return ARCH.scale;
  if (ppg >= PPG_HIGH && sh >= SHARE_MID)                      return ARCH.premium;
  if (sh < SHARE_MID && (g >= YOY_EMERGING || emerging) && ppg >= 0.45) return ARCH.insurgent;
  if (dir==='rising' || (sh>=SHARE_MID && sh<SHARE_HIGH) || (g>0 && sh<SHARE_HIGH)) return ARCH.challenger;
  return ARCH.challenger;
}
function sentimentOf(sig){
  const dir=sig.direction, g=sig.yoy==null?0:sig.yoy, disc=sig.avgDisc, i=sig.interest||0;
  if (dir==='falling' && (g<=3 || disc>=DISC_HEAVY))                            return SENT.watch;
  if ((dir==='rising' && g>5) || (g>=8 && dir!=='falling' && i>=20 && disc<22)) return SENT.strong;
  if (disc>=DISC_HEAVY || dir==='falling' || g<=0)                              return SENT.pressured;
  return SENT.steady;
}
function narrativeOf(sig, arch, ctx){
  const ppg = (sig.medianPpg!=null ? sig.medianPpg : 0).toFixed(2);
  const place = ctx && ctx.cheapest ? ' — the lowest ₹/g on the board'
              : ctx && ctx.priciest ? ' — the most premium ₹/g on the board' : '';
  const s1 = `${sig.company} is ${ARCH_PHRASE[arch.key]||arch.label} at ₹${ppg}/g (median) across ${sig.skuCount} SKUs${place}.`;
  let s2 = '';
  if (sig.share!=null) s2 += `It holds an estimated ~${sig.share}% market share`;
  if (sig.revenue!=null){
    const basis = sig.shareEstimated ? 'estimated' : 'audited';
    s2 += `${sig.share!=null?' on ':'On '}${basis} ${fmtCr(sig.revenue)}${sig.yoy!=null?` (${sig.yoy>=0?'+':''}${sig.yoy}% YoY)`:''}`;
  }
  const dirWord = sig.direction==='rising'?'rising':sig.direction==='falling'?'softening':'flat';
  s2 += `${s2?', with ':'With '}${dirWord} search interest${sig.interest!=null?` (${sig.interest}/100)`:''}.`;
  const s3 = `Its range skews ${sig.topCategory} and discounts ~${Math.round(sig.avgDisc)}% on average — ${ARCH_TAKE[arch.key]||''}.`;
  return `${s1} ${s2} ${s3}`;
}

// PURE: the three real datasets → one company's intelligence.
function companyIntel(stat, share, demand, ctx){
  const skus = stat.skus || [];
  const priced = skus.filter(s=>s.pricePerGram>0);
  const sig = {
    company: stat.company || stat.name,
    medianPpg: stat.ppg.median, avgDisc: stat.disc.avg, skuCount: skus.length, reviews: stat.reviewSum||0,
    topCategory: Object.entries(stat.categoryCounts||{}).sort((a,b)=>b[1]-a[1]).map(([k])=>k)[0] || '—',
    share: share ? share.marketSharePct : null,
    shareEstimated: share ? !!share.isEstimated : true,
    revenue: share ? share.biscuitRevenueCr : null,
    yoy: share ? share.yoyGrowthPct : null,
    interest: demand ? demand.interest : null,
    direction: demand ? demand.direction : 'flat',
    cheapest: pickSku(priced, s=>-s.pricePerGram),
    priciest: pickSku(priced, s=>s.pricePerGram),
    mostDiscounted: pickSku(skus, s=>s.discount||0),
    mostReviewed: pickSku(skus, s=>s.reviewCount||0),
  };
  const archetype = archetypeOf(sig);
  const sentiment = sentimentOf(sig);
  const signal = `${archetype.descriptor} · ${sentiment.word}`;
  return { archetype, sentiment, narrative: narrativeOf(sig, archetype, ctx), signal, signals: sig };
}

// Compute intel for every present company once (reused by KPI cards, exec cards, market read).
function buildIntel(companyStats){
  const ctxMap = marketPpgContext(companyStats);
  const map = {};
  companyStats.forEach(c=>{ map[c.company] = companyIntel(c, shareForCompany(c.company), demandForCompany(c.company), ctxMap[c.company]); });
  return map;
}

// Card-3 synthesis paragraph — who leads value/premium, who's rising, a real breakout query, the ₹/g spread.
function sectorTakeaway(cos, intel){
  const sigs = cos.map(c=>intel[c.company].signals);
  const byPpg = sigs.slice().sort((a,b)=>a.medianPpg-b.medianPpg);
  const valueLeader = byPpg[0], premiumLeader = byPpg[byPpg.length-1];
  const spread = premiumLeader.medianPpg / (valueLeader.medianPpg || 1);
  const rising = sigs.filter(s=>s.direction==='rising').sort((a,b)=>(b.interest||0)-(a.interest||0))[0]
              || sigs.slice().sort((a,b)=>(b.yoy||0)-(a.yoy||0))[0];
  const brk = marketBreakoutQuery();
  return `<strong>Sector read.</strong> ${esc(valueLeader.company)} anchors the value end at ₹${valueLeader.medianPpg.toFixed(2)}/g, while ${esc(premiumLeader.company)} sits at the premium end (₹${premiumLeader.medianPpg.toFixed(2)}/g) — a <strong>${spread.toFixed(1)}× ₹/g spread</strong> across the market. `
    + (rising ? `${esc(rising.company)} carries the momentum (${rising.direction==='rising'?'rising search interest':'+'+rising.yoy+'% revenue growth'}). ` : '')
    + (brk ? `A genuine breakout query right now: <em>“${esc(brk)}”</em> — emerging demand worth tracking. ` : '')
    + `Median ₹/g stays the hero metric; discount intensity and search interest are the secondary tells.`;
}

/* ------------------------------------------------------------
   5. DATA LOADING  (reads the CI-committed static JSON)
   ------------------------------------------------------------ */
async function loadData(){
  const bust = '?_=' + Date.now();   // cache-bust so each page visit fetches the freshest static data

  STATE.skus = []; STATE.scrapedAt = null; STATE.curr = null;
  try {
    const r = await fetch('/data/latest.json' + bust, { cache:'no-store' });
    if (r.ok){
      const d = await r.json();
      if (d && Array.isArray(d.skus)){
        STATE.skus = d.skus;
        STATE.scrapedAt = d.scrapedAt || null;
        if (d.skus.length) STATE.curr = buildStats(d.skus);
      }
    }
  } catch(e){ /* fail soft → empty state */ }

  try {
    const r = await fetch('/data/history.json' + bust, { cache:'no-store' });
    if (r.ok){
      const h = await r.json();
      STATE.history = Array.isArray(h) ? h : [];
    }
  } catch(e){ STATE.history = []; }

  try {
    const r = await fetch('/data/trends.json' + bust, { cache:'no-store' });
    STATE.trends = r.ok ? await r.json() : null;     // seeded Google Trends snapshot
  } catch(e){ STATE.trends = null; }

  try {
    const r = await fetch('/data/marketshare.json' + bust, { cache:'no-store' });
    STATE.share = r.ok ? await r.json() : null;      // market share / sales (audited + labelled estimates)
  } catch(e){ STATE.share = null; }
}

// Delta badge: coloured ▲/▼ vs a prior value (gray ±0 below epsilon; n/a when missing).
function deltaBadge(cur, prv, fmtMag){
  if (cur==null || prv==null) return '<span class="muted" style="font-size:11px">vs n/a</span>';
  const d = +cur - +prv;
  if (Math.abs(d) < 1e-9) return '<span class="delta-badge" style="background:#f0ede8;color:#9b9a96">±0</span>';
  const up = d>0;
  return `<span class="delta-badge" style="background:${up?'#FBE7EA':'#DFF1EB'};color:${up?'#7A0A1C':'#0A4A3A'}">${up?'▲':'▼'} ${fmtMag(Math.abs(d))}</span>`;
}

// Mini ₹/g box plot (min · p25 · median · p75 · max), scaled to a shared market range so cards compare.
function boxStripHTML(ppg, gMin, gMax, col){
  if (!ppg || !ppg.count) return '';
  const span = (gMax - gMin) || 1;
  const pc = v => +(Math.max(0, Math.min(100, ((v - gMin) / span) * 100))).toFixed(1);
  const lo=pc(ppg.min), q1=pc(ppg.p25), me=pc(ppg.median), q3=pc(ppg.p75), hi=pc(ppg.max);
  return `<div class="box-strip" title="₹/g spread — min ${rs2(ppg.min)} · p25 ${rs2(ppg.p25)} · median ${rs2(ppg.median)} · p75 ${rs2(ppg.p75)} · max ${rs2(ppg.max)}">
    <span class="box-w" style="left:${lo}%;right:${100-hi}%"></span>
    <span class="box-iqr" style="left:${q1}%;right:${100-q3}%;background:${col}"></span>
    <span class="box-med" style="left:${me}%"></span>
  </div>`;
}

function brandCompany(brand){ const b = BRANDS.find(x=>x.brand===brand); return b ? b.company : null; }
function hexToRgba(hex, a){
  const h = String(hex).replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(x=>x+x).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${(+a).toFixed(3)})`;
}
// Top-N brands in a SKU set by SKU count (tiebreak: higher ₹/g), with each brand's median ₹/g.
function topBrands(skus, n){
  const m = new Map();
  for (const s of skus){ if (!m.has(s.brand)) m.set(s.brand, []); m.get(s.brand).push(s); }
  return [...m].map(([brand,gs])=>({ brand, n:gs.length, ppgMedian: calcStats(gs.map(s=>s.pricePerGram),3).median }))
    .sort((a,b)=> b.n - a.n || b.ppgMedian - a.ppgMedian).slice(0,n);
}

/* Hero + secondary horizontal bar charts (Chart.js loads async → waitForChart). */
function drawOverviewCharts(view){
  const bs = view ? view.brandStats : [];
  if (!bs.length) return;
  const labels = bs.map(b=>b.brand);
  const colors = bs.map(b=>COL[b.company] || '#999');
  const opts = unit => ({
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    onClick:(e,els)=>{ if (els && els.length) navigate({type:'brand', brand: bs[els[0].index].brand}); },
    onHover:(e,els)=>{ e.native && (e.native.target.style.cursor = els.length ? 'pointer' : 'default'); },
    plugins:{ legend:{display:false},
      tooltip:{ callbacks:{ label:c => unit==='ppg' ? '₹'+(+c.raw).toFixed(2)+'/g' : (+c.raw).toFixed(1)+'% off' } } },
    scales:{
      x:{ beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'},
          ticks:{ font:{size:10}, callback:v => unit==='ppg' ? '₹'+v : v+'%' } },
      y:{ grid:{display:false}, ticks:{ font:{size:10.5} } }
    }
  });
  waitForChart(()=>{
    mkChart('chartPpg', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.ppg.median), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('ppg') });
    mkChart('chartDisc', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.disc.avg), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('disc') });

    // ₹/g distribution — SKU counts per bucket, one line per company.
    const cs = view.companyStats || [];
    const hiPpg = Math.max(0.6, ...cs.flatMap(c=>c.skus.map(s=>s.pricePerGram||0)));
    const BIN = 0.1, nb = Math.min(16, Math.max(6, Math.ceil(hiPpg/BIN)));
    const distLabels = Array.from({length:nb}, (_,i)=>'₹'+(i*BIN).toFixed(1));
    const distSets = cs.map(c=>{
      const counts = new Array(nb).fill(0);
      c.skus.forEach(s=>{ const v=s.pricePerGram||0; if (v>0) counts[Math.min(nb-1, Math.floor(v/BIN))]++; });
      const col = COL[c.company] || '#999';
      return { label:c.company, data:counts, borderColor:col, backgroundColor:col, borderWidth:2, tension:.35, pointRadius:0 };
    });
    mkChart('chartDist', { type:'line', data:{ labels:distLabels, datasets:distSets },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}, padding:8}},
          tooltip:{ callbacks:{ label:c=>`${c.dataset.label}: ${c.raw} SKUs @ ${c.label}/g` } } },
        scales:{ x:{ grid:{display:false}, ticks:{font:{size:9}}, title:{display:true, text:'₹/g bucket', font:{size:10}} },
                 y:{ beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}, precision:0}, title:{display:true, text:'SKUs', font:{size:10}} } } }
    });
  });
}

/* Company × category heatmap — always the FULL matrix; clicking opens Categories. */
function heatmapHTML(){
  const companies = Object.keys(COL);
  const cells = {}; let gmax = 0;
  for (const co of companies){
    cells[co] = {};
    for (const cat of HEATMAP_CATS){
      const vals = STATE.skus.filter(s=>s.company===co && s.category===cat).map(s=>s.pricePerGram);
      const m = vals.length ? calcStats(vals,3).median : null;
      cells[co][cat] = m;
      if (m!=null && m>gmax) gmax = m;
    }
  }
  const head = `<tr><th class="hm-corner"></th>${HEATMAP_CATS.map(c=>`<th class="hm-col">${c}</th>`).join('')}</tr>`;
  const rows = companies.map(co=>{
    const tds = HEATMAP_CATS.map(cat=>{
      const m = cells[co][cat];
      if (m==null) return `<td class="hm-cell hm-empty">—</td>`;
      const norm = gmax>0 ? m/gmax : 0;
      const bg = hexToRgba(COL[co], 0.12 + 0.8*norm);
      const fg = norm>0.55 ? '#fff' : '#1a1a18';
      return `<td class="hm-cell" style="background:${bg};color:${fg}" title="${esc(co)} · ${esc(cat)}: ₹${m.toFixed(2)}/g">₹${m.toFixed(2)}</td>`;
    }).join('');
    return `<tr><td class="hm-row"><span class="dot" style="background:${COL[co]}"></span>${esc(co)}</td>${tds}</tr>`;
  }).join('');

  return `
  <div class="card fadein hm-card" style="margin-bottom:16px" onclick="navigate({type:'category'})" title="Open category breakdown">
    <div class="card-pad">
      <div class="sec-title">Company × category · median ₹/g<span class="hm-go">view categories →</span></div>
      <div class="tbl-scroll"><table class="hm" style="min-width:660px">${head}${rows}</table></div>
      <div class="hm-cap">Median ₹/g by company × category · deeper = more premium per gram</div>

}

/* ---- Pack-size intelligence ---- */
// Per-band stats. Interest = total review volume (a PROXY — no public sales data).
function packBandStats(skus){
  const byBand = new Map(PACK_ORDER.map(b=>[b,[]]));
  for (const s of skus) byBand.get(packBand(s.weightGrams)).push(s);
  return PACK_ORDER.map(band=>{
    const gs = byBand.get(band);
    const catCount = {}; gs.forEach(s=>catCount[s.category]=(catCount[s.category]||0)+1);
    const domCat = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0] || null;
    const top = topBrands(gs, 1)[0];
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    return {
      band, range: PACK_RANGE[band], skus: gs, count: gs.length,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),
      disc: calcStats(gs.map(s=>s.discount), 1),
      reviews: gs.reduce((a,s)=>a+(s.reviewCount||0), 0),
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      domCat, topBrand: top ? top.brand : null
    };
  });
}

// Top-N distinct pack labels by SKU count, with total reviews each.
function commonPackSizes(skus, n){
  const m = new Map();
  for (const s of skus){
    const k = s.packLabel || (s.weightGrams + ' g');
    if (!m.has(k)) m.set(k, { label:k, count:0, reviews:0 });
    const e = m.get(k); e.count++; e.reviews += (s.reviewCount||0);
  }
  return [...m.values()].sort((a,b)=> b.count - a.count || b.reviews - a.reviews).slice(0, n);
}

const kReviews = n => n>=1000 ? (n/1000).toFixed(n>=100000?0:1).replace(/\.0$/,'')+'k' : String(n);

/* ---- Demand Intelligence — Google Trends (seeded) ---- */
function setTrendsMode(m){ STATE.trendsMode = m; render(); }
function setTrendsSeed(s){ STATE.trendsSeed = s; render(); }

// Marry seeded search interest with our live ₹/g into a positioning signal.
function trendSignal(latest, dir, ppgMedian){
  const high = latest >= 55;
  const premium = ppgMedian != null && ppgMedian > 0.5;
  if (high && premium) return { label:'Premium Demand', sub:'pricing power + pull', cls:'sig-premium' };
  if (high)            return { label:'Mass Favourite',  sub:'volume pull',        cls:'sig-mass' };
  if (dir === 'rising') return { label:'Momentum — watch', sub:'rising interest',  cls:'sig-rise' };
  if (dir === 'falling' || latest < 30) return { label:'Fading / niche', sub: dir==='falling'?'losing interest':'low interest', cls:'sig-fade' };
  return { label:'Steady', sub:'flat, mid interest', cls:'sig-steady' };
}

function renderTrends(){
  const t = STATE.trends;
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Demand Intelligence — Google Trends</strong></div>`;
  if (!t || !t.brands){
    $app().innerHTML = backBar + `<div class="notice info">No trends data — <code>data/trends.json</code> not found.</div>`;
    return;
  }
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const ppgByBrand = {}; if (STATE.curr) STATE.curr.brandStats.forEach(b=>ppgByBrand[b.brand]=b.ppg.median);
  const arrow = d => d==='rising' ? '<span style="color:#0A4A3A">▲</span>' : d==='falling' ? '<span style="color:#7A0A1C">▼</span>' : '<span class="muted">→</span>';

  // Banner: real (live) vs seeded; flag any stale (couldn't-refresh) keys honestly.
  const isLive = /live/i.test(t.source||'') || !!t.fetchedAt;
  const staleN = [...Object.values(t.brands||{}), ...Object.values(t.categories||{})].filter(x=>x&&x.stale).length;
  const fetchedDate = t.fetchedAt ? new Date(t.fetchedAt).toLocaleString('en-IN') : (t.updated||'—');
  const banner = isLive
    ? `📈 <strong>Live Google Trends</strong> · relative search interest (0–100), <strong>not sales</strong> · geo ${esc(t.geo||'IN')}, last 12 months · fetched ${esc(fetchedDate)}${staleN?` · <strong>${staleN} value(s) stale</strong> (refresh blocked — last-good kept)`:''}`
    : `📈 <strong>Seeded snapshot</strong> · relative search interest (0–100), <strong>not sales</strong> · update from trends.google.com (geo ${esc(t.geo||'IN')}) · updated ${esc(t.updated||'—')}`;

  const brandEntries = Object.entries(t.brands).map(([name,v])=>({name, ...v}));
  const ranked = brandEntries.slice().sort((a,b)=>b.latest-a.latest);
  const maxLatest = Math.max(...ranked.map(b=>b.latest), 1);
  const rankRows = ranked.map(b=>{
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="catbar-row">
      <span class="catbar-label"><span class="dot" style="background:${col}"></span>${esc(b.name)}</span>
      <span class="bar-wrap"><span class="bar-fill" style="width:${Math.round(b.latest/maxLatest*100)}%;background:${col}"></span></span>
      <span class="catbar-val">${b.latest} ${arrow(b.direction)}</span>
    </div>`;
  }).join('');

  const all = [...brandEntries, ...Object.entries(t.categories||{}).map(([n,v])=>({name:n, ...v, isCat:true}))];
  const board = arr => arr.length
    ? arr.sort((a,b)=>b.latest-a.latest).map(x=>`<div class="board-row"><span>${esc(x.name)}${x.isCat?' <span class="muted" style="font-size:10px">cat</span>':''}</span><strong>${x.latest}</strong></div>`).join('')
    : '<div class="muted" style="font-size:12px">—</div>';

  const sigCards = ranked.map(b=>{
    const ppg = ppgByBrand[b.name];
    const sig = trendSignal(b.latest, b.direction, ppg);
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="card sig-card fadein"><div class="card-pad">
      <div class="sig-brand"><span class="dot" style="background:${col}"></span>${esc(b.name)}</div>
      <div class="sig-metrics"><span>interest <strong>${b.latest}</strong> ${arrow(b.direction)}</span><span>${ppg!=null?'₹'+ppg.toFixed(2)+'/g':'<span class="muted">no ₹/g</span>'}</span></div>
      <span class="badge ${sig.cls}">${sig.label}</span>
      <div class="sig-sub">${sig.sub}</div>
    </div></div>`;
  }).join('');

  // Related & rising/breakout queries — the real Google Trends "Explore" panels (via SerpApi).
  const rel = t.related || {};
  const relSeeds = Object.keys(rel);
  let relatedCard = '';
  if (relSeeds.length){
    const seed = (STATE.trendsSeed && rel[STATE.trendsSeed]) ? STATE.trendsSeed : relSeeds[0];
    const r = rel[seed] || {};
    const top = r.top || [], rising = r.rising || [];

function drawTrendsChart(){
  const t = STATE.trends; if (!t) return;
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const src = mode === 'categories' ? (t.categories||{}) : (t.brands||{});
  let entries = Object.entries(src).map(([name,v])=>({name, ...v}));
  if (mode === 'brands') entries = entries.sort((a,b)=>b.latest-a.latest).slice(0,8);   // cap to avoid clutter
  const months = (()=>{ const o=[]; const d=new Date(); for(let i=11;i>=0;i--) o.push(new Date(d.getFullYear(),d.getMonth()-i,1).toLocaleDateString('en-IN',{month:'short'})); return o; })();
  const colorFor = name => mode==='categories' ? (CAT_COL[name]||'#B6772E') : (COL[brandCompany(name)]||'#999');
  const idxT = chartIndexed('trendsLine');
  waitForChart(()=>{
    mkChart('trendsLine', { type:'line',
      data:{ labels: months, datasets: entries.map(e=>({ label:e.name, data: idxT?rebase100(e.interest):e.interest, borderColor:colorFor(e.name), backgroundColor:colorFor(e.name), borderWidth:2, tension:.3, pointRadius:0 })) },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10}, padding:8 } }, tooltip:{ callbacks:{ label:c=>c.dataset.label+': '+c.raw+(idxT?' (start=100)':'') } } },
        scales:{ y:{ beginAtZero:true, max: idxT?undefined:100, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}}, title:{display:idxT, text:'Indexed · start = 100', font:{size:10}} },
                 x:{ grid:{display:false}, ticks:{font:{size:9}} } } }
    });
  });
}

// PURE: position a company from market share % + YoY growth. Leader / Challenger /
// Insurgent / Declining, with a colour and a one-line read.
function classifyShare(sharePct, yoyPct){
  const s = +sharePct || 0;
  const g = (yoyPct == null) ? null : +yoyPct;
  if (s >= 25)              return { label:'Leader',     cls:'cls-leader',     color:'#0A4A3A', read:'Dominant scale' + (g!=null && g<=0 ? ' — but growth has stalled' : '') };
  if (g != null && g <= 0)  return { label:'Declining',  cls:'cls-declining',  color:'#7A0A1C', read:'Losing ground — flat/negative growth' };
  if (s >= 8)               return { label:'Challenger',  cls:'cls-challenger', color:'#102C58', read:'Meaningful #2/#3 scale, still growing' };
  if (g != null && g >= 20) return { label:'Insurgent',   cls:'cls-insurgent',  color:'#8A3B00', read:'Tiny base, breakout growth' };
  return                           { label:'Insurgent',   cls:'cls-insurgent',  color:'#8A3B00', read:'Small but growing — one to watch' };
}

// Colour a company group consistently with the rest of the dashboard.
function shareColor(name){
  if (/Britannia/i.test(name))     return COL['Britannia'];
  if (/ITC|Sunfeast/i.test(name))  return COL['ITC Sunfeast'];
  if (/Parle/i.test(name))         return COL['Parle'];
  if (/Mondelez|Oreo/i.test(name)) return COL['Mondelez'];
  if (/Unibic/i.test(name))        return COL['Unibic'];
  if (/Whole Truth|D2C/i.test(name)) return COL['Emerging / D2C'];
  return '#B9B6AE';   // Others / Regional
}

const yoyHtml = g => g==null ? '<span class="muted">n/a</span>'

/* ---- Channel Compare (Amazon vs Blinkit vs Zepto, by brand or category) ---- */
const CH_LABEL = { amazon:'Amazon', blinkit:'Blinkit', zepto:'Zepto' };
const CH_COL   = { amazon:'#E8730C', blinkit:'#C99700', zepto:'#7A2D8E' };
const CH_KEYS  = ['amazon','blinkit','zepto'];
function setCompareMode(m){ STATE.compareMode = m; render(); }

// median ₹/g + avg discount per channel, grouped by brand or category (in-stock only).
function compareRows(groupKey){
  const med = a => { a = a.filter(x=>x>0).sort((x,y)=>x-y); if(!a.length) return null; const n=a.length; return +(n%2?a[(n-1)/2]:(a[n/2-1]+a[n/2])/2).toFixed(3); };
  const avg = a => a.length ? +(a.reduce((s,x)=>s+x,0)/a.length).toFixed(1) : null;
  const groups = {};
  for (const s of STATE.skus){
    if (s.inStock===false || !CH_KEYS.includes(s.channel)) continue;
    const g = s[groupKey] || '—';
    (groups[g] = groups[g] || { company:s.company, ppg:{amazon:[],blinkit:[],zepto:[]}, disc:{amazon:[],blinkit:[],zepto:[]} });
    groups[g].ppg[s.channel].push(s.pricePerGram);
    groups[g].disc[s.channel].push(s.discount);
  }
  return Object.entries(groups).map(([name,g])=>{
    const ppg  = { amazon:med(g.ppg.amazon),  blinkit:med(g.ppg.blinkit),  zepto:med(g.ppg.zepto) };
    const disc = { amazon:avg(g.disc.amazon), blinkit:avg(g.disc.blinkit), zepto:avg(g.disc.zepto) };
    const present = CH_KEYS.filter(c=>ppg[c]!=null);
    const cheapest = present.length ? present.reduce((a,b)=>ppg[b]<ppg[a]?b:a) : null;
    return { name, company:g.company, ppg, disc, present, cheapest };
  });
}

function renderCompare(){
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Overview</button><strong>Compare · ₹/g across apps</strong></div>`;
  const hasQ = STATE.skus.some(s=>s.channel==='blinkit'||s.channel==='zepto');
  if (!STATE.skus.length || !hasQ){
    $app().innerHTML = backBar + `<div class="notice info">No quick-commerce data yet — once the Scrape workflow has populated Blinkit/Zepto, revisit this page.</div>`;
    return;
  }
  const mode = STATE.compareMode==='category' ? 'category' : 'brand';
  const rows = compareRows(mode);
  const multi  = rows.filter(r=>r.present.length>=2).sort((a,b)=>(a.ppg.amazon??9)-(b.ppg.amazon??9));
  const single = rows.filter(r=>r.present.length===1);

  // INSIGHT — overall q-comm vs e-comm gap + biggest per-group gaps.
  const med = a => { a=a.filter(x=>x>0).sort((x,y)=>x-y); if(!a.length) return null; const n=a.length; return n%2?a[(n-1)/2]:(a[n/2-1]+a[n/2])/2; };
  const inStock = STATE.skus.filter(s=>s.inStock!==false);
  const eMed = med(inStock.filter(s=>s.channelType==='ecomm').map(s=>s.pricePerGram));
  const qMed = med(inStock.filter(s=>s.channelType==='qcomm').map(s=>s.pricePerGram));
  const gapPct = (eMed && qMed) ? Math.round((eMed-qMed)/eMed*100) : null;
  const gaps = multi.filter(r=>r.ppg.amazon!=null && (r.ppg.blinkit!=null||r.ppg.zepto!=null)).map(r=>{
    const q = Math.min(...[r.ppg.blinkit, r.ppg.zepto].filter(v=>v!=null));
    return { name:r.name, diffPct: Math.round((r.ppg.amazon-q)/r.ppg.amazon*100) };
  }).sort((a,b)=>Math.abs(b.diffPct)-Math.abs(a.diffPct)).slice(0,3);
  const gapHead = gapPct!=null
    ? `Quick-commerce is <strong>${Math.abs(gapPct)}% ${gapPct>=0?'cheaper':'dearer'}</strong> per gram than Amazon`
    : 'Not enough overlapping data for a gap yet';
  const gapSub = (eMed && qMed) ? `median ₹/g — q-comm ${rs2(qMed)} vs Amazon ${rs2(eMed)}` : '';
  const gapChips = gaps.length
    ? gaps.map(g=>`<span class="gap-chip">${esc(g.name)}<strong>${g.diffPct>=0?'−':'+'}${Math.abs(g.diffPct)}%</strong></span>`).join('')
    : '';

  const cell = (r,c) => r.ppg[c]==null ? '<span class="muted">—</span>'
    : `${rs2(r.ppg[c])}${r.cheapest===c?' <span class="ch-badge">cheapest</span>':''}<div class="exec-sub2">${r.disc[c]!=null?Math.round(r.disc[c])+'% off':''}</div>`;
  const rowHtml = r => `<tr>
    <td>${mode==='brand'?`<span class="dot" style="background:${COL[r.company]||'#999'}"></span>`:''}${esc(r.name)}</td>
    <td class="num">${cell(r,'amazon')}</td><td class="num">${cell(r,'blinkit')}</td><td class="num">${cell(r,'zepto')}</td>
  </tr>`;
  const singleHtml = single.length
    ? single.map(r=>`<span class="grp-chip" style="background:#f0ede8;color:#5c5b57">${esc(r.name)} · ${CH_LABEL[r.present[0]]} only (${rs2(r.ppg[r.present[0]])})</span>`).join(' ')
    : '<span class="muted">none</span>';

  $app().innerHTML = `${backBar}
  <div class="notice trends-banner">📦 Prices are the <strong>typical (median) ₹ per gram</strong> for each brand on each app — <strong>not the exact same pack matched across apps</strong>. Blinkit/Zepto prices come from a <strong>typical metro location</strong> (we couldn't lock one pincode), so read them as a city-level guide.</div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">The gap · quick-commerce vs e-commerce</div>
    <div class="gap-head">${gapHead}</div>
    ${gapSub?`<div class="gap-sub">${gapSub}</div>`:''}
    ${gapChips?`<div class="gap-chips"><span class="gap-lbl">Biggest ${mode} gaps</span>${gapChips}</div>`:''}
  </div></div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="ov-head" style="margin-bottom:12px">
      <div class="sec-title" style="margin:0">Median ₹/g by ${mode} × channel</div>
      <div class="ov-actions">
        <button class="seg${mode==='brand'?' active':''}" onclick="setCompareMode('brand')">By brand</button>
        <button class="seg${mode==='category'?' active':''}" onclick="setCompareMode('category')">By category</button>
      </div>
    </div>
    <div class="chart-box" style="height:340px"><canvas id="compareChart"></canvas></div>
  </div></div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">${mode==='brand'?'Brands':'Categories'} in ≥2 channels <span class="muted" style="text-transform:none;letter-spacing:0">· median ₹/g · % off · cheapest flagged</span></div>
    <div class="tbl-scroll"><table style="min-width:520px">
      <thead><tr><th>${mode==='brand'?'Brand':'Category'}</th><th class="num">Amazon</th><th class="num">Blinkit</th><th class="num">Zepto</th></tr></thead>
      <tbody>${multi.map(rowHtml).join('') || '<tr><td colspan="4" class="muted">No multi-channel overlap yet.</td></tr>'}</tbody>
    </table></div>
    <div class="hm-cap">Cheapest channel per ${mode} is badged. Only ${mode}s present in ≥2 channels are compared.</div>
  </div></div>

  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">Single-channel ${mode}s <span class="muted" style="text-transform:none;letter-spacing:0">· listed separately, not compared</span></div>
    <div class="roster-ref">${singleHtml}</div>
  </div></div>`;

  drawCompareChart(multi);
}

function drawCompareChart(multi){

  const top = multi.slice(0, 12);   // cap for readability

    mkChart('compareChart', { type:'bar',

/* ============================================================
   HEALTH & CLEAN-LABEL — claimed attributes (titles) × demand (Trends)
   ============================================================ */
const HEALTH_ATTRS = [
  { key:'isProtein',       trend:'protein',           label:'Protein',     badge:'🥚',   color:'#0A4A3A' },
  { key:'noMaida',         trend:'no maida',          label:'No Maida',    badge:'🌾',   color:'#6E4300' },
  { key:'sugarFree',       trend:'sugar-free',        label:'Sugar-Free',  badge:'🚫🍬', color:'#C8102E' },
  { key:'nonRefinedSugar', trend:'non-refined sugar', label:'Jaggery',     badge:'🍯',   color:'#C77800' },
  { key:'noPalmOil',       trend:'no palm oil',       label:'No Palm Oil', badge:'🌴',   color:'#7B2D8E' },
];
const READ_STYLE = {
  'Whitespace':{cls:'hr-white'}, 'Contested':{cls:'hr-contest'}, 'Over-supplied':{cls:'hr-over'},
  'Values claim':{cls:'hr-values'}, 'Niche':{cls:'hr-niche'},
};
const hMed = arr => { arr=arr.filter(x=>x>0).sort((a,b)=>a-b); if(!arr.length) return null; const n=arr.length; return +(n%2?arr[(n-1)/2]:(arr[n/2-1]+arr[n/2])/2).toFixed(3); };
function healthRead(demand, n){
  const dHi=(demand||0)>=30, sHi=n>=15;
  if (dHi && !sHi) return 'Whitespace';
  if (dHi && sHi)  return 'Contested';
  if (!dHi && sHi) return 'Over-supplied';
  return n>=10 ? 'Values claim' : 'Niche';
}
// Emoji badges for a SKU's CLAIMED attributes (from its title).
function badgesFor(s){
  const b = HEALTH_ATTRS.filter(a=>s && s[a.key]).map(a=>`<span class="hb" title="${a.label} (claimed)">${a.badge}</span>`).join('');
  return b ? ` <span class="hb-wrap">${b}</span>` : '';
}
function healthData(){
  const skus = STATE.skus.filter(s=>s.inStock!==false && s.pricePerGram>0);
  const total = skus.length || 1;
  const attrs = (STATE.trends && STATE.trends.attributes) || {};
  return HEALTH_ATTRS.map(a=>{
    const medC=hMed(skus.filter(s=>s[a.key]).map(s=>s.pricePerGram));
    const medB=hMed(skus.filter(s=>!s[a.key]).map(s=>s.pricePerGram));
    const n = skus.filter(s=>s[a.key]).length;
    const d = attrs[a.trend] || {};
    return { ...a, n, supplyPct:+(n/total*100).toFixed(1), medClaim:medC, medBase:medB,
      premium:(medC!=null && medB)?Math.round((medC-medB)/medB*100):null,
      demand:d.latest!=null?d.latest:0, dir:d.direction||'flat', interest:d.interest||null,
      read:healthRead(d.latest, n) };
  });
}
function cleanLabelLeaders(groupKey, minN){
  const skus = STATE.skus.filter(s=>s.inStock!==false);
  const g={}; skus.forEach(s=>{ (g[s[groupKey]]=g[s[groupKey]]||[]).push(s); });
  return Object.entries(g).map(([name,gs])=>{
    const clean=gs.filter(s=>s.cleanLabelScore>=1).length;
    const leads=HEALTH_ATTRS.map(a=>({a,c:gs.filter(s=>s[a.key]).length})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c).slice(0,3);
    return { name, company:gs[0].company, total:gs.length, clean, pct:Math.round(clean/gs.length*100), leads };
  }).filter(r=>r.total>=(minN||3)).sort((a,b)=>b.pct-a.pct||b.clean-a.clean);
}

  waitForChart(()=>{
    mkChart('healthScatter', { type:'bubble',

/* ===========================================================
   EXCEL EXPORT (Step 14) — multi-sheet .xlsx from the live data.
