<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biscuit Market Intelligence — India Pricing Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Charting engine (async) — wired into the data views from a later build step. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" async></script>
<!-- Excel export (defer) — used by the export feature in a later build step. -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>

<style>
/* ============================================================
   DESIGN SYSTEM — base (shared with the reference dashboard)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0ede8;color:#1a1a18;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:1020px;margin:0 auto;padding:28px 20px}
button{font-family:'Inter',sans-serif;background:#fff;color:#1a1a18;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;cursor:pointer;transition:background .12s,transform .1s;font-size:13px;padding:7px 14px}
button:hover:not(:disabled){background:#f7f6f3}
button:active:not(:disabled){transform:scale(0.98)}
button:disabled{opacity:.6;cursor:not-allowed}
.card{background:#fff;border:0.5px solid rgba(26,26,24,0.12);border-radius:14px;overflow:hidden}
.card-pad{padding:16px 18px}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:7px 10px;font-weight:600;color:#9b9a96;font-size:11px;letter-spacing:.04em;border-bottom:0.5px solid rgba(26,26,24,0.1);text-transform:uppercase}
td{padding:8px 10px;border-bottom:0.5px solid rgba(26,26,24,0.07)}
.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;display:inline-block}
.stat-box{background:#f7f6f3;border-radius:10px;padding:12px 14px}
.stat-box .sl{font-size:11px;color:#9b9a96;margin-bottom:4px;font-weight:500}
.stat-box .sv{font-size:22px;font-weight:700}
.bar-wrap{flex:1;height:7px;background:#f0ede8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.delta-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .3s ease both}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.1s ease-in-out infinite;vertical-align:middle;margin-right:5px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:16px}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px}
.step-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
input[type=text]{font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;border:0.5px solid rgba(26,26,24,0.22);border-radius:8px;width:100%;outline:none;background:#fafaf8}
input:focus{border-color:#B6772E;box-shadow:0 0 0 3px rgba(182,119,46,.12)}
@media(max-width:640px){.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}

/* ============================================================
   DESIGN SYSTEM — dashboard-specific extensions
   ============================================================ */
.back-bar{border-bottom:0.5px solid rgba(26,26,24,.1)}
.muted{color:#9b9a96}

/* Hero / empty state */
.hero{max-width:640px;margin:64px auto 0;text-align:center}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#B6772E;margin-bottom:14px}
.hero-title{font-size:34px;font-weight:700;line-height:1.15;letter-spacing:-.02em;margin-bottom:16px}
.hero-sub{font-size:15px;line-height:1.62;color:#5c5b57;margin:0 auto 24px;max-width:560px}
.btn-accent{background:#B6772E;color:#fff;border:0;border-radius:10px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;transition:background .12s,transform .1s}
.btn-accent:hover{background:#a3691f}
.btn-accent:active{transform:scale(.98)}
.notice{display:inline-block;font-size:13px;font-weight:500;border-radius:8px;padding:11px 16px;max-width:560px;line-height:1.55;margin-bottom:22px}
.notice.info{color:#5c5b57;background:#fff;border:0.5px solid rgba(26,26,24,.12)}
.hero-hint{margin-top:34px;font-size:11px;color:#b6b4af}
.hero-hint kbd{font-family:inherit;font-size:10px;background:#fff;border:0.5px solid rgba(26,26,24,.18);border-radius:4px;padding:1px 5px}

/* Raw results table (Step 2 verification — replaced in Step 3) */
.results-head{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:0.5px solid rgba(26,26,24,.1)}
.results-meta{margin-bottom:12px;font-size:13px;line-height:1.5}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-scroll table{min-width:900px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.cell-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.num{font-variant-numeric:tabular-nums}

/* Admin / system info */
.admin-h{font-size:18px;font-weight:700;margin-bottom:12px}
.admin-h.sub{font-size:13px;margin:18px 0 8px}
.admin-p{font-size:13px;line-height:1.65;color:#3f3e3b;margin-bottom:12px}
.admin-list{font-size:13px;line-height:1.7;color:#3f3e3b;margin:0 0 12px 18px}
.grp-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;white-space:nowrap;display:inline-block}
.roster-row{display:flex;gap:12px;align-items:baseline;padding:8px 0;border-bottom:0.5px solid rgba(26,26,24,.07)}
.roster-row:last-child{border-bottom:0}
.roster-brands{font-size:12px;color:#5c5b57;line-height:1.5}
.kv-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:#f0ede8;color:#5c5b57}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   BISCUIT MARKET INTELLIGENCE DASHBOARD
   Build Step 2 / 12 — CI scrape → static JSON
   Single-file, zero-build. Vanilla ES6.

   Scraping runs in GitHub Actions (scripts/scrape.mjs) and commits
   data/latest.json + data/history.json. This client only READS that
   JSON — no Firecrawl key, no parser, no runtime scraping here.
   ============================================================ */

/* ------------------------------------------------------------
   1. ENTITY MODEL  (configurable starting roster)
   ------------------------------------------------------------ */
const COL = {"Britannia":"#C8102E","Parle":"#C77800","ITC Sunfeast":"#7B2D8E","Mondelez":"#1D4E9C","Unibic":"#138A6E","Emerging / D2C":"#E05A2B"};
const BG  = {"Britannia":"#FBE7EA","Parle":"#FAF0DC","ITC Sunfeast":"#F2E7F5","Mondelez":"#E6EDF8","Unibic":"#DFF1EB","Emerging / D2C":"#FCEAE1"};
const TXT = {"Britannia":"#7A0A1C","Parle":"#6E4300","ITC Sunfeast":"#45184F","Mondelez":"#102C58","Unibic":"#0A4A3A","Emerging / D2C":"#7A2D10"};

const BRANDS = [
  {brand:"Good Day",             company:"Britannia"},
  {brand:"Bourbon",              company:"Britannia"},
  {brand:"Marie Gold",           company:"Britannia"},
  {brand:"NutriChoice",          company:"Britannia"},
  {brand:"Parle-G",              company:"Parle"},
  {brand:"Monaco",               company:"Parle"},
  {brand:"Hide & Seek",          company:"Parle"},
  {brand:"KrackJack",            company:"Parle"},
  {brand:"Dark Fantasy",         company:"ITC Sunfeast"},
  {brand:"Mom's Magic",          company:"ITC Sunfeast"},
  {brand:"Sunfeast Marie Light", company:"ITC Sunfeast"},
  {brand:"Oreo",                 company:"Mondelez"},
  {brand:"Unibic",               company:"Unibic"},
  {brand:"The Whole Truth",      company:"Emerging / D2C"},
];

const CATEGORIES = ["Cookies","Digestive","Cream","Crackers","Rusk","Wafer","Other"];

/* ------------------------------------------------------------
   2. GLOBAL STATE
   ------------------------------------------------------------ */
const TODAY = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

let STATE = {
  curr:null,            // { skus:[...], scrapedAt } from data/latest.json
  history:[],           // data/history.json
  loading:false,        // true while (re)loading the static JSON
  view:null,            // active route (null/'dashboard' default; objects carry .type)
  insight:'',           // AI insight text (later step)
  insightLoading:false  // AI insight loading flag (later step)
};

/* ------------------------------------------------------------
   3. CHART HELPERS  (defined now, used from a later step)
   ------------------------------------------------------------ */
let charts = {};
function waitForChart(cb){
  if (window.Chart){ cb(); return; }
  const t = setInterval(()=>{ if (window.Chart){ clearInterval(t); cb(); } }, 60);
}
function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  charts = {};
}
function mkChart(id, cfg){
  const cv = document.getElementById(id);
  if (!cv || !window.Chart) return null;
  if (charts[id]){ try{ charts[id].destroy(); }catch(e){} }
  charts[id] = new Chart(cv.getContext('2d'), cfg);
  return charts[id];
}

/* ------------------------------------------------------------
   4. DATA LOADING  (reads the CI-committed static JSON)
   ------------------------------------------------------------ */
async function loadData(){
  const bust = '?_=' + Date.now();   // cache-bust so ↻ Reload sees fresh data

  STATE.curr = null;
  try {
    const r = await fetch('/data/latest.json' + bust, { cache:'no-store' });
    if (r.ok){
      const d = await r.json();
      if (d && Array.isArray(d.skus) && d.skus.length){
        STATE.curr = { skus: d.skus, scrapedAt: d.scrapedAt || null };
      }
    }
  } catch(e){ /* fail soft → empty state */ }

  try {
    const r = await fetch('/data/history.json' + bust, { cache:'no-store' });
    if (r.ok){
      const h = await r.json();
      STATE.history = Array.isArray(h) ? h : [];
    }
  } catch(e){ STATE.history = []; }
}

async function reload(){
  STATE.loading = true; render();
  await loadData();
  STATE.loading = false; render();
}

/* ------------------------------------------------------------
   5. ROUTER
   ------------------------------------------------------------ */
function navigate(view){
  STATE.view = view;
  window.scrollTo(0,0);
  render();
}

function render(){
  destroyCharts();
  const v = STATE.view;
  const type = (v == null) ? 'dashboard' : (typeof v === 'string' ? v : v.type);

  switch (type){
    case 'admin':
      renderAdmin();
      break;

    /* ---- Views arriving in later build steps -----------------------------
       case 'brand':    renderBrand(v);    break;
       case 'category': renderCategory(v); break;
       case 'packsize': renderPackSize(v); break;
       case 'trends':   renderTrends();    break;
       case 'radar':    renderRadar();     break;
       case 'share':    renderShare();     break;
       case 'history':  renderHistory();   break;
       --------------------------------------------------------------------- */

    case 'dashboard':
    default:
      renderDashboard();
      break;
  }
}

/* ------------------------------------------------------------
   6. RENDERERS
   ------------------------------------------------------------ */
const $app = () => document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function renderDashboard(){
  if (STATE.curr && STATE.curr.skus && STATE.curr.skus.length){ $app().innerHTML = rawResultsHTML(); return; }
  $app().innerHTML = emptyStateHTML();
}

function emptyStateHTML(){
  const groups = Object.keys(COL).join(' · ');
  const msg = STATE.loading
    ? `<div class="notice info"><span class="pulse-dot" style="color:#B6772E"></span>Loading data…</div>`
    : `<div class="notice info">No data yet — run the <strong>Scrape</strong> workflow (GitHub → <strong>Actions</strong> tab → <em>Run workflow</em>) to populate, then reload.</div>`;

  return `
  <div class="hero fadein">
    <div class="hero-eyebrow">Biscuit Market Intelligence</div>
    <h1 class="hero-title">India Quick-Comm &amp; E-Comm Pricing Dashboard</h1>
    <p class="hero-sub">
      Tracking <strong>${BRANDS.length} brands</strong> across ${groups} —
      with <strong>price-per-gram</strong> as the hero metric.
    </p>
    <div>${msg}</div>
    <div><button class="btn-accent" onclick="reload()">↻ Reload</button></div>
    <div class="hero-hint"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd> for admin / system info</div>
  </div>`;
}

/* TEMPORARY raw results table — replaced by aggregated views in Step 3. */
function rawResultsHTML(){
  const skus = STATE.curr.skus.slice().sort((a,b)=>
    a.brand.localeCompare(b.brand) || a.pricePerGram-b.pricePerGram);
  const brandsFound = new Set(skus.map(s=>s.brand)).size;
  const scrapedAt = STATE.curr.scrapedAt ? new Date(STATE.curr.scrapedAt) : null;
  const asOf = scrapedAt ? scrapedAt.toLocaleString('en-IN') : '—';

  const rows = skus.map(s=>{
    const c = COL[s.company] || '#555';
    return `<tr>
      <td><span class="dot" style="background:${c}"></span>${esc(s.brand)}</td>
      <td class="cell-name" title="${esc(s.name)}">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${esc(s.name)}</a>`:esc(s.name)}</td>
      <td>${esc(s.category)}</td>
      <td>${esc(s.packLabel||'')} <span class="muted">(${s.weightGrams} g)</span></td>
      <td class="num">${s.mrp!=null?'₹'+s.mrp:'<span class="muted">—</span>'}</td>
      <td class="num"><strong>₹${s.selling}</strong></td>
      <td class="num">${s.discount?`<span class="badge" style="background:#DFF1EB;color:#0A4A3A">${s.discount}%</span>`:'<span class="muted">—</span>'}</td>
      <td class="num"><strong>₹${(s.pricePerGram).toFixed(2)}</strong></td>
      <td>${esc(s.platform)}</td>
      <td class="num">${s.rating!=null?'★ '+s.rating:'<span class="muted">—</span>'}</td>
      <td class="num">${s.reviewCount!=null?Number(s.reviewCount).toLocaleString('en-IN'):'<span class="muted">—</span>'}</td>
    </tr>`;
  }).join('');

  return `
  <div class="results-head">
    <strong>Scrape Results <span class="muted">(raw — Step 2 verification)</span></strong>
    <button style="margin-left:auto" onclick="reload()"${STATE.loading?' disabled':''}>↻ Reload</button>
  </div>
  <div class="card fadein"><div class="card-pad">
    <div class="results-meta">
      <strong>${skus.length}</strong> SKUs across <strong>${brandsFound}</strong> brands ·
      data as of ${asOf}
    </div>
    <div class="tbl-scroll">
    <table>
      <colgroup>
        <col style="width:12%"><col style="width:23%"><col style="width:9%"><col style="width:14%">
        <col style="width:7%"><col style="width:8%"><col style="width:7%"><col style="width:7%">
        <col style="width:9%"><col style="width:6%"><col style="width:7%">
      </colgroup>
      <thead><tr>
        <th>Brand</th><th>Name</th><th>Category</th><th>Pack</th>
        <th>MRP</th><th>Selling</th><th>Disc%</th><th>₹/g</th>
        <th>Platform</th><th>★</th><th>#</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div></div>`;
}

function renderAdmin(){
  const roster = Object.keys(COL).map(g=>{
    const brands = BRANDS.filter(b=>b.company===g).map(b=>b.brand).join(', ');
    return `
    <div class="roster-row">
      <span class="grp-chip" style="background:${BG[g]};color:${TXT[g]}">${g}</span>
      <span class="roster-brands">${brands}</span>
    </div>`;
  }).join('');

  const hist = (STATE.history||[]).slice(-1)[0];
  const histLine = hist
    ? `Last run: ${new Date(hist.ts).toLocaleString('en-IN')} — ${hist.skuCount} SKUs, ${hist.brandsOk}/${BRANDS.length} brands OK.`
    : 'No runs recorded yet.';

  $app().innerHTML = `
  <div class="back-bar">
    <button onclick="navigate('dashboard')">← Back</button>
    <strong>Admin · System Info</strong>
  </div>

  <div class="card fadein">
    <div class="card-pad">
      <h2 class="admin-h">How it works</h2>
      <p class="admin-p">
        This dashboard tracks <strong>${BRANDS.length} biscuit brands</strong> across
        <strong>${Object.keys(COL).length} company groups</strong> and
        <strong>${CATEGORIES.length} categories</strong>
        (${CATEGORIES.join(', ')}). <strong>Price-per-gram (₹/g)</strong> is the hero metric,
        reported alongside discount vs MRP, pack sizes and reviews.
      </p>

      <h3 class="admin-h sub">Data pipeline (CI-scraped → static)</h3>
      <ul class="admin-list">
        <li><strong>Scrape</strong> — a GitHub Action (<code>scripts/scrape.mjs</code>) runs Firecrawl
          using a key held only as a GitHub Actions secret, parses weight, ₹/g, discount, category
          and reviews, and commits <code>data/latest.json</code> + <code>data/history.json</code>.</li>
        <li><strong>Serve</strong> — Cloudflare's git build deploys the committed JSON as static assets.</li>
        <li><strong>Read</strong> — this page fetches <code>/data/latest.json</code>. No key in the
          browser, no runtime scraping, no Cloudflare secret.</li>
        <li><strong>Quick-commerce, Google Trends &amp; market share</strong> — seeded &amp; editable (later steps).</li>
      </ul>

      <h3 class="admin-h sub">Status</h3>
      <p class="admin-p">
        Loaded ${TODAY}. ${histLine} Build progress:
        <strong>Step 2 of 12</strong> — CI scrape → static JSON.
      </p>

      <h3 class="admin-h sub">Tracked roster</h3>
      ${roster}
    </div>
  </div>`;
}

/* ------------------------------------------------------------
   7. BOOT
   ------------------------------------------------------------ */
document.addEventListener('keydown', e=>{
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'A' || e.key === 'a')){
    e.preventDefault();
    navigate({type:'admin'});
  }
});

render();
loadData().then(render);
</script>
</body>
</html>
