<script>
/* ============================================================
   BISCUIT MARKET INTELLIGENCE DASHBOARD
   Build Step 11 / 14 — real Google Trends fetch (CI, best-effort, replaces seed)
   Single-file, zero-build. Vanilla ES6.

   Scraping runs in GitHub Actions (scripts/scrape.mjs) and commits
   data/latest.json + data/history.json. This client only READS that
   JSON — no Firecrawl key, no parser, no runtime scraping here.
   ============================================================ */

/* ------------------------------------------------------------
   1. ENTITY MODEL  (configurable starting roster)
   ------------------------------------------------------------ */
const COL = {"Britannia":"#C8102E","Parle":"#C77800","ITC Sunfeast":"#7B2D8E","Mondelez":"#1D4E9C","Unibic":"#138A6E","Emerging / D2C":"#E05A2B"};
const BG  = {"Britannia":"#FBE7EA","Parle":"#FAF0DC","ITC Sunfeast":"#F2E7F5","Mondelez":"#E6EDF8","Unibic":"#DFF1EB","Emerging / D2C":"#FCEAE1"};
const TXT = {"Britannia":"#7A0A1C","Parle":"#6E4300","ITC Sunfeast":"#45184F","Mondelez":"#102C58","Unibic":"#0A4A3A","Emerging / D2C":"#7A2D10"};

const BRANDS = [
  {brand:"Good Day",             company:"Britannia"},
  {brand:"Bourbon",              company:"Britannia"},
  {brand:"Marie Gold",           company:"Britannia"},
  {brand:"NutriChoice",          company:"Britannia"},
  {brand:"Parle-G",              company:"Parle"},
  {brand:"Monaco",               company:"Parle"},
  {brand:"Hide & Seek",          company:"Parle"},
  {brand:"KrackJack",            company:"Parle"},
  {brand:"Dark Fantasy",         company:"ITC Sunfeast"},
  {brand:"Mom's Magic",          company:"ITC Sunfeast"},
  {brand:"Sunfeast Marie Light", company:"ITC Sunfeast"},
  {brand:"Oreo",                 company:"Mondelez"},
  {brand:"Unibic",               company:"Unibic"},
  {brand:"The Whole Truth",      company:"Emerging / D2C"},
];

const CATEGORIES = ["Cookies","Digestive","Cream","Crackers","Rusk","Wafer","Other"];
const CHIP_ORDER = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer","Other"]; // chip display order
const HEATMAP_CATS = ["Cookies","Cream","Digestive","Crackers","Rusk","Wafer"];       // 6 client categories (heatmap columns)
const CAT_COL = {Cookies:"#C77800",Cream:"#7B2D8E",Digestive:"#138A6E",Crackers:"#1D4E9C",Rusk:"#9B6B2E",Wafer:"#C8102E",Other:"#9b9a96"};

// Pack-size bands (thresholds configurable). packBand(weightGrams) → band name.
const PACK_ORDER = ["Mini","Small","Medium","Large","Family","Jumbo"];
const PACK_RANGE = {Mini:"<50g",Small:"50–99g",Medium:"100–199g",Large:"200–399g",Family:"400–799g",Jumbo:"≥800g"};
function packBand(g){
  g = +g;
  if (g < 50)  return "Mini";
  if (g < 100) return "Small";
  if (g < 200) return "Medium";
  if (g < 400) return "Large";
  if (g < 800) return "Family";
  return "Jumbo";
}

// Seeded TYPICAL shelf life (months) by category — listing pages don't carry it,
// so this is a category estimate (editable), never a per-SKU scrape.
const SHELF_LIFE = {Cream:6,Cookies:9,Digestive:9,Crackers:9,Wafer:6,Rusk:6,Other:9};
const shelfLifeFor = cat => SHELF_LIFE[cat] != null ? SHELF_LIFE[cat] : 9;

/* ------------------------------------------------------------
   2. GLOBAL STATE
   ------------------------------------------------------------ */
const TODAY = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

let STATE = {
  skus:[],              // raw SKUs from data/latest.json
  scrapedAt:null,       // ISO timestamp of the scrape
  curr:null,            // buildStats() result over the FULL dataset (chips, heatmap)
  categoryFilter:'All', // active category chip
  trends:null,          // data/trends.json (seeded Google Trends snapshot)
  trendsMode:'brands',  // Trends view main-chart toggle: 'brands' | 'categories'
  history:[],           // data/history.json
  loading:false,        // true while (re)loading the static JSON
  view:null,            // active route (null/'dashboard' default; objects carry .type)
  insight:'',           // AI insight text (later step)
  insightLoading:false  // AI insight loading flag (later step)
};

/* ------------------------------------------------------------
   3. CHART HELPERS  (defined now, used from a later step)
   ------------------------------------------------------------ */
let charts = {};
function waitForChart(cb){
  if (window.Chart){ cb(); return; }
  const t = setInterval(()=>{ if (window.Chart){ clearInterval(t); cb(); } }, 60);
}
function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  charts = {};
}
function mkChart(id, cfg){
  const cv = document.getElementById(id);
  if (!cv || !window.Chart) return null;
  if (charts[id]){ try{ charts[id].destroy(); }catch(e){} }
  charts[id] = new Chart(cv.getContext('2d'), cfg);
  return charts[id];
}

/* ------------------------------------------------------------
   4. STATS ENGINE  (price-per-gram aggregations — hero metric)
   ------------------------------------------------------------ */
// Summary stats for a numeric array, each rounded to `dp` decimals.
function calcStats(nums, dp){
  const r = v => +(+v).toFixed(dp);
  if (!nums || !nums.length) return { avg:0, median:0, min:0, max:0, p25:0, p75:0, count:0 };
  const a = nums.slice().sort((x,y)=>x-y), n = a.length;
  const q = p => { const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };
  return {
    avg: r(a.reduce((s,x)=>s+x,0)/n),
    median: r(q(0.5)),
    min: r(a[0]), max: r(a[n-1]),
    p25: r(q(0.25)), p75: r(q(0.75)),
    count: n
  };
}

// Positioning tier from median ₹/g (starting thresholds, easy to tweak).
function positioning(medianPpg){
  if (medianPpg < 0.25) return 'Value';
  if (medianPpg <= 0.50) return 'Mainstream';
  return 'Premium';
}

// Group SKUs by company / brand / category and compute ₹/g (hero) + discount
// (secondary) stats, ratings and review sums for each group.
function buildStats(skus, scrapedAt = STATE.scrapedAt){
  const groupBy = key => {
    const m = new Map();
    for (const s of skus){ const k = s[key]; if (!m.has(k)) m.set(k, []); m.get(k).push(s); }
    return m;
  };
  const statFor = (gs, label, extra) => {
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    const categoryCounts = {};
    for (const s of gs) categoryCounts[s.category] = (categoryCounts[s.category]||0)+1;
    return Object.assign({
      name: label,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),   // hero metric
      disc: calcStats(gs.map(s=>s.discount), 1),       // secondary metric
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      reviewSum: gs.reduce((a,s)=>a+(s.reviewCount||0),0),
      categoryCounts,
      skus: gs
    }, extra);
  };

  const companyStats  = [...groupBy('company')].map(([company,gs])  => statFor(gs, company,  { company }));
  const brandStats    = [...groupBy('brand')].map(([brand,gs])      => statFor(gs, brand,    { brand, company: gs[0].company }));
  const categoryStats = [...groupBy('category')].map(([category,gs])=> statFor(gs, category, { category }));   // rendered in Step 4

  const byMedianDesc = (a,b) => b.ppg.median - a.ppg.median;       // premium-per-gram first
  companyStats.sort(byMedianDesc);
  brandStats.sort(byMedianDesc);

  return { companyStats, brandStats, categoryStats, scrapedAt, skuCount: skus.length };
}

/* ------------------------------------------------------------
   5. DATA LOADING  (reads the CI-committed static JSON)
   ------------------------------------------------------------ */
async function loadData(){
  const bust = '?_=' + Date.now();   // cache-bust so ↻ Reload sees fresh data

  STATE.skus = []; STATE.scrapedAt = null; STATE.curr = null;
  try {
    const r = await fetch('/data/latest.json' + bust, { cache:'no-store' });
    if (r.ok){
      const d = await r.json();
      if (d && Array.isArray(d.skus)){
        STATE.skus = d.skus;
        STATE.scrapedAt = d.scrapedAt || null;
        if (d.skus.length) STATE.curr = buildStats(d.skus);
      }
    }
  } catch(e){ /* fail soft → empty state */ }

  try {
    const r = await fetch('/data/history.json' + bust, { cache:'no-store' });
    if (r.ok){
      const h = await r.json();
      STATE.history = Array.isArray(h) ? h : [];
    }
  } catch(e){ STATE.history = []; }

  try {
    const r = await fetch('/data/trends.json' + bust, { cache:'no-store' });
    STATE.trends = r.ok ? await r.json() : null;     // seeded Google Trends snapshot
  } catch(e){ STATE.trends = null; }
}

async function reload(){
  STATE.loading = true; render();
  await loadData();
  STATE.loading = false; render();
}

/* ------------------------------------------------------------
   6. ROUTER
   ------------------------------------------------------------ */
function navigate(view){
  STATE.view = view;
  window.scrollTo(0,0);
  render();
}

function render(){
  destroyCharts();
  const v = STATE.view;
  const type = (v == null) ? 'dashboard' : (typeof v === 'string' ? v : v.type);

  switch (type){
    case 'admin':
      renderAdmin();
      break;

    case 'category':
      renderCategory();
      break;

    case 'packsize':
      renderPackSize();
      break;

    case 'company':
      renderCompany(v && v.company);
      break;

    case 'brand':
      renderBrand(v && v.brand);
      break;

    case 'history':
      renderHistory();
      break;

    case 'trends':
      renderTrends();
      break;

    case 'radar':
      renderRadar();
      break;

    /* ---- Views arriving in later build steps -----------------------------
       case 'share':    renderShare();     break;
       case 'history':  renderHistory();   break;
       --------------------------------------------------------------------- */

    case 'dashboard':
    default:
      renderDashboard();
      break;
  }
}

/* ------------------------------------------------------------
   7. RENDERERS
   ------------------------------------------------------------ */
const $app = () => document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rs2 = v => '₹' + (+v).toFixed(2);                 // ₹/g formatter
const revNum = n => n!=null ? Number(n).toLocaleString('en-IN') : '—';   // full review count
const kCompact = n => n>=1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'')+'M' : n>=1e3 ? Math.round(n/1e3)+'k' : String(n);
const linkName = s => s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>` : esc(s.name);
// Safe inline onclick="navigate({type,[key]:val})" — escapes ' for JS and & for HTML.
const navAttr = (type, key, val) => esc(`navigate({type:'${type}',${key}:'${String(val).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'})`);
// KPI strip of labelled stat boxes.
const kpiStrip = items => `<div class="kstrip">${items.map(it=>`<div class="stat-box"><div class="sl">${it.label}</div><div class="sv">${it.value}</div></div>`).join('')}</div>`;
// History helpers
const slug = s => String(s).replace(/[^a-z0-9]/gi,'_');
const fmtRun = ts => { const d=new Date(ts); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); };
// Delta badge: coloured ▲/▼ vs a prior value (gray ±0 below epsilon; n/a when missing).
function deltaBadge(cur, prv, fmtMag){
  if (cur==null || prv==null) return '<span class="muted" style="font-size:11px">vs n/a</span>';
  const d = +cur - +prv;
  if (Math.abs(d) < 1e-9) return '<span class="delta-badge" style="background:#f0ede8;color:#9b9a96">±0</span>';
  const up = d>0;
  return `<span class="delta-badge" style="background:${up?'#FBE7EA':'#DFF1EB'};color:${up?'#7A0A1C':'#0A4A3A'}">${up?'▲':'▼'} ${fmtMag(Math.abs(d))}</span>`;
}

/* Category filter + small helpers */
function setCategoryFilter(cat){ STATE.categoryFilter = cat; render(); }
function currentFilterSkus(){
  const f = STATE.categoryFilter || 'All';
  return f === 'All' ? STATE.skus : STATE.skus.filter(s=>s.category===f);
}
function brandCompany(brand){ const b = BRANDS.find(x=>x.brand===brand); return b ? b.company : null; }
function hexToRgba(hex, a){
  const h = String(hex).replace('#','');
  const n = parseInt(h.length===3 ? h.split('').map(x=>x+x).join('') : h, 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${(+a).toFixed(3)})`;
}
// Top-N brands in a SKU set by SKU count (tiebreak: higher ₹/g), with each brand's median ₹/g.
function topBrands(skus, n){
  const m = new Map();
  for (const s of skus){ if (!m.has(s.brand)) m.set(s.brand, []); m.get(s.brand).push(s); }
  return [...m].map(([brand,gs])=>({ brand, n:gs.length, ppgMedian: calcStats(gs.map(s=>s.pricePerGram),3).median }))
    .sort((a,b)=> b.n - a.n || b.ppgMedian - a.ppgMedian).slice(0,n);
}

    scales:{

}

/* Company × category heatmap — always the FULL matrix; clicking opens Categories. */
function heatmapHTML(){
  const companies = Object.keys(COL);
  const cells = {}; let gmax = 0;
  for (const co of companies){
    cells[co] = {};
    for (const cat of HEATMAP_CATS){
      const vals = STATE.skus.filter(s=>s.company===co && s.category===cat).map(s=>s.pricePerGram);
      const m = vals.length ? calcStats(vals,3).median : null;
      cells[co][cat] = m;
      if (m!=null && m>gmax) gmax = m;
    }
  }
  const head = `<tr><th class="hm-corner"></th>${HEATMAP_CATS.map(c=>`<th class="hm-col">${c}</th>`).join('')}</tr>`;
  const rows = companies.map(co=>{
    const tds = HEATMAP_CATS.map(cat=>{
      const m = cells[co][cat];
      if (m==null) return `<td class="hm-cell hm-empty">—</td>`;
      const norm = gmax>0 ? m/gmax : 0;
      const bg = hexToRgba(COL[co], 0.12 + 0.8*norm);
      const fg = norm>0.55 ? '#fff' : '#1a1a18';
      return `<td class="hm-cell" style="background:${bg};color:${fg}" title="${esc(co)} · ${esc(cat)}: ₹${m.toFixed(2)}/g">₹${m.toFixed(2)}</td>`;
    }).join('');
    return `<tr><td class="hm-row"><span class="dot" style="background:${COL[co]}"></span>${esc(co)}</td>${tds}</tr>`;
  }).join('');

  return `
  <div class="card fadein hm-card" style="margin-bottom:16px" onclick="navigate({type:'category'})" title="Open category breakdown">
    <div class="card-pad">
      <div class="sec-title">Company × category · median ₹/g<span class="hm-go">view categories →</span></div>
      <div class="tbl-scroll"><table class="hm" style="min-width:660px">${head}${rows}</table></div>
      <div class="hm-cap">Median ₹/g by company × category · deeper = more premium per gram</div>
    </div>
  </div>`;
}

/* ---- Pack-size intelligence ---- */
// Per-band stats. Interest = total review volume (a PROXY — no public sales data).
function packBandStats(skus){
  const byBand = new Map(PACK_ORDER.map(b=>[b,[]]));
  for (const s of skus) byBand.get(packBand(s.weightGrams)).push(s);
  return PACK_ORDER.map(band=>{
    const gs = byBand.get(band);
    const catCount = {}; gs.forEach(s=>catCount[s.category]=(catCount[s.category]||0)+1);
    const domCat = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0] || null;
    const top = topBrands(gs, 1)[0];
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    return {
      band, range: PACK_RANGE[band], skus: gs, count: gs.length,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),
      disc: calcStats(gs.map(s=>s.discount), 1),
      reviews: gs.reduce((a,s)=>a+(s.reviewCount||0), 0),
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      domCat, topBrand: top ? top.brand : null
    };
  });
}

// Top-N distinct pack labels by SKU count, with total reviews each.
function commonPackSizes(skus, n){
  const m = new Map();
  for (const s of skus){
    const k = s.packLabel || (s.weightGrams + ' g');
    if (!m.has(k)) m.set(k, { label:k, count:0, reviews:0 });
    const e = m.get(k); e.count++; e.reviews += (s.reviewCount||0);
  }
  return [...m.values()].sort((a,b)=> b.count - a.count || b.reviews - a.reviews).slice(0, n);
}

const kReviews = n => n>=1000 ? (n/1000).toFixed(n>=100000?0:1).replace(/\.0$/,'')+'k' : String(n);

function renderPackSize(){
  if (!STATE.skus.length){

  }
  const bands = packBandStats(STATE.skus);
  const common = commonPackSizes(STATE.skus, 8);

    if (!b.count) return `<tr style="opacity:.5"><td><strong>${b.band}</strong> <span class="muted">${b.range}</span></td><td class="num">0</td><td class="num" colspan="6">—</td></tr>`;

    return `<tr>
      <td><strong>${b.band}</strong> <span class="muted">${b.range}</span></td>
      <td class="num">${b.count}</td>
      <td class="num"><strong>${rs2(b.ppg.median)}</strong></td>

      <td>${b.topBrand?`<span class="dot" style="background:${tcol}"></span>${esc(b.topBrand)}`:'—'}</td>
    </tr>`;
  }).join('');

  const maxRev = Math.max(...common.map(c=>c.reviews), 1);
  const commonList = common.map(c=>`
    <div class="catbar-row">
      <span class="catbar-label">${esc(c.label)}</span>
      <span class="muted" style="width:58px;font-size:10.5px;flex-shrink:0">${c.count} SKUs</span>
      <span class="bar-wrap"><span class="bar-fill" style="width:${Math.round(c.reviews/maxRev*100)}%;background:#1D4E9C"></span></span>
      <span class="catbar-val">${kReviews(c.reviews)}</span>
    </div>`).join('');

  $app().innerHTML = `
  <div class="back-bar">
    <button onclick="navigate('dashboard')">← Back</button>
    <strong>Pack-Size Intelligence</strong>
  </div>
  <div class="notice info" style="margin-bottom:18px">Interest is proxied by <strong>total review volume</strong> — no public sales data exists.</div>

  <div class="grid2">
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Bulk curve · median ₹/g by pack size</div>
      <div class="chart-box" style="height:280px"><canvas id="chartBandPpg"></canvas></div>
    </div></div>
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Interest · total reviews by pack size</div>
      <div class="chart-box" style="height:280px"><canvas id="chartBandRev"></canvas></div>
    </div></div>
  </div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Pack-size bands</div>
    <div class="tbl-scroll"><table style="min-width:780px">
      <thead><tr><th>Band</th><th>SKUs</th><th>Median ₹/g</th><th>Avg Disc%</th><th>Reviews</th><th>Avg ★</th><th>Top Category</th><th>Top Brand</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="hm-cap">“Reviews” = total review volume in the band — an interest proxy, not sales.</div>
  </div></div>

  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">Most common pack sizes <span class="muted" style="text-transform:none;letter-spacing:0">· top 8 by SKU count · bar = total reviews</span></div>
    ${commonList}
  </div></div>`;

  drawPackCharts(bands);

function drawPackCharts(bands){
  const present = bands.filter(b=>b.count>0);
  const labels = present.map(b=>b.band);

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">

  </div></div>

  <div class="grid2">

      <div class="chart-box" style="height:230px"><canvas id="histPpg"></canvas></div>

/* ---- Demand Intelligence — Google Trends (seeded) ---- */
function setTrendsMode(m){ STATE.trendsMode = m; render(); }

// Marry seeded search interest with our live ₹/g into a positioning signal.
function trendSignal(latest, dir, ppgMedian){
  const high = latest >= 55;
  const premium = ppgMedian != null && ppgMedian > 0.5;
  if (high && premium) return { label:'Premium Demand', sub:'pricing power + pull', cls:'sig-premium' };
  if (high)            return { label:'Mass Favourite',  sub:'volume pull',        cls:'sig-mass' };
  if (dir === 'rising') return { label:'Momentum — watch', sub:'rising interest',  cls:'sig-rise' };
  if (dir === 'falling' || latest < 30) return { label:'Fading / niche', sub: dir==='falling'?'losing interest':'low interest', cls:'sig-fade' };
  return { label:'Steady', sub:'flat, mid interest', cls:'sig-steady' };
}

function renderTrends(){
  const t = STATE.trends;
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Demand Intelligence — Google Trends</strong></div>`;
  if (!t || !t.brands){
    $app().innerHTML = backBar + `<div class="notice info">No trends data — <code>data/trends.json</code> not found.</div>`;
    return;
  }
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const ppgByBrand = {}; if (STATE.curr) STATE.curr.brandStats.forEach(b=>ppgByBrand[b.brand]=b.ppg.median);
  const arrow = d => d==='rising' ? '<span style="color:#0A4A3A">▲</span>' : d==='falling' ? '<span style="color:#7A0A1C">▼</span>' : '<span class="muted">→</span>';

  // Banner: real (live) vs seeded; flag any stale (couldn't-refresh) keys honestly.
  const isLive = /live/i.test(t.source||'') || !!t.fetchedAt;
  const staleN = [...Object.values(t.brands||{}), ...Object.values(t.categories||{})].filter(x=>x&&x.stale).length;
  const fetchedDate = t.fetchedAt ? new Date(t.fetchedAt).toLocaleString('en-IN') : (t.updated||'—');
  const banner = isLive
    ? `📈 <strong>Live Google Trends</strong> · relative search interest (0–100), <strong>not sales</strong> · geo ${esc(t.geo||'IN')}, last 12 months · fetched ${esc(fetchedDate)}${staleN?` · <strong>${staleN} value(s) stale</strong> (refresh blocked — last-good kept)`:''}`
    : `📈 <strong>Seeded snapshot</strong> · relative search interest (0–100), <strong>not sales</strong> · update from trends.google.com (geo ${esc(t.geo||'IN')}) · updated ${esc(t.updated||'—')}`;

  const brandEntries = Object.entries(t.brands).map(([name,v])=>({name, ...v}));
  const ranked = brandEntries.slice().sort((a,b)=>b.latest-a.latest);
  const maxLatest = Math.max(...ranked.map(b=>b.latest), 1);
  const rankRows = ranked.map(b=>{
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="catbar-row">
      <span class="catbar-label"><span class="dot" style="background:${col}"></span>${esc(b.name)}</span>
      <span class="bar-wrap"><span class="bar-fill" style="width:${Math.round(b.latest/maxLatest*100)}%;background:${col}"></span></span>
      <span class="catbar-val">${b.latest} ${arrow(b.direction)}</span>
    </div>`;
  }).join('');

  const all = [...brandEntries, ...Object.entries(t.categories||{}).map(([n,v])=>({name:n, ...v, isCat:true}))];
  const board = arr => arr.length
    ? arr.sort((a,b)=>b.latest-a.latest).map(x=>`<div class="board-row"><span>${esc(x.name)}${x.isCat?' <span class="muted" style="font-size:10px">cat</span>':''}</span><strong>${x.latest}</strong></div>`).join('')
    : '<div class="muted" style="font-size:12px">—</div>';

  const sigCards = ranked.map(b=>{
    const ppg = ppgByBrand[b.name];
    const sig = trendSignal(b.latest, b.direction, ppg);
    const col = COL[brandCompany(b.name)] || '#999';
    return `<div class="card sig-card fadein"><div class="card-pad">
      <div class="sig-brand"><span class="dot" style="background:${col}"></span>${esc(b.name)}</div>
      <div class="sig-metrics"><span>interest <strong>${b.latest}</strong> ${arrow(b.direction)}</span><span>${ppg!=null?'₹'+ppg.toFixed(2)+'/g':'<span class="muted">no ₹/g</span>'}</span></div>
      <span class="badge ${sig.cls}">${sig.label}</span>
      <div class="sig-sub">${sig.sub}</div>
    </div></div>`;
  }).join('');

  $app().innerHTML = `
  ${backBar}
  <div class="notice trends-banner">${banner}</div>

  <div class="grid2">
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Search-interest ranking <span class="muted" style="text-transform:none;letter-spacing:0">· latest 0–100</span></div>
      ${rankRows}
    </div></div>
    <div class="card fadein"><div class="card-pad">
      <div class="sec-title">Rising vs falling</div>
      <div class="grid2" style="margin:0;gap:14px">
        <div><div class="board-h" style="color:#0A4A3A">▲ Rising</div>${board(all.filter(x=>x.direction==='rising'))}</div>
        <div><div class="board-h" style="color:#7A0A1C">▼ Falling</div>${board(all.filter(x=>x.direction==='falling'))}</div>
      </div>
    </div></div>
  </div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="ov-head" style="margin-bottom:12px">
      <div class="sec-title" style="margin:0">Interest over 12 months</div>
      <div class="ov-actions">
        <button class="seg${mode==='brands'?' active':''}" onclick="setTrendsMode('brands')">Top brands</button>
        <button class="seg${mode==='categories'?' active':''}" onclick="setTrendsMode('categories')">Categories</button>
      </div>
    </div>
    <div class="chart-box" style="height:320px"><canvas id="trendsLine"></canvas></div>
  </div></div>

  <div class="sec-title">The signal · Google Trends × live ₹/g</div>
  <div class="grid3">${sigCards}</div>

  <div class="card fadein" style="margin-top:16px"><div class="card-pad">
    <div class="sec-title">Methodology</div>
    <p class="admin-p">Google Trends reports <strong>relative search interest</strong> (0–100 within the set &amp; timeframe), <strong>not sales</strong>. Values are <strong>fetched live from Google Trends via SerpApi in CI</strong> (the weekly <em>Trends</em> workflow, geo India, last 12 months) — terms are batched in groups of ≤5 with a shared anchor and normalized for comparability. It's best-effort: any value that can't refresh keeps its <strong>last-good</strong> and is flagged <em>stale</em> — never fabricated. The signal marries this demand proxy with our live median ₹/g from <code>data/latest.json</code> (high interest + premium ₹/g = pricing power; high + value = volume pull; rising = momentum; low/falling = fading).</p>
  </div></div>`;

  drawTrendsChart();
}

function drawTrendsChart(){
  const t = STATE.trends; if (!t) return;
  const mode = STATE.trendsMode === 'categories' ? 'categories' : 'brands';
  const src = mode === 'categories' ? (t.categories||{}) : (t.brands||{});
  let entries = Object.entries(src).map(([name,v])=>({name, ...v}));
  if (mode === 'brands') entries = entries.sort((a,b)=>b.latest-a.latest).slice(0,8);   // cap to avoid clutter
  const months = (()=>{ const o=[]; const d=new Date(); for(let i=11;i>=0;i--) o.push(new Date(d.getFullYear(),d.getMonth()-i,1).toLocaleDateString('en-IN',{month:'short'})); return o; })();
  const colorFor = name => mode==='categories' ? (CAT_COL[name]||'#B6772E') : (COL[brandCompany(name)]||'#999');
  waitForChart(()=>{
    mkChart('trendsLine', { type:'line',
      data:{ labels: months, datasets: entries.map(e=>({ label:e.name, data:e.interest, borderColor:colorFor(e.name), backgroundColor:colorFor(e.name), borderWidth:2, tension:.3, pointRadius:0 })) },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10}, padding:8 } }, tooltip:{ callbacks:{ label:c=>c.dataset.label+': '+c.raw } } },
        scales:{ y:{ beginAtZero:true, max:100, grid:{color:'rgba(26,26,24,.06)'}, ticks:{font:{size:10}} },
                 x:{ grid:{display:false}, ticks:{font:{size:9}} } } }
    });
  });
}

/* ---- Emerging-brands radar (brands outside the tracked roster) ---- */
function renderRadar(){
  const backBar = `<div class="back-bar"><button onclick="navigate('dashboard')">← Back</button><strong>Emerging Brands Radar</strong></div>`;
  const emg = STATE.skus.filter(s=>s.company==='Emerging / D2C');
  if (!emg.length){
    $app().innerHTML = backBar + `<div class="notice info">No emerging brands in the current data — run the Scrape workflow.</div>`;
    return;
  }
  const m = new Map();
  for (const s of emg){ const b = s.brand || 'Unknown'; if (!m.has(b)) m.set(b, []); m.get(b).push(s); }
  const rows = [...m].map(([brand,gs])=>{
    const reviews = gs.reduce((a,s)=>a+(s.reviewCount||0), 0);
    const catCount = {}; gs.forEach(s=>catCount[s.category]=(catCount[s.category]||0)+1);
    const cat = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0];
    const sample = gs.slice().sort((a,b)=>(b.reviewCount||0)-(a.reviewCount||0)).find(s=>s.url) || gs[0];
    const real = gs.length>=2 && reviews>=50 && brand!=='Unknown';
    return { brand, count:gs.length, ppg:calcStats(gs.map(s=>s.pricePerGram),3).median, reviews, traction:gs.length*reviews, cat, sample, real };
  }).sort((a,b)=> b.traction - a.traction || b.reviews - a.reviews);

  const realCount = rows.filter(r=>r.real).length;
  const tableRows = rows.map(r=>`<tr>
    <td><strong>${esc(r.brand)}</strong></td>
    <td class="num">${r.count}</td>
    <td class="num">${rs2(r.ppg)}</td>
    <td class="num">${kCompact(r.reviews)}</td>
    <td class="num">${kCompact(r.traction)}</td>
    <td>${esc(r.cat)}</td>
    <td><span class="badge ${r.real?'sig-mass':'sig-fade'}">${r.real?'real brand':'low-signal'}</span></td>
    <td>${r.sample&&r.sample.url?`<a href="${esc(r.sample.url)}" target="_blank" rel="noopener" title="${esc(r.sample.name)}">↗</a>`:''}</td>
  </tr>`).join('');

  const roster = Object.keys(COL).filter(c=>c!=='Emerging / D2C').map(co=>
    `<span class="grp-chip" style="background:${BG[co]};color:${TXT[co]}">${esc(co)}: ${BRANDS.filter(b=>b.company===co).map(b=>esc(b.brand)).join(', ')}</span>`).join(' ');

  // Unrecognized "Other" products — show sample titles so new brands can be spotted & allow-listed.
  const otherSkus = emg.filter(s=>s.brand==='Other').sort((a,b)=>(b.reviewCount||0)-(a.reviewCount||0));
  const otherSamples = otherSkus.slice(0,12).map(s=>
    `<div class="catbar-row"><span class="catbar-label" style="width:auto;flex:1">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name.slice(0,62))}</a>`:esc(s.name.slice(0,62))}</span><span class="muted" style="font-size:11px;white-space:nowrap">${esc(s.category)} · ${kCompact(s.reviewCount||0)} rev</span></div>`).join('');

  $app().innerHTML = `${backBar}
  <div class="notice info" style="margin-bottom:18px">Brands appearing in the category <strong>beyond the tracked roster</strong> — new / D2C / regional players. Traction = SKU count × review volume (<strong>no sales data exists</strong>).</div>
  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="results-meta"><strong>${rows.length}</strong> emerging brands · <strong>${realCount}</strong> look like real brands · ${emg.length} SKUs</div>
    <div class="tbl-scroll"><table style="min-width:700px">
      <thead><tr><th>Brand</th><th>SKUs</th><th>Median ₹/g</th><th>Reviews</th><th>Traction</th><th>Top Category</th><th>Confidence</th><th></th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>
    <div class="hm-cap">Traction = SKUs × total reviews (interest proxy, not sales). "Real brand" = ≥2 SKUs and ≥50 reviews.</div>
  </div></div>
  ${otherSkus.length?`<div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Unrecognized products · "Other" <span class="muted" style="text-transform:none;letter-spacing:0">· ${otherSkus.length} SKUs · scan to spot new brands to allow-list</span></div>
    ${otherSamples}
  </div></div>`:''}
  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">Tracked roster (reference)</div>
    <div class="roster-ref">${roster}</div>
  </div></div>`;
}

function renderAdmin(){
  const roster = Object.keys(COL).map(g=>{
    const brands = BRANDS.filter(b=>b.company===g).map(b=>b.brand).join(', ');
    return `
    <div class="roster-row">
      <span class="grp-chip" style="background:${BG[g]};color:${TXT[g]}">${g}</span>
      <span class="roster-brands">${brands}</span>
    </div>`;
  }).join('');

  const hist = (STATE.history||[]).slice(-1)[0];
  const histLine = hist
    ? `Last run: ${new Date(hist.ts).toLocaleString('en-IN')} — ${hist.skuCount} SKUs, ${hist.brandsOk}/${BRANDS.length} brands OK.`
    : 'No runs recorded yet.';

  $app().innerHTML = `
  <div class="back-bar">
    <button onclick="navigate('dashboard')">← Back</button>
    <strong>Admin · System Info</strong>
  </div>

  <div class="card fadein">
    <div class="card-pad">
      <h2 class="admin-h">How it works</h2>
      <p class="admin-p">
        This dashboard tracks <strong>${BRANDS.length} biscuit brands</strong> across
        <strong>${Object.keys(COL).length} company groups</strong> and
        <strong>${CATEGORIES.length} categories</strong>
        (${CATEGORIES.join(', ')}). <strong>Price-per-gram (₹/g)</strong> is the hero metric,
        reported alongside discount vs MRP, pack sizes and reviews.
      </p>

      <h3 class="admin-h sub">Data pipeline (CI-scraped → static)</h3>
      <ul class="admin-list">
        <li><strong>Scrape</strong> — a GitHub Action (<code>scripts/scrape.mjs</code>) runs Firecrawl
          using a key held only as a GitHub Actions secret, parses weight, ₹/g, discount, category
          and reviews, and commits <code>data/latest.json</code> + <code>data/history.json</code>.</li>
        <li><strong>Serve</strong> — Cloudflare's git build deploys the committed JSON as static assets.</li>
        <li><strong>Read</strong> — this page fetches <code>/data/latest.json</code>. No key in the
          browser, no runtime scraping, no Cloudflare secret.</li>
        <li><strong>Coverage searches</strong> — extra Amazon queries (rusk, wafer, D2C cookies) classify discovered products to a brand/company so thin categories &amp; emerging brands populate.</li>
        <li><strong>Quick-commerce (BigBasket)</strong> — attempted live on every run, but its search needs a pincode/session and blocks datacenter scrapers, so it yields <strong>0</strong> (logged honestly, never faked). Amazon is the live source.</li>
        <li><strong>Google Trends</strong> — seeded snapshot (Step 8). <strong>Market share</strong> — seeded (later step).</li>
      </ul>

      <h3 class="admin-h sub">Status</h3>
      <p class="admin-p">
        Loaded ${TODAY}. ${histLine} Build progress:
        <strong>Step 11 of 14</strong> — real Google Trends fetched live in CI (best-effort, last-good fallback).
      </p>

      <h3 class="admin-h sub">Tracked roster</h3>
      ${roster}
    </div>
  </div>`;
}
