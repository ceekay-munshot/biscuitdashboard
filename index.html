<script>
/* ============================================================
   BISCUIT MARKET INTELLIGENCE DASHBOARD
   Build Step 3 / 12 — stats engine + aggregated dashboard
   Single-file, zero-build. Vanilla ES6.

   Scraping runs in GitHub Actions (scripts/scrape.mjs) and commits
   data/latest.json + data/history.json. This client only READS that
   JSON — no Firecrawl key, no parser, no runtime scraping here.
   ============================================================ */

/* ------------------------------------------------------------
   1. ENTITY MODEL  (configurable starting roster)
   ------------------------------------------------------------ */
const COL = {"Britannia":"#C8102E","Parle":"#C77800","ITC Sunfeast":"#7B2D8E","Mondelez":"#1D4E9C","Unibic":"#138A6E","Emerging / D2C":"#E05A2B"};
const BG  = {"Britannia":"#FBE7EA","Parle":"#FAF0DC","ITC Sunfeast":"#F2E7F5","Mondelez":"#E6EDF8","Unibic":"#DFF1EB","Emerging / D2C":"#FCEAE1"};
const TXT = {"Britannia":"#7A0A1C","Parle":"#6E4300","ITC Sunfeast":"#45184F","Mondelez":"#102C58","Unibic":"#0A4A3A","Emerging / D2C":"#7A2D10"};

const BRANDS = [
  {brand:"Good Day",             company:"Britannia"},
  {brand:"Bourbon",              company:"Britannia"},
  {brand:"Marie Gold",           company:"Britannia"},
  {brand:"NutriChoice",          company:"Britannia"},
  {brand:"Parle-G",              company:"Parle"},
  {brand:"Monaco",               company:"Parle"},
  {brand:"Hide & Seek",          company:"Parle"},
  {brand:"KrackJack",            company:"Parle"},
  {brand:"Dark Fantasy",         company:"ITC Sunfeast"},
  {brand:"Mom's Magic",          company:"ITC Sunfeast"},
  {brand:"Sunfeast Marie Light", company:"ITC Sunfeast"},
  {brand:"Oreo",                 company:"Mondelez"},
  {brand:"Unibic",               company:"Unibic"},
  {brand:"The Whole Truth",      company:"Emerging / D2C"},
];

const CATEGORIES = ["Cookies","Digestive","Cream","Crackers","Rusk","Wafer","Other"];

/* ------------------------------------------------------------
   2. GLOBAL STATE
   ------------------------------------------------------------ */
const TODAY = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

let STATE = {
  skus:[],              // raw SKUs from data/latest.json
  scrapedAt:null,       // ISO timestamp of the scrape
  curr:null,            // buildStats() result (companyStats / brandStats / categoryStats)
  history:[],           // data/history.json
  loading:false,        // true while (re)loading the static JSON
  view:null,            // active route (null/'dashboard' default; objects carry .type)
  insight:'',           // AI insight text (later step)
  insightLoading:false  // AI insight loading flag (later step)
};

/* ------------------------------------------------------------
   3. CHART HELPERS  (defined now, used from a later step)
   ------------------------------------------------------------ */
let charts = {};
function waitForChart(cb){
  if (window.Chart){ cb(); return; }
  const t = setInterval(()=>{ if (window.Chart){ clearInterval(t); cb(); } }, 60);
}
function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  charts = {};
}
function mkChart(id, cfg){
  const cv = document.getElementById(id);
  if (!cv || !window.Chart) return null;
  if (charts[id]){ try{ charts[id].destroy(); }catch(e){} }
  charts[id] = new Chart(cv.getContext('2d'), cfg);
  return charts[id];
}

/* ------------------------------------------------------------
   4. STATS ENGINE  (price-per-gram aggregations — hero metric)
   ------------------------------------------------------------ */
// Summary stats for a numeric array, each rounded to `dp` decimals.
function calcStats(nums, dp){
  const r = v => +(+v).toFixed(dp);
  if (!nums || !nums.length) return { avg:0, median:0, min:0, max:0, p25:0, p75:0, count:0 };
  const a = nums.slice().sort((x,y)=>x-y), n = a.length;
  const q = p => { const i=(n-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return a[lo]+(a[hi]-a[lo])*(i-lo); };
  return {
    avg: r(a.reduce((s,x)=>s+x,0)/n),
    median: r(q(0.5)),
    min: r(a[0]), max: r(a[n-1]),
    p25: r(q(0.25)), p75: r(q(0.75)),
    count: n
  };
}

// Positioning tier from median ₹/g (starting thresholds, easy to tweak).
function positioning(medianPpg){
  if (medianPpg < 0.25) return 'Value';
  if (medianPpg <= 0.50) return 'Mainstream';
  return 'Premium';
}

// Group SKUs by company / brand / category and compute ₹/g (hero) + discount
// (secondary) stats, ratings and review sums for each group.
function buildStats(skus, scrapedAt = STATE.scrapedAt){
  const groupBy = key => {
    const m = new Map();
    for (const s of skus){ const k = s[key]; if (!m.has(k)) m.set(k, []); m.get(k).push(s); }
    return m;
  };
  const statFor = (gs, label, extra) => {
    const ratings = gs.map(s=>s.rating).filter(v=>v!=null);
    const categoryCounts = {};
    for (const s of gs) categoryCounts[s.category] = (categoryCounts[s.category]||0)+1;
    return Object.assign({
      name: label,
      ppg:  calcStats(gs.map(s=>s.pricePerGram), 3),   // hero metric
      disc: calcStats(gs.map(s=>s.discount), 1),       // secondary metric
      ratingAvg: ratings.length ? +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : null,
      reviewSum: gs.reduce((a,s)=>a+(s.reviewCount||0),0),
      categoryCounts,
      skus: gs
    }, extra);
  };

  const companyStats  = [...groupBy('company')].map(([company,gs])  => statFor(gs, company,  { company }));
  const brandStats    = [...groupBy('brand')].map(([brand,gs])      => statFor(gs, brand,    { brand, company: gs[0].company }));
  const categoryStats = [...groupBy('category')].map(([category,gs])=> statFor(gs, category, { category }));   // rendered in Step 4

  const byMedianDesc = (a,b) => b.ppg.median - a.ppg.median;       // premium-per-gram first
  companyStats.sort(byMedianDesc);
  brandStats.sort(byMedianDesc);

  return { companyStats, brandStats, categoryStats, scrapedAt, skuCount: skus.length };
}

/* ------------------------------------------------------------
   5. DATA LOADING  (reads the CI-committed static JSON)
   ------------------------------------------------------------ */
async function loadData(){
  const bust = '?_=' + Date.now();   // cache-bust so ↻ Reload sees fresh data

  STATE.skus = []; STATE.scrapedAt = null; STATE.curr = null;
  try {
    const r = await fetch('/data/latest.json' + bust, { cache:'no-store' });
    if (r.ok){
      const d = await r.json();
      if (d && Array.isArray(d.skus)){
        STATE.skus = d.skus;
        STATE.scrapedAt = d.scrapedAt || null;
        if (d.skus.length) STATE.curr = buildStats(d.skus);
      }
    }
  } catch(e){ /* fail soft → empty state */ }

  try {
    const r = await fetch('/data/history.json' + bust, { cache:'no-store' });
    if (r.ok){
      const h = await r.json();
      STATE.history = Array.isArray(h) ? h : [];
    }
  } catch(e){ STATE.history = []; }
}

async function reload(){
  STATE.loading = true; render();
  await loadData();
  STATE.loading = false; render();
}

/* ------------------------------------------------------------
   6. ROUTER
   ------------------------------------------------------------ */
function navigate(view){
  STATE.view = view;
  window.scrollTo(0,0);
  render();
}

function render(){
  destroyCharts();
  const v = STATE.view;
  const type = (v == null) ? 'dashboard' : (typeof v === 'string' ? v : v.type);

  switch (type){
    case 'admin':
      renderAdmin();
      break;

    /* ---- Views arriving in later build steps -----------------------------
       case 'brand':    renderBrand(v);    break;
       case 'category': renderCategory(v); break;
       case 'packsize': renderPackSize(v); break;
       case 'trends':   renderTrends();    break;
       case 'radar':    renderRadar();     break;
       case 'share':    renderShare();     break;
       case 'history':  renderHistory();   break;
       --------------------------------------------------------------------- */

    case 'dashboard':
    default:
      renderDashboard();
      break;
  }
}

/* ------------------------------------------------------------
   7. RENDERERS
   ------------------------------------------------------------ */
const $app = () => document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rs2 = v => '₹' + (+v).toFixed(2);                 // ₹/g formatter

function renderDashboard(){
  if (STATE.curr && STATE.skus.length){ $app().innerHTML = overviewHTML(); drawOverviewCharts(); return; }
  $app().innerHTML = emptyStateHTML();
}

function emptyStateHTML(){
  const groups = Object.keys(COL).join(' · ');
  const msg = STATE.loading
    ? `<div class="notice info"><span class="pulse-dot" style="color:#B6772E"></span>Loading data…</div>`
    : `<div class="notice info">No data yet — run the <strong>Scrape</strong> workflow (GitHub → <strong>Actions</strong> tab → <em>Run workflow</em>) to populate, then reload.</div>`;

  return `
  <div class="hero fadein">
    <div class="hero-eyebrow">Biscuit Market Intelligence</div>
    <h1 class="hero-title">India Quick-Comm &amp; E-Comm Pricing Dashboard</h1>
    <p class="hero-sub">
      Tracking <strong>${BRANDS.length} brands</strong> across ${groups} —
      with <strong>price-per-gram</strong> as the hero metric.
    </p>
    <div>${msg}</div>
    <div><button class="btn-accent" onclick="reload()">↻ Reload</button></div>
    <div class="hero-hint"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd> for admin / system info</div>
  </div>`;
}

/* Overview dashboard — hero: price-per-gram (₹/g); secondary: discount vs MRP. */
function overviewHTML(){
  const st = STATE.curr;
  const asOf = STATE.scrapedAt ? new Date(STATE.scrapedAt).toLocaleString('en-IN') : '—';

  // One KPI card per company group: present companies (by median ₹/g), then any
  // group with no SKUs in the latest scrape as a muted placeholder.
  const present = new Set(st.companyStats.map(c=>c.company));
  const ordered = [
    ...st.companyStats,
    ...Object.keys(COL).filter(co=>!present.has(co)).map(co=>({ company:co, empty:true }))
  ];
  const cards = ordered.map(c=>{
    const col = COL[c.company] || '#555';
    if (c.empty){
      return `
      <div class="card kpi empty" style="border-top:3px solid ${col}"><div class="card-pad">
        <div class="kpi-co" style="color:${col}">${esc(c.company)}</div>
        <div class="kpi-big">—<span class="kpi-unit">/g</span></div>
        <span class="badge" style="background:#f0ede8;color:#9b9a96">No SKUs yet</span>
        <div class="kpi-sec">No products in the latest scrape.</div>
      </div></div>`;
    }
    const tier = positioning(c.ppg.median);
    return `
    <div class="card kpi fadein" style="border-top:3px solid ${col}"><div class="card-pad">
      <div class="kpi-co" style="color:${col}">${esc(c.company)}</div>
      <div class="kpi-big">${rs2(c.ppg.median)}<span class="kpi-unit">/g</span></div>
      <span class="badge tier-${tier.toLowerCase()}">${tier}</span>
      <div class="kpi-sec">
        ${Math.round(c.disc.avg)}% off · ${rs2(c.ppg.min)}–${(+c.ppg.max).toFixed(2)}/g<br>
        ${c.skus.length} SKUs · ${c.ratingAvg!=null?'★ '+c.ratingAvg.toFixed(1):'—'}
      </div>
    </div></div>`;
  }).join('');

  const compRows = st.companyStats.map(c=>{
    const col = COL[c.company] || '#555';
    return `<tr>
      <td><span class="dot" style="background:${col}"></span>${esc(c.company)}</td>
      <td class="num"><strong>${rs2(c.ppg.median)}</strong></td>
      <td class="num">${rs2(c.ppg.avg)}</td>
      <td class="num">${rs2(c.ppg.min)}</td>
      <td class="num">${rs2(c.ppg.max)}</td>
      <td class="num">${c.disc.avg.toFixed(1)}%</td>
      <td class="num">${c.ratingAvg!=null?'★ '+c.ratingAvg.toFixed(1):'—'}</td>
      <td class="num">${c.skus.length}</td>
    </tr>`;
  }).join('');

  const brandRows = st.brandStats.map(b=>{
    const col = COL[b.company] || '#555';
    return `<tr>
      <td><span class="dot" style="background:${col}"></span>${esc(b.brand)}</td>
      <td class="muted">${esc(b.company)}</td>
      <td class="num"><strong>${rs2(b.ppg.median)}</strong></td>
      <td class="num">${b.disc.avg.toFixed(1)}%</td>
      <td class="num">${b.ratingAvg!=null?'★ '+b.ratingAvg.toFixed(1):'—'}</td>
      <td class="num">${b.skus.length}</td>
    </tr>`;
  }).join('');

  return `
  <div class="ov-head">
    <div>
      <h1 class="ov-title">Biscuit Market Intelligence</h1>
      <div class="ov-sub"><span class="live-dot"></span>Data as of ${asOf} · <strong>${st.skuCount}</strong> SKUs</div>
    </div>
    <button onclick="reload()"${STATE.loading?' disabled':''}>↻ Reload</button>
  </div>
  <div class="ov-metricline">Hero metric: <strong>price per gram (₹/g)</strong> · secondary: discount vs MRP</div>

  <div class="grid3">${cards}</div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">By company · price-per-gram</div>
    <div class="tbl-scroll"><table style="min-width:720px">
      <thead><tr><th>Company</th><th>Median ₹/g</th><th>Avg ₹/g</th><th>₹/g Min</th><th>₹/g Max</th><th>Avg Disc%</th><th>Avg ★</th><th>SKUs</th></tr></thead>
      <tbody>${compRows}</tbody>
    </table></div>
  </div></div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Hero · median price-per-gram by brand</div>
    <div class="chart-box"><canvas id="chartPpg"></canvas></div>
  </div></div>

  <div class="card fadein" style="margin-bottom:16px"><div class="card-pad">
    <div class="sec-title">Secondary · average discount vs MRP by brand</div>
    <div class="chart-box"><canvas id="chartDisc"></canvas></div>
  </div></div>

  <div class="card fadein"><div class="card-pad">
    <div class="sec-title">By brand</div>
    <div class="tbl-scroll"><table style="min-width:560px">
      <thead><tr><th>Brand</th><th>Group</th><th>Median ₹/g</th><th>Avg Disc%</th><th>Avg ★</th><th>SKUs</th></tr></thead>
      <tbody>${brandRows}</tbody>
    </table></div>
  </div></div>`;
}

/* Hero + secondary horizontal bar charts (Chart.js loads async → waitForChart). */
function drawOverviewCharts(){
  const bs = STATE.curr ? STATE.curr.brandStats : [];
  if (!bs.length) return;
  const labels = bs.map(b=>b.brand);
  const colors = bs.map(b=>COL[b.company] || '#999');
  const opts = unit => ({
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false},
      tooltip:{ callbacks:{ label:c => unit==='ppg' ? '₹'+(+c.raw).toFixed(2)+'/g' : (+c.raw).toFixed(1)+'% off' } } },
    scales:{
      x:{ beginAtZero:true, grid:{color:'rgba(26,26,24,.06)'},
          ticks:{ font:{size:10}, callback:v => unit==='ppg' ? '₹'+v : v+'%' } },
      y:{ grid:{display:false}, ticks:{ font:{size:10.5} } }
    }
  });
  waitForChart(()=>{
    mkChart('chartPpg', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.ppg.median), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('ppg') });
    mkChart('chartDisc', { type:'bar',
      data:{ labels, datasets:[{ data:bs.map(b=>b.disc.avg), backgroundColor:colors, borderRadius:4, barPercentage:.82 }] },
      options: opts('disc') });
  });
}

function renderAdmin(){
  const roster = Object.keys(COL).map(g=>{
    const brands = BRANDS.filter(b=>b.company===g).map(b=>b.brand).join(', ');
    return `
    <div class="roster-row">
      <span class="grp-chip" style="background:${BG[g]};color:${TXT[g]}">${g}</span>
      <span class="roster-brands">${brands}</span>
    </div>`;
  }).join('');

  const hist = (STATE.history||[]).slice(-1)[0];
  const histLine = hist
    ? `Last run: ${new Date(hist.ts).toLocaleString('en-IN')} — ${hist.skuCount} SKUs, ${hist.brandsOk}/${BRANDS.length} brands OK.`
    : 'No runs recorded yet.';

  $app().innerHTML = `
  <div class="back-bar">
    <button onclick="navigate('dashboard')">← Back</button>
    <strong>Admin · System Info</strong>
  </div>

  <div class="card fadein">
    <div class="card-pad">
      <h2 class="admin-h">How it works</h2>
      <p class="admin-p">
        This dashboard tracks <strong>${BRANDS.length} biscuit brands</strong> across
        <strong>${Object.keys(COL).length} company groups</strong> and
        <strong>${CATEGORIES.length} categories</strong>
        (${CATEGORIES.join(', ')}). <strong>Price-per-gram (₹/g)</strong> is the hero metric,
        reported alongside discount vs MRP, pack sizes and reviews.
      </p>

      <h3 class="admin-h sub">Data pipeline (CI-scraped → static)</h3>
      <ul class="admin-list">
        <li><strong>Scrape</strong> — a GitHub Action (<code>scripts/scrape.mjs</code>) runs Firecrawl
          using a key held only as a GitHub Actions secret, parses weight, ₹/g, discount, category
          and reviews, and commits <code>data/latest.json</code> + <code>data/history.json</code>.</li>
        <li><strong>Serve</strong> — Cloudflare's git build deploys the committed JSON as static assets.</li>
        <li><strong>Read</strong> — this page fetches <code>/data/latest.json</code>. No key in the
          browser, no runtime scraping, no Cloudflare secret.</li>
        <li><strong>Quick-commerce, Google Trends &amp; market share</strong> — seeded &amp; editable (later steps).</li>
      </ul>

      <h3 class="admin-h sub">Status</h3>
      <p class="admin-p">
        Loaded ${TODAY}. ${histLine} Build progress:
        <strong>Step 3 of 12</strong> — stats engine + aggregated dashboard.
      </p>

      <h3 class="admin-h sub">Tracked roster</h3>
      ${roster}
    </div>
  </div>`;
}

/* ------------------------------------------------------------
   8. BOOT
   ------------------------------------------------------------ */
document.addEventListener('keydown', e=>{
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'A' || e.key === 'a')){
    e.preventDefault();
    navigate({type:'admin'});
  }
});

render();
loadData().then(render);
</script>
</body>
</html>
