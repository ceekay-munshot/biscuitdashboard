name: Scrape

on:
  workflow_dispatch:
    inputs:
      debug_brands:
        description: 'Debug only: comma-separated brands to dump raw markdown to data/_debug/. Leave empty for normal runs.'
        required: false
        default: ''
      debug_blinkit:
        description: 'FREE TEST: set to "1" to probe Blinkit only (Parle-G + Good Day) and dump raw to data/_debug/blinkit/. Skips the normal scrape.'
        required: false
        default: ''
      debug_zepto:
        description: 'FREE TEST: set to "1" to probe Zepto only (Parle-G + Good Day) and dump raw to data/_debug/zepto/. Skips the normal scrape.'
        required: false
        default: ''
      debug_instamart:
        description: 'FREE TEST: set to "1" to probe Swiggy Instamart only (Parle-G + Good Day) and dump raw to data/_debug/instamart/. Skips the normal scrape.'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * *'      # daily; adjust later

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/scrape.mjs
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          DEBUG_DUMP_BRANDS: ${{ github.event.inputs.debug_brands }}
          DEBUG_BLINKIT: ${{ github.event.inputs.debug_blinkit }}
          DEBUG_ZEPTO: ${{ github.event.inputs.debug_zepto }}
          DEBUG_INSTAMART: ${{ github.event.inputs.debug_instamart }}
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%F)"
          git push
